<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamTeam - Startseite</title>
    <meta name="theme-color" content="#28a745">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="DreamTeam">
    <link rel="manifest" href="Icons/site.webmanifest">
    <link rel="icon" type="image/x-icon" href="Icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="Icons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="Icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="Icons/favicon-48x48.png">
    <link rel="apple-touch-icon" sizes="180x180" href="Icons/apple-touch-icon.png">
    <link rel="mask-icon" href="Icons/maskable-icon-192x192.png" color="#28a745">
    <meta name="msapplication-config" content="Icons/browserconfig.xml">
    <meta name="view-transition" content="same-origin">
    <meta name="description" content="DreamTeam Dashboard für Teams, Spieler und Rangliste.">
    <link rel="stylesheet" href="styles.css">
    <style>
        .dashboard-wrap {
            max-width: 1280px;
            margin: 26px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .hero-action {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 18px;
        }

        .hero-btn {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 14px 20px;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 5px 14px rgba(40,167,69,0.3);
        }

        .hero-btn:hover { background: #218838; }

        .overview {
            background: #fff;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .overview h1 { margin: 0 0 8px; color: #1f2937; }
        .overview ul { margin: 0; padding-left: 20px; line-height: 1.5; color: #4b5563; }

        .tiles {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 14px;
        }

        .tile {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
            padding: 16px;
            color: #111827;
            text-decoration: none;
            border: 1px solid #e5e7eb;
            display: block;
        }

        .tile h3 { margin: 0 0 8px; font-size: 1.1rem; }
        .tile p { margin: 0; color: #6b7280; font-size: 0.95rem; }
        .tile ul { margin: 8px 0 0 0; padding-left: 18px; color: #4b5563; }

        .span-4 { grid-column: span 4; }
        .span-6 { grid-column: span 6; }

        @media (max-width: 900px) {
            .span-4, .span-6 { grid-column: span 12; }
        }
    </style>
</head>
<body>
    <main class="dashboard-wrap">
        <div class="hero-action">
            <a href="team-builder.html" class="hero-btn" id="hero-btn">⚽ Dream Team für die EM 2024 zusammenstellen</a>
        </div>

        <section class="tiles">
            <a class="tile span-4" href="teams.html" id="tile-team-count">
                <h3>👥 Anzahl erstellte Teams</h3>
                <p id="team-count-text">0 Teams erstellt</p>
            </a>

            <a class="tile span-4" href="spieleranalyse.html" id="tile-top-players">
                <h3>⭐ Beste Spieler</h3>
                <ul id="top-players-list"></ul>
            </a>

            <a class="tile span-4" href="spieleranalyse.html?view=games" id="tile-top-nations">
                <h3>🌍 Beste Länder</h3>
                <ul id="top-nations-list"></ul>
            </a>

            <a class="tile span-6" href="rangliste.html">
                <h3>🏅 Top 5 Manager</h3>
                <ul id="top-managers-list"></ul>
            </a>

            <a class="tile span-6" href="rangliste.html">
                <h3>📈 Grösste Veränderungen</h3>
                <ul id="rank-jumps-list"></ul>
            </a>
        </section>
    </main>

    <script src="tournament-config.js"></script>
    <script src="nav.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="data.js"></script>
    <script src="cache.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const APP = window.APP_CONFIG;
            if (!APP) return;

            const shortLabel = APP.shortLabel || "EM 2024";
            const pageTitlePrefix = APP.pageTitlePrefix || APP.brandName || "DreamTeam";
            document.title = `${pageTitlePrefix} - Startseite`;

            const heroBtn = document.getElementById("hero-btn");
            if (heroBtn) {
                heroBtn.textContent = `⚽ Dream Team für ${shortLabel} zusammenstellen`;
            }

            const getPlayerById = (playerId) => playersData.find((p) => String(p["player.id"]) === String(playerId));
            const createLi = (html) => {
                const li = document.createElement("li");
                li.innerHTML = html;
                return li;
            };
            const escapeHtml = (value) => String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");

            function computeRankingWithHistory(data) {
                const pointsData = data.points || {};
                const teams = Array.isArray(data.teams) ? data.teams : [];
                const matchIds = new Set();
                const playerMatchPoints = {};

                Object.entries(pointsData).forEach(([playerId, doc]) => {
                    const matches = doc?.matches || {};
                    const perMatch = {};
                    Object.entries(matches).forEach(([matchId, lineup]) => {
                        const id = Number(matchId);
                        if (!Number.isFinite(id)) return;
                        matchIds.add(id);
                        let sum = 0;
                        Object.values(lineup || {}).forEach((v) => { if (typeof v === "number") sum += v; });
                        perMatch[id] = sum;
                    });
                    playerMatchPoints[String(playerId)] = perMatch;
                });

                const orderedMatchIds = Array.from(matchIds).sort((a, b) => a - b);
                const snapshots = Math.max(orderedMatchIds.length, 1);
                const enriched = teams.map((team) => {
                    const mergedPlayers = (team.players || []).map((tp) => {
                        const full = getPlayerById(tp.playerId) || playersData.find((p) => p.Spielername === tp.name);
                        const id = full ? String(full["player.id"]) : String(tp.playerId || "");
                        return { id, isCaptain: !!tp.isCaptain };
                    });
                    return { manager: team.manager || "Unbekannt", mergedPlayers, total: 0, history: [] };
                });

                for (let i = 0; i < snapshots; i++) {
                    const matchId = orderedMatchIds[i];
                    enriched.forEach((team) => {
                        const roundPts = matchId === undefined ? 0 : team.mergedPlayers.reduce((sum, p) => {
                            const base = playerMatchPoints[p.id]?.[matchId] || 0;
                            return sum + (p.isCaptain ? base * 2 : base);
                        }, 0);
                        team.total += roundPts;
                    });
                    const sorted = [...enriched].sort((a, b) => b.total - a.total || a.manager.localeCompare(b.manager, "de"));
                    sorted.forEach((team, idx) => team.history[i] = idx + 1);
                }

                const finalSorted = [...enriched].sort((a, b) => b.total - a.total || a.manager.localeCompare(b.manager, "de"));
                finalSorted.forEach((team, idx) => team.currentRank = idx + 1);
                return { teams: finalSorted, snapshots };
            }

            async function initDashboardTiles() {
                try {
                    const data = await DreamTeamCache.loadBundle({
                        db: APP.getDb(),
                        year: APP.year,
                        allowEmptyPoints: true,
                        log: false
                    }).then((bundle) => bundle.data);

                    const teams = Array.isArray(data.teams) ? data.teams : [];
                    const points = data.points || {};
                    document.getElementById("team-count-text").textContent = `${teams.length} Teams erstellt`;

                    const topPlayers = playersData.map((p) => {
                        const total = points[String(p["player.id"])]?.totalPoints || 0;
                        return { name: p.Spielername, total };
                    }).sort((a, b) => b.total - a.total || a.name.localeCompare(b.name, "de")).slice(0, 5);

                    const playerList = document.getElementById("top-players-list");
                    playerList.innerHTML = "";
                    topPlayers.forEach((p) => {
                        const li = createLi(`<a href="spieleranalyse.html?player=${encodeURIComponent(p.name)}">${escapeHtml(p.name)}</a> (${p.total > 0 ? "+" : ""}${p.total})`);
                        li.querySelector("a").addEventListener("click", (e) => e.stopPropagation());
                        playerList.appendChild(li);
                    });

                    const nationMap = new Map();
                    playersData.forEach((p) => {
                        const nation = p["Nationalteam.name"];
                        if (!nation) return;
                        const total = points[String(p["player.id"])]?.totalPoints || 0;
                        nationMap.set(nation, (nationMap.get(nation) || 0) + total);
                    });
                    const topNations = Array.from(nationMap.entries()).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "de")).slice(0, 5);
                    const nationList = document.getElementById("top-nations-list");
                    nationList.innerHTML = "";
                    topNations.forEach(([nation, total]) => {
                        const li = createLi(`<a href="spieleranalyse.html?view=games&gameNation=${encodeURIComponent(nation)}">${escapeHtml(nation)}</a> (${total > 0 ? "+" : ""}${total})`);
                        li.querySelector("a").addEventListener("click", (e) => e.stopPropagation());
                        nationList.appendChild(li);
                    });

                    const teamTotals = teams.map((t) => ({
                        manager: t.manager || "Unbekannt",
                        total: (t.players || []).reduce((sum, tp) => {
                            const base = points[String(tp.playerId)]?.totalPoints || 0;
                            return sum + (tp.isCaptain ? base * 2 : base);
                        }, 0)
                    })).sort((a, b) => b.total - a.total || a.manager.localeCompare(b.manager, "de")).slice(0, 5);
                    const topManagersList = document.getElementById("top-managers-list");
                    topManagersList.innerHTML = "";
                    teamTotals.forEach((t) => {
                        const li = createLi(`<a href="teams.html?manager=${encodeURIComponent(t.manager)}">${escapeHtml(t.manager)}</a> (${t.total > 0 ? "+" : ""}${t.total})`);
                        li.querySelector("a").addEventListener("click", (e) => e.stopPropagation());
                        topManagersList.appendChild(li);
                    });

                    const ranking = computeRankingWithHistory(data);
                    const jumps = ranking.teams.map((t) => {
                        const prevRank = ranking.snapshots > 1 ? t.history[ranking.snapshots - 2] : t.currentRank;
                        return { manager: t.manager, delta: prevRank - t.currentRank, currentRank: t.currentRank };
                    }).sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta) || a.currentRank - b.currentRank).slice(0, 5);
                    const jumpList = document.getElementById("rank-jumps-list");
                    jumpList.innerHTML = "";
                    jumps.forEach((j) => {
                        const sign = j.delta > 0 ? "+" : "";
                        jumpList.appendChild(createLi(`${escapeHtml(j.manager)} ${sign}${j.delta} Ränge`));
                    });
                } catch (err) {
                    console.error("Dashboard-Kacheln konnten nicht geladen werden:", err);
                }
            }

            initDashboardTiles();
        });
    </script>
</body>
</html>
