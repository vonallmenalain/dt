name: Auto Punkte-Upload

# Vollautomatisches Punkte-Update für das aktive Turnier laut
# tournament-config.js. Läuft während des WM-Zeitraums alle 5
# Minuten als GitHub-Cron-Job (zusätzlich jederzeit manuell auslösbar
# via "Run workflow"). Innerhalb des Skripts gibt es einen Pre-Check,
# der prüft, ob im aktuellen Tick überhaupt ein Spiel im Live-/Catch-up-
# Fenster liegt (Default: 10 Minuten VOR bis 150 Minuten NACH Anpfiff)
# oder ob ein beendetes Spiel noch im Final-Recheck liegt (Default:
# 240 Minuten nach Anpfiff). Nur dann wird die API abgefragt. Während
# eines aktiven Fensters macht das Skript standardmäßig eine lange,
# final-first Monitor-Session mit mindestens 520 Ticks im Abstand von
# mindestens 30 Sekunden. Wenn ein Schedule-Run zu früh kommt, darf er
# ohne API-Calls auf das nächste Live-Fenster warten.
# Das ist bewusst robuster als sich darauf zu verlassen, dass GitHub den
# Cron wirklich alle 5 Minuten startet.
#
# WICHTIG: Der Cron unten ist bewusst auf den WM-Zeitraum
# (11.06.2026 – 21.07.2026) beschränkt, damit nicht das ganze Jahr
# alle 5 Minuten Scheduled-Runs starten und Firestore-Reads erzeugen.
# Zusätzlich gibt es im Skript einen harten Guard auf Basis von
# AUTO_POINTS_FROM / AUTO_POINTS_UNTIL aus tournament-config.js, der
# außerhalb des Turnierfensters sofort exit 0 macht – ohne Firebase-
# Init, ohne Firestore-Read und ohne API-Call. Manuelle Läufe mit
# force_run=true (FORCE_RUN=1) übersteuern diesen Guard.
#
# Benötigte Repo-Secrets (Settings → Secrets and variables → Actions):
#   RAPIDAPI_KEY               RapidAPI / API-Football Key.
#   FIREBASE_SERVICE_ACCOUNT   Service-Account-JSON als String.
#
# Repo-Variables werden fuer diesen Workflow bewusst nicht gelesen.
# Produktive Defaults liegen in tournament-config.js und
# scripts/auto-points-upload.js. Fuer Tests koennen die workflow_dispatch
# Inputs unten einen einzelnen manuellen Run ueberschreiben.
on:
  schedule:
    # Alle 5 Minuten vom 11.–30. Juni 2026 (WM-Gruppenphase + KO-Start).
    - cron: "*/5 * 11-30 6 *"
    # Alle 5 Minuten vom 01.–21. Juli 2026 (KO-Runden + Sicherheitsbuffer
    # nach dem Finale am 19.07.2026).
    - cron: "*/5 * 1-21 7 *"
  workflow_dispatch:
    inputs:
      tournament_key:
        description: "Turnier-Key (leer = Default aus tournament-config.js)."
        required: false
        type: string
        default: ""
      force_run:
        description: "Pre-Check überspringen und Workflow erzwingen (Catch-Up)."
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Nichts in Firestore schreiben – nur Logs."
        required: false
        type: boolean
        default: false
      window_start_min:
        description: "Optionaler Test-Override: Start des Live-Fensters in Minuten relativ zum Anpfiff."
        required: false
        type: string
        default: ""
      window_end_min:
        description: "Optionaler Test-Override: Ende des Live-Fensters in Minuten relativ zum Anpfiff."
        required: false
        type: string
        default: ""
      final_recheck_min:
        description: "Optionaler Test-Override: Final-Recheck in Minuten nach Anpfiff."
        required: false
        type: string
        default: ""
      live_ticks_per_run:
        description: "Optionaler Test-Override: Anzahl Live-Ticks in diesem Run."
        required: false
        type: string
        default: ""
      live_tick_interval_sec:
        description: "Optionaler Test-Override: Sekunden zwischen Live-Ticks."
        required: false
        type: string
        default: ""
      idle_wait_max_min:
        description: "Optionaler Test-Override: Minuten, die ein Run ohne Kandidaten auf das nächste Live-Fenster wartet."
        required: false
        type: string
        default: ""
      session_max_min:
        description: "Optionaler Test-Override: maximale Dauer der Monitor-Session in Minuten."
        required: false
        type: string
        default: ""

concurrency:
  group: auto-points-upload-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install script dependencies
        working-directory: scripts
        run: npm install --no-audit --no-fund --omit=dev

      - name: Run auto points upload
        working-directory: scripts
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TOURNAMENT_KEY: ${{ github.event_name == 'workflow_dispatch' && inputs.tournament_key || '' }}
          POINTS_WINDOW_START_MIN: ${{ github.event_name == 'workflow_dispatch' && inputs.window_start_min || '' }}
          POINTS_WINDOW_END_MIN: ${{ github.event_name == 'workflow_dispatch' && inputs.window_end_min || '' }}
          POINTS_FINAL_RECHECK_MIN: ${{ github.event_name == 'workflow_dispatch' && inputs.final_recheck_min || '' }}
          POINTS_LIVE_TICKS_PER_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.live_ticks_per_run || '' }}
          POINTS_LIVE_TICK_INTERVAL_SEC: ${{ github.event_name == 'workflow_dispatch' && inputs.live_tick_interval_sec || '' }}
          POINTS_IDLE_WAIT_MAX_MIN: ${{ github.event_name == 'workflow_dispatch' && inputs.idle_wait_max_min || '' }}
          POINTS_SESSION_MAX_MIN: ${{ github.event_name == 'workflow_dispatch' && inputs.session_max_min || '' }}
          FORCE_RUN: ${{ inputs.force_run == true && '1' || '0' }}
          DRY_RUN: ${{ inputs.dry_run == true && '1' || '0' }}
        run: |
          echo "[auto-points] Effective workflow config:"
          echo "tournamentKey=${TOURNAMENT_KEY:-'(default)'}"
          echo "windowStartMin=${POINTS_WINDOW_START_MIN:-'(default)'}"
          echo "windowEndMin=${POINTS_WINDOW_END_MIN:-'(default)'}"
          echo "finalRecheckMin=${POINTS_FINAL_RECHECK_MIN:-'(default)'}"
          echo "liveTicksPerRun=${POINTS_LIVE_TICKS_PER_RUN:-'(default)'}"
          echo "liveTickIntervalSec=${POINTS_LIVE_TICK_INTERVAL_SEC:-'(default)'}"
          echo "forceRun=${FORCE_RUN}"
          echo "dryRun=${DRY_RUN}"
          node auto-points-upload.js
