name: Auto Punkte-Upload

# Vollautomatisches Punkte-Update für das aktive Turnier laut
# tournament-config.js. Läuft während des WM-Zeitraums alle 5
# Minuten als GitHub-Cron-Job (zusätzlich jederzeit manuell auslösbar
# via "Run workflow"). Innerhalb des Skripts gibt es einen Pre-Check,
# der prüft, ob im aktuellen Tick überhaupt ein Spiel im Live-/Catch-up-
# Fenster liegt (Default: 10 Minuten VOR bis 150 Minuten NACH Anpfiff).
# Nur dann wird die API abgefragt. Während eines aktiven Fensters macht
# das Skript standardmäßig fünf Ticks mit 60 Sekunden Abstand; so gibt es
# minütliche Live-Updates, ohne jede Minute einen neuen Runner zu starten.
#
# WICHTIG: Der Cron unten ist bewusst auf den WM-Zeitraum
# (11.06.2026 – 21.07.2026) beschränkt, damit nicht das ganze Jahr
# alle 5 Minuten Scheduled-Runs starten und Firestore-Reads erzeugen.
# Zusätzlich gibt es im Skript einen harten Guard auf Basis von
# AUTO_POINTS_FROM / AUTO_POINTS_UNTIL aus tournament-config.js, der
# außerhalb des Turnierfensters sofort exit 0 macht – ohne Firebase-
# Init, ohne Firestore-Read und ohne API-Call. Manuelle Läufe mit
# force_run=true (FORCE_RUN=1) übersteuern diesen Guard.
#
# Benötigte Repo-Secrets (Settings → Secrets and variables → Actions):
#   RAPIDAPI_KEY               RapidAPI / API-Football Key.
#   FIREBASE_SERVICE_ACCOUNT   Service-Account-JSON als String.
#
# Optionale Repo-Variables (Settings → Secrets and variables → Actions
# → Tab Variables) – alle Defaults sind in tournament-config.js bzw.
# im Skript hinterlegt, hier nur Overrides ohne Code-Edit:
#   TOURNAMENT_KEY        Überschreibt das Default-Turnier aus
#                         tournament-config.js. Aktuell unterstützt:
#                         wm2026.
#   POINTS_WINDOW_START_MIN  Default -10 – Start des Live-Fensters
#                            relativ zum Anpfiff.
#   POINTS_WINDOW_END_MIN    Default 150 – Ende des normalen Live-
#                            Fensters relativ zum Anpfiff. Danach bleibt
#                            ein offenes Spiel als Catch-up-Kandidat aktiv.
#   POINTS_LIVE_TICKS_PER_RUN
#                            Default 5 – Anzahl minütlicher Ticks innerhalb
#                            eines GitHub-Runs (bei schedule).
#   POINTS_LIVE_TICK_INTERVAL_SEC
#                            Default 60 – Abstand zwischen Live-Ticks.
on:
  schedule:
    # Alle 5 Minuten vom 11.–30. Juni 2026 (WM-Gruppenphase + KO-Start).
    - cron: "*/5 * 11-30 6 *"
    # Alle 5 Minuten vom 01.–21. Juli 2026 (KO-Runden + Sicherheitsbuffer
    # nach dem Finale am 19.07.2026).
    - cron: "*/5 * 1-21 7 *"
  workflow_dispatch:
    inputs:
      tournament_key:
        description: "Turnier-Key (leer = Default aus tournament-config.js)."
        required: false
        type: string
        default: ""
      force_run:
        description: "Pre-Check überspringen und Workflow erzwingen (Catch-Up)."
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Nichts in Firestore schreiben – nur Logs."
        required: false
        type: boolean
        default: false
      window_start_min:
        description: "Optionaler Test-Override: Start des Live-Fensters in Minuten relativ zum Anpfiff."
        required: false
        type: string
        default: ""
      window_end_min:
        description: "Optionaler Test-Override: Ende des Live-Fensters in Minuten relativ zum Anpfiff."
        required: false
        type: string
        default: ""
      live_ticks_per_run:
        description: "Optionaler Test-Override: Anzahl Live-Ticks in diesem Run."
        required: false
        type: string
        default: ""
      live_tick_interval_sec:
        description: "Optionaler Test-Override: Sekunden zwischen Live-Ticks."
        required: false
        type: string
        default: ""

concurrency:
  group: auto-points-upload-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install script dependencies
        working-directory: scripts
        run: npm install --no-audit --no-fund --omit=dev

      - name: Run auto points upload
        working-directory: scripts
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TOURNAMENT_KEY: ${{ inputs.tournament_key != '' && inputs.tournament_key || vars.TOURNAMENT_KEY }}
          WINDOW_START_MIN: ${{ inputs.window_start_min != '' && inputs.window_start_min || vars.POINTS_WINDOW_START_MIN }}
          WINDOW_END_MIN: ${{ inputs.window_end_min != '' && inputs.window_end_min || vars.POINTS_WINDOW_END_MIN }}
          LIVE_TICKS_PER_RUN: ${{ inputs.live_ticks_per_run != '' && inputs.live_ticks_per_run || vars.POINTS_LIVE_TICKS_PER_RUN }}
          LIVE_TICK_INTERVAL_SEC: ${{ inputs.live_tick_interval_sec != '' && inputs.live_tick_interval_sec || vars.POINTS_LIVE_TICK_INTERVAL_SEC }}
          FORCE_RUN: ${{ inputs.force_run == true && '1' || '0' }}
          DRY_RUN: ${{ inputs.dry_run == true && '1' || '0' }}
        run: node auto-points-upload.js
