name: Auto Punkte-Upload

# Vollautomatisches Punkte-Update für das aktive Turnier laut
# tournament-config.js. Läuft alle 5 Minuten als GitHub-Cron-Job
# (zusätzlich manuell auslösbar via "Run workflow"). Innerhalb des
# Skripts gibt es einen Pre-Check, der prüft, ob im aktuellen Tick
# überhaupt ein Spiel im Trigger-Fenster liegt – ist dem nicht so,
# wird KEIN API-Call abgesetzt.
#
# Benötigte Repo-Secrets (Settings → Secrets and variables → Actions):
#   RAPIDAPI_KEY               RapidAPI / API-Football Key.
#   FIREBASE_SERVICE_ACCOUNT   Service-Account-JSON als String.
#
# Optionale Repo-Variables (Settings → Secrets and variables → Actions
# → Tab Variables) – alle Defaults sind in tournament-config.js bzw.
# im Skript hinterlegt, hier nur Overrides ohne Code-Edit:
#   TOURNAMENT_KEY        Überschreibt das Default-Turnier aus
#                         tournament-config.js. Aktuell unterstützt:
#                         wm2026.
#   POINTS_WINDOW_START_MIN  Default 100 – untere Grenze des Trigger-
#                            Fensters in Minuten nach Anstoss.
#   POINTS_WINDOW_END_MIN    Default 260 – obere Grenze.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      tournament_key:
        description: "Turnier-Key (leer = Default aus tournament-config.js)."
        required: false
        type: string
        default: ""
      force_run:
        description: "Pre-Check überspringen und Workflow erzwingen (Catch-Up)."
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Nichts in Firestore schreiben – nur Logs."
        required: false
        type: boolean
        default: false

concurrency:
  group: auto-points-upload-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install script dependencies
        working-directory: scripts
        run: npm install --no-audit --no-fund --omit=dev

      - name: Run auto points upload
        working-directory: scripts
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TOURNAMENT_KEY: ${{ inputs.tournament_key != '' && inputs.tournament_key || vars.TOURNAMENT_KEY }}
          WINDOW_START_MIN: ${{ vars.POINTS_WINDOW_START_MIN }}
          WINDOW_END_MIN: ${{ vars.POINTS_WINDOW_END_MIN }}
          FORCE_RUN: ${{ inputs.force_run == true && '1' || '0' }}
          DRY_RUN: ${{ inputs.dry_run == true && '1' || '0' }}
        run: node auto-points-upload.js
