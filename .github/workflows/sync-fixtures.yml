name: Auto Spielplan-Sync

# Vollautomatischer Spielplan-Sync für das aktive Turnier laut
# tournament-config.js. Lädt einmal pro Tag (Cron) alle Fixtures +
# Stadiondaten von der API und schreibt sie nach Firestore.
#
# Zusätzlich manuell auslösbar via "Run workflow".
#
# Benötigte Repo-Secrets (Settings → Secrets and variables → Actions):
#   RAPIDAPI_KEY               RapidAPI / API-Football Key.
#   FIREBASE_SERVICE_ACCOUNT   Service-Account-JSON als String.
#
# Optionale Repo-Variable:
#   TOURNAMENT_KEY   Überschreibt das Default-Turnier aus
#                    tournament-config.js. Aktuell unterstützt: wm2026.
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      tournament_key:
        description: "Turnier-Key (leer = Default aus tournament-config.js)."
        required: false
        type: string
        default: ""
      dry_run:
        description: "Nichts in Firestore schreiben – nur Logs."
        required: false
        type: boolean
        default: false
      skip_venues:
        description: "Venue-Detail-Calls auslassen (spart API-Quota)."
        required: false
        type: boolean
        default: false

concurrency:
  group: sync-fixtures-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install script dependencies
        working-directory: scripts
        run: npm install --no-audit --no-fund --omit=dev

      - name: Run fixtures sync
        working-directory: scripts
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TOURNAMENT_KEY: ${{ inputs.tournament_key != '' && inputs.tournament_key || vars.TOURNAMENT_KEY }}
          DRY_RUN: ${{ inputs.dry_run == true && '1' || '0' }}
          SKIP_VENUES: ${{ inputs.skip_venues == true && '1' || '0' }}
        run: node sync-fixtures.js
