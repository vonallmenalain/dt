<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DreamTeam - Testseite</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --dark-bg: #0d1117;
            --gold: #ffd700;
            --card-w: clamp(178px, 36vw, 235px);
            --card-h: clamp(252px, 51vw, 322px);
            --blur: 14px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: var(--dark-bg);
            color: #e6edf3;
            min-height: 100svh;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            overflow: hidden;
        }

        .hero {
            position: relative;
            min-height: 100svh;
            width: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
            justify-items: center;
            padding: max(16px, env(safe-area-inset-top)) 16px max(22px, env(safe-area-inset-bottom));
            overflow: hidden;
            touch-action: pan-y;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 90% 70% at 50% 110%, rgba(40,167,69,0.45) 0%, transparent 65%),
                radial-gradient(ellipse 70% 50% at 50% 80%, rgba(40,167,69,0.25) 0%, transparent 55%),
                radial-gradient(ellipse 60% 40% at 20% 0%, rgba(255,215,0,0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 0%, rgba(40,167,69,0.18) 0%, transparent 50%),
                linear-gradient(180deg, #050a0e 0%, #0d1117 32%, #0d1f10 100%);
            z-index: 0;
        }

        .hero-title {
            position: relative;
            z-index: 2;
            font-size: clamp(2.15rem, 5.6vw, 3.8rem);
            font-weight: 900;
            line-height: 1.05;
            margin: 10px 0 0;
            letter-spacing: -1px;
            text-align: center;
        }

        .gold-text {
            background: linear-gradient(135deg, var(--gold), #fbbf24, #e5a800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .accent {
            background: linear-gradient(135deg, #4ade80, #22c55e, #16a34a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .carousel {
            position: relative;
            z-index: 2;
            width: min(100%, 940px);
            height: min(66svh, 510px);
            margin-top: clamp(12px, 3vh, 22px);
            perspective: 1100px;
            isolation: isolate;
            touch-action: pan-y;
            user-select: none;
            cursor: grab;
        }

        .carousel:active { cursor: grabbing; }

        .track {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .player-card {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            border-radius: 20px;
            overflow: hidden;
            padding: 12px;
            background:
                linear-gradient(165deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.06) 32%, rgba(7,13,20,0.85) 100%),
                radial-gradient(circle at 20% 0%, rgba(255,215,0,0.2), transparent 50%);
            border: 1px solid rgba(255,255,255,0.22);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(var(--blur));
            transition: box-shadow 0.25s ease;
            will-change: transform, opacity, filter;
        }

        .player-card img {
            width: 100%;
            height: 58%;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.18);
            pointer-events: none;
        }

        .player-card h3 {
            margin: 10px 0 3px;
            font-size: clamp(1rem, 2.8vw, 1.12rem);
        }

        .meta {
            margin: 0;
            color: rgba(230,237,243,0.78);
            font-size: 0.86rem;
            line-height: 1.35;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            font-size: 0.82rem;
            color: rgba(230,237,243,0.82);
        }

        .meta-icon {
            width: 18px;
            height: 18px;
            object-fit: contain;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
        }

        .draft-btn {
            margin-top: 10px;
            width: 100%;
            border: 1px solid rgba(34,197,94,0.55);
            background: linear-gradient(135deg, rgba(34,197,94,0.32), rgba(16,185,129,0.18));
            color: #d9ffe7;
            border-radius: 10px;
            padding: 8px 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .drafts {
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.86rem;
            font-weight: 700;
            background: rgba(255, 215, 0, 0.15);
            color: #ffe278;
            border: 1px solid rgba(255,215,0,0.38);
        }

        .hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.68;
            font-size: 0.78rem;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        @media (max-width: 560px) {
            .carousel { height: min(63svh, 420px); }
        }
    </style>
</head>
<body>
<section class="hero">
    <h1 class="hero-title">
        <span class="gold-text">EM 2024</span><br>
        <span class="accent">DreamTeam</span>
    </h1>

    <div class="carousel" id="carousel" aria-label="Karussell der meistgedrafteten Spieler">
        <div class="track" id="track"></div>
    </div>
</section>

<script>
const players = [
    {name: 'Cristiano Ronaldo', country: 'Portugal', countryFlag: 'https://media.api-sports.io/football/teams/27.png', club: 'Al Nassr', clubLogo: 'https://media.api-sports.io/football/teams/541.png', drafts: 7142, img: 'https://media.api-sports.io/football/players/874.png'},
    {name: 'Kylian Mbappé', country: 'France', countryFlag: 'https://media.api-sports.io/football/teams/2.png', club: 'Real Madrid', clubLogo: 'https://media.api-sports.io/football/teams/541.png', drafts: 6983, img: 'https://media.api-sports.io/football/players/278.png'},
    {name: 'Jamal Musiala', country: 'Germany', countryFlag: 'https://media.api-sports.io/football/teams/25.png', club: 'Bayern München', clubLogo: 'https://media.api-sports.io/football/teams/157.png', drafts: 6820, img: 'https://media.api-sports.io/football/players/145272.png'},
    {name: 'Jude Bellingham', country: 'England', countryFlag: 'https://media.api-sports.io/football/teams/10.png', club: 'Real Madrid', clubLogo: 'https://media.api-sports.io/football/teams/541.png', drafts: 6618, img: 'https://media.api-sports.io/football/players/2937.png'},
    {name: 'Florian Wirtz', country: 'Germany', countryFlag: 'https://media.api-sports.io/football/teams/25.png', club: 'Bayer 04 Leverkusen', clubLogo: 'https://media.api-sports.io/football/teams/168.png', drafts: 6464, img: 'https://media.api-sports.io/football/players/284529.png'},
    {name: 'Phil Foden', country: 'England', countryFlag: 'https://media.api-sports.io/football/teams/10.png', club: 'Manchester City', clubLogo: 'https://media.api-sports.io/football/teams/50.png', drafts: 6227, img: 'https://media.api-sports.io/football/players/978.png'},
    {name: 'Toni Kroos', country: 'Germany', countryFlag: 'https://media.api-sports.io/football/teams/25.png', club: 'Real Madrid', clubLogo: 'https://media.api-sports.io/football/teams/541.png', drafts: 6095, img: 'https://media.api-sports.io/football/players/190.png'},
    {name: 'Rodri', country: 'Spain', countryFlag: 'https://media.api-sports.io/football/teams/9.png', club: 'Manchester City', clubLogo: 'https://media.api-sports.io/football/teams/50.png', drafts: 5880, img: 'https://media.api-sports.io/football/players/546.png'},
    {name: 'Rafael Leão', country: 'Portugal', countryFlag: 'https://media.api-sports.io/football/teams/27.png', club: 'AC Milan', clubLogo: 'https://media.api-sports.io/football/teams/489.png', drafts: 5724, img: 'https://media.api-sports.io/football/players/1614.png'},
    {name: 'Kevin De Bruyne', country: 'Belgium', countryFlag: 'https://media.api-sports.io/football/teams/1.png', club: 'Manchester City', clubLogo: 'https://media.api-sports.io/football/teams/50.png', drafts: 5609, img: 'https://media.api-sports.io/football/players/629.png'},
    {name: 'Pedri', country: 'Spain', countryFlag: 'https://media.api-sports.io/football/teams/9.png', club: 'FC Barcelona', clubLogo: 'https://media.api-sports.io/football/teams/529.png', drafts: 5463, img: 'https://media.api-sports.io/football/players/284513.png'},
    {name: 'Kai Havertz', country: 'Germany', countryFlag: 'https://media.api-sports.io/football/teams/25.png', club: 'Arsenal', clubLogo: 'https://media.api-sports.io/football/teams/42.png', drafts: 5314, img: 'https://media.api-sports.io/football/players/1218.png'},
    {name: 'Virgil van Dijk', country: 'Netherlands', countryFlag: 'https://media.api-sports.io/football/teams/1118.png', club: 'Liverpool', clubLogo: 'https://media.api-sports.io/football/teams/40.png', drafts: 5217, img: 'https://media.api-sports.io/football/players/549.png'},
    {name: 'Álvaro Morata', country: 'Spain', countryFlag: 'https://media.api-sports.io/football/teams/9.png', club: 'Atlético Madrid', clubLogo: 'https://media.api-sports.io/football/teams/530.png', drafts: 5108, img: 'https://media.api-sports.io/football/players/765.png'},
    {name: 'Niclas Füllkrug', country: 'Germany', countryFlag: 'https://media.api-sports.io/football/teams/25.png', club: 'Borussia Dortmund', clubLogo: 'https://media.api-sports.io/football/teams/165.png', drafts: 4985, img: 'https://media.api-sports.io/football/players/2907.png'}
];

const track = document.getElementById('track');
const carousel = document.getElementById('carousel');
const cards = players.map((p) => {
    const el = document.createElement('article');
    el.className = 'player-card';
    el.innerHTML = `
        <img loading="lazy" src="${p.img}" alt="${p.name}">
        <h3>${p.name}</h3>
        <div class="meta-row"><img class="meta-icon" loading="lazy" src="${p.countryFlag}" alt="${p.country}"><span>${p.country}</span></div>
        <div class="meta-row"><img class="meta-icon" loading="lazy" src="${p.clubLogo}" alt="${p.club}"><span>${p.club}</span></div>
        <button class="draft-btn" type="button">Draft</button>
        <div class="drafts">⚡ ${p.drafts.toLocaleString('de-DE')}x von Managern gewählt</div>
    `;
    track.appendChild(el);
    return el;
});

const state = {pos: 0, vel: 0, drag: false, lastX: 0, lastT: 0};
let cardGap = 168;
let raf = null;

function resizeCarousel() {
    const w = carousel.clientWidth;
    cardGap = Math.max(128, Math.min(212, w * 0.26));
}

function mod(a, n) { return ((a % n) + n) % n; }

function render() {
    const n = cards.length;
    for (let i = 0; i < n; i++) {
        let delta = i - state.pos;
        delta = mod(delta + n / 2, n) - n / 2;

        const abs = Math.abs(delta);
        const clamped = Math.min(abs, 4.6);
        const x = delta * cardGap;
        const scale = 1 - clamped * 0.12;
        const z = 300 - clamped * 85;
        const rotY = delta * -8;
        const y = clamped * 9;
        const op = 1 - clamped * 0.16;

        const card = cards[i];
        card.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateY(${rotY}deg) scale(${scale})`;
        card.style.opacity = String(Math.max(0, op));
        card.style.filter = `saturate(${1.1 - clamped * 0.1}) blur(${Math.max(0, clamped - 2.2) * 0.9}px)`;
        card.style.zIndex = String(Math.round(1000 - clamped * 100));
        card.style.boxShadow = abs < 0.38
            ? '0 20px 50px rgba(0,0,0,0.58), 0 0 38px rgba(255,215,0,0.2)'
            : '0 14px 36px rgba(0,0,0,0.42)';
        card.style.pointerEvents = abs < 0.5 ? 'auto' : 'none';
    }
}

function tick() {
    if (!state.drag) {
        state.pos += state.vel;
        state.vel *= 0.92;
        if (Math.abs(state.vel) < 0.0005) {
            const target = Math.round(state.pos);
            state.pos += (target - state.pos) * 0.08;
        }
    }

    if (state.pos >= players.length) state.pos -= players.length;
    if (state.pos < 0) state.pos += players.length;

    render();
    raf = requestAnimationFrame(tick);
}

function pointerDown(clientX) {
    state.drag = true;
    state.lastX = clientX;
    state.lastT = performance.now();
}

function pointerMove(clientX) {
    if (!state.drag) return;
    const now = performance.now();
    const dx = clientX - state.lastX;
    const dt = Math.max(8, now - state.lastT);
    const units = dx / cardGap;

    state.pos -= units;
    state.vel = (state.vel * 0.7) + ((-units / dt) * 16);

    state.lastX = clientX;
    state.lastT = now;
}

function pointerUp() {
    state.drag = false;
}

carousel.addEventListener('pointerdown', (e) => {
    carousel.setPointerCapture(e.pointerId);
    pointerDown(e.clientX);
});
carousel.addEventListener('pointermove', (e) => pointerMove(e.clientX));
carousel.addEventListener('pointerup', pointerUp);
carousel.addEventListener('pointercancel', pointerUp);
carousel.addEventListener('lostpointercapture', pointerUp);

carousel.addEventListener('wheel', (e) => {
    e.preventDefault();
    const speed = (Math.abs(e.deltaY) > Math.abs(e.deltaX) ? e.deltaY : e.deltaX) * 0.0012;
    state.vel += speed;
}, {passive: false});

window.addEventListener('resize', resizeCarousel, {passive: true});
resizeCarousel();
render();
tick();
</script>
</body>
</html>
