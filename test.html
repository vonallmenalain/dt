<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DreamTeam - Testseite</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --dark-bg: #0d1117;
            --gold: #ffd700;
            --card-w: clamp(98px, 16.5vw, 128px);
            --card-h: clamp(148px, 24.8vw, 188px);
            --blur: 14px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: var(--dark-bg);
            color: #e6edf3;
            min-height: 100svh;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .hero {
            position: relative;
            min-height: 100svh;
            width: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
            justify-items: center;
            padding: max(16px, env(safe-area-inset-top)) 16px max(22px, env(safe-area-inset-bottom));
            overflow: hidden;
            touch-action: pan-y;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 90% 70% at 50% 110%, rgba(40,167,69,0.45) 0%, transparent 65%),
                radial-gradient(ellipse 70% 50% at 50% 80%, rgba(40,167,69,0.25) 0%, transparent 55%),
                radial-gradient(ellipse 60% 40% at 20% 0%, rgba(255,215,0,0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 0%, rgba(40,167,69,0.18) 0%, transparent 50%),
                linear-gradient(180deg, #050a0e 0%, #0d1117 32%, #0d1f10 100%);
            z-index: 0;
        }

        .hero-title {
            position: relative;
            z-index: 2;
            font-size: clamp(2.15rem, 5.6vw, 3.8rem);
            font-weight: 900;
            line-height: 1.05;
            margin: 10px 0 0;
            letter-spacing: -1px;
            text-align: center;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .gold-text {
            background: linear-gradient(135deg, var(--gold), #fbbf24, #e5a800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .accent {
            background: linear-gradient(135deg, #4ade80, #22c55e, #16a34a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .carousel {
            position: relative;
            z-index: 2;
            width: min(66vw, 620px);
            height: min(48svh, 360px);
            margin-top: 6px;
            perspective: 1100px;
            isolation: isolate;
            touch-action: pan-y;
            user-select: none;
            cursor: grab;
        }

        .carousel:active { cursor: grabbing; }
        .manager-carousel-card {
            justify-content: space-between;
            padding: 12px 10px 14px;
            gap: 12px;
        }
        .manager-card-rank {
            position: absolute;
            top: 10px;
            left: 10px;
            min-width: 48px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 950;
            letter-spacing: 0.02em;
            color: #0b1020;
            background: linear-gradient(140deg, #fff0a8, #ffd700 55%, #ca9200);
            border: 2px solid rgba(11,16,32,0.45);
            box-shadow: 0 8px 18px rgba(0,0,0,0.48), 0 0 0 2px rgba(255,215,0,0.22);
            z-index: 2;
        }
        .manager-carousel-card[data-rank="2"] .manager-card-rank { background: linear-gradient(140deg, #f8fafc, #d3dce9 55%, #7b8ca3); }
        .manager-carousel-card[data-rank="3"] .manager-card-rank { background: linear-gradient(140deg, #f6dfca, #d69869 55%, #8d552a); color: #fff; }
        .manager-card-name {
            margin: 38px 0 4px;
            text-align: center;
            font-weight: 950;
            font-size: clamp(0.92rem, 2.2vw, 1.05rem);
            line-height: 1.06;
            letter-spacing: -0.02em;
            color: #f8fbff;
            text-shadow: 0 0 14px rgba(255,255,255,0.08);
        }
        .manager-card-points {
            align-self: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 900;
            color: #fde68a;
            background: rgba(250,204,21,0.12);
            border: 1px solid rgba(250,204,21,0.42);
        }
        .manager-card-topplayers {
            margin-top: auto;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 0;
            width: 100%;
            min-height: 82px;
        }
        .manager-card-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            min-width: 0;
            width: 54px;
            position: relative;
        }
        .manager-card-player-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            overflow: hidden;
            border: 1.8px solid rgba(255,255,255,0.42);
            box-shadow: 0 4px 10px rgba(0,0,0,0.35);
            position: relative;
            background: #0f172a;
        }
        .manager-card-player-avatar img { width:100%; height:100%; object-fit:cover; }
        .manager-card-player.rank-2,
        .manager-card-player.rank-3 {
            transform: translateY(8px);
            z-index: 1;
        }
        .manager-card-player.rank-1 {
            width: 76px;
            z-index: 3;
            margin: 0 -8px;
        }
        .manager-card-player.rank-1 .manager-card-player-avatar {
            width: 76px;
            height: 76px;
            border-width: 2.2px;
            border-color: rgba(255,215,0,0.62);
            box-shadow: 0 0 0 2px rgba(255,215,0,0.26), 0 8px 16px rgba(0,0,0,0.44);
        }
        .manager-card-player.rank-2 { z-index: 2; margin-right: -5px; }
        .manager-card-player.rank-3 { z-index: 1; margin-left: -5px; }
        .manager-card-player-name {
            width: 100%;
            font-size: 0.62rem;
            font-weight: 700;
            line-height: 1.05;
            text-align: center;
            color: rgba(230,237,243,0.92);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .manager-card-player-points {
            font-size: 0.62rem;
            font-weight: 800;
            color: #86efac;
            line-height: 1;
        }
        .captain-badge { position:absolute; right:-2px; bottom:-2px; width:18px; height:18px; border-radius:50%; background:#f97316; color:#fff; font-size:0.66rem; font-weight:900; display:grid; place-items:center; border:1px solid rgba(0,0,0,0.35); }
        .manager-carousel-card[data-rank="1"] {
            background:
                linear-gradient(165deg, rgba(74,57,11,0.95) 0%, rgba(54,39,10,0.96) 62%, rgba(33,24,8,0.98) 100%),
                radial-gradient(circle at 22% 0%, rgba(255,215,0,0.34), transparent 54%);
            border-color: rgba(255,215,0,0.45);
        }
        .manager-carousel-card[data-rank="2"] {
            background:
                linear-gradient(165deg, rgba(48,56,70,0.95) 0%, rgba(37,43,58,0.97) 62%, rgba(24,29,43,0.98) 100%),
                radial-gradient(circle at 22% 0%, rgba(226,232,240,0.28), transparent 54%);
            border-color: rgba(203,213,225,0.4);
        }
        .manager-carousel-card[data-rank="3"] {
            background:
                linear-gradient(165deg, rgba(70,44,30,0.95) 0%, rgba(58,36,24,0.97) 62%, rgba(41,26,18,0.98) 100%),
                radial-gradient(circle at 22% 0%, rgba(214,138,82,0.34), transparent 54%);
            border-color: rgba(214,138,82,0.42);
        }

        .track {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .player-card {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            border-radius: 20px;
            overflow: hidden;
            padding: 9px;
            display: flex;
            flex-direction: column;
            gap: 7px;
            background:
                linear-gradient(165deg, rgba(29,39,59,0.95) 0%, rgba(19,27,43,0.96) 65%, rgba(13,18,31,0.98) 100%),
                radial-gradient(circle at 20% 0%, rgba(255,215,0,0.14), transparent 52%);
            border: 1px solid rgba(255,255,255,0.16);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(var(--blur));
            transition: box-shadow 0.25s ease;
            will-change: transform, opacity, filter;
        }

        .player-photo-wrap {
            width: 78%;
            aspect-ratio: 1 / 1;
            align-self: center;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.04);
            display: grid;
            place-items: center;
            padding: 0;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 4px 10px rgba(8, 15, 27, 0.15);
        }

        .player-photo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
            pointer-events: none;
        }

        .player-info {
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .player-name {
            margin: 0;
            width: 100%;
            max-width: 100%;
            min-width: 0;
            font-size: clamp(0.78rem, 1.9vw, 0.96rem);
            line-height: 1.06;
            font-weight: 900;
            letter-spacing: -0.035em;
            color: #f8fbff;
            display: block;
            white-space: nowrap;
            overflow: visible;
            text-overflow: clip;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
            font-size: 0.72rem;
            line-height: 1.2;
            color: rgba(230,237,243,0.84);
        }

        .meta-row span {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .meta-icon {
            width: 17px;
            height: 17px;
            flex: 0 0 17px;
            object-fit: contain;
            border-radius: 0;
            border: 0;
            background: transparent;
            padding: 0;
        }

        .flag-icon {
            object-fit: cover;
            border-radius: 0;
        }

        .drafts {
            margin-top: 4px;
            width: fit-content;
            max-width: 100%;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            background: linear-gradient(135deg, rgba(34,197,94,0.26), rgba(250,204,21,0.18));
            color: #e8f7da;
            border: 1px solid rgba(134,239,172,0.42);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .drafts strong {
            color: #fef08a;
            font-weight: 800;
        }

        .hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.68;
            font-size: 0.78rem;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        /* ================================================================
           HERO: „Live Champions Stage" – Prototyp oberhalb des Karussells
           Eigener Namespace `champ-` damit die bestehende Karussell-CSS
           absolut unverändert bleibt.
           ================================================================ */
        .champ-stage {
            position: relative;
            width: 100%;
            padding: max(22px, env(safe-area-inset-top)) 16px 26px;
            overflow: hidden;
            isolation: isolate;
            background:
                radial-gradient(ellipse 70% 55% at 50% 10%, rgba(255,215,0,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 80% 60% at 50% 100%, rgba(34,197,94,0.42) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 15% 85%, rgba(40,167,69,0.35) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 85% 85%, rgba(40,167,69,0.35) 0%, transparent 60%),
                linear-gradient(180deg, #050a0e 0%, #0b1a14 45%, #0d2418 100%);
            border-bottom: 1px solid rgba(255,215,0,0.18);
        }

        .champ-stage::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 90px),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 60px);
            mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 35%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 35%, transparent 80%);
            pointer-events: none;
            z-index: 0;
        }

        .champ-spotlight {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 60%;
            background: radial-gradient(ellipse 50% 100% at 50% 0%, rgba(255,215,0,0.28), transparent 70%);
            filter: blur(8px);
            pointer-events: none;
            z-index: 0;
            animation: champ-spotlight-pulse 4s ease-in-out infinite;
        }

        @keyframes champ-spotlight-pulse {
            0%, 100% { opacity: 0.55; transform: translateX(-50%) scale(1); }
            50%      { opacity: 0.95; transform: translateX(-50%) scale(1.05); }
        }

        .champ-header {
            position: relative;
            z-index: 2;
            text-align: center;
            margin: 0 auto 14px;
            max-width: 920px;
        }

        .champ-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #fef3c7;
            background: linear-gradient(135deg, rgba(34,197,94,0.35), rgba(255,215,0,0.22));
            border: 1px solid rgba(255,215,0,0.45);
            box-shadow: 0 0 18px rgba(255,215,0,0.18), inset 0 0 12px rgba(34,197,94,0.18);
        }

        .champ-eyebrow .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 0 0 rgba(239,68,68,0.8);
            animation: champ-live 1.4s ease-out infinite;
        }

        @keyframes champ-live {
            0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.85); }
            100% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
        }

        .champ-title {
            margin: 10px 0 4px;
            font-size: clamp(1.7rem, 5vw, 3rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -1px;
        }

        .champ-subtitle {
            margin: 0;
            font-size: clamp(0.82rem, 1.9vw, 1rem);
            color: rgba(230,237,243,0.72);
            font-weight: 500;
        }

        /* Stage – Podest mit 3D-Karten */
        .champ-arena {
            position: relative;
            z-index: 2;
            width: min(94vw, 940px);
            margin: 0 auto;
            perspective: 1600px;
            perspective-origin: 50% 38%;
        }

        .champ-podium {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: clamp(6px, 1.6vw, 22px);
            padding: 64px 4px 28px;
            transform-style: preserve-3d;
        }

        .champ-card {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
            padding: 14px 12px 14px;
            border-radius: 22px;
            user-select: none;
            font-family: inherit;
            color: inherit;
            text-align: center;
            transform-style: preserve-3d;
            background:
                linear-gradient(165deg, rgba(29,39,59,0.96) 0%, rgba(19,27,43,0.97) 60%, rgba(10,18,12,0.98) 100%),
                radial-gradient(circle at 30% 0%, rgba(34,197,94,0.18), transparent 55%);
            border: 1px solid rgba(255,255,255,0.14);
            box-shadow:
                0 24px 50px rgba(0,0,0,0.55),
                0 0 0 1px rgba(255,255,255,0.04) inset;
            backdrop-filter: blur(10px);
            transition: transform 0.35s cubic-bezier(0.22, 0.85, 0.4, 1.05),
                        box-shadow 0.35s ease,
                        border-color 0.35s ease,
                        filter 0.35s ease;
            will-change: transform, opacity;
            opacity: 0;
        }

        .champ-card:focus-visible {
            outline: 2px solid #ffd700;
            outline-offset: 4px;
        }

        .champ-card .champ-rank-badge {
            position: absolute;
            top: -14px;
            left: -14px;
            min-width: 36px;
            height: 36px;
            padding: 0 10px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            font-weight: 900;
            font-size: 0.95rem;
            color: #0d1117;
            background: linear-gradient(135deg, #ffe97a, #ffd700 55%, #c79500);
            border: 2px solid rgba(13,17,23,0.55);
            box-shadow: 0 8px 22px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,215,0,0.18);
            transform: translateZ(40px);
        }

        .champ-card[data-rank="2"] .champ-rank-badge {
            background: linear-gradient(135deg, #f1f5f9, #cbd5e1 55%, #64748b);
        }
        .champ-card[data-rank="3"] .champ-rank-badge {
            background: linear-gradient(135deg, #fcd9b6, #d68a52 55%, #8a4a26);
            color: #fff;
        }

        /* Fallback-Avatar (wenn keine Spielerdaten vorhanden sind) */
        .champ-avatar {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            display: grid;
            place-items: center;
            font-weight: 900;
            font-size: clamp(1.4rem, 3.5vw, 2rem);
            color: #f8fbff;
            letter-spacing: -1px;
            background:
                radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), transparent 55%),
                linear-gradient(160deg, #1e293b, #0f172a 70%);
            border: 1px solid rgba(255,255,255,0.14);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 6px 16px rgba(0,0,0,0.35);
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        /* Top-Spieler-Liste innerhalb der Karte: Foto + Name + Punkte je Spieler */
        .champ-top-players {
            list-style: none;
            margin: 0;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-radius: 16px;
            background:
                radial-gradient(circle at 30% 0%, rgba(255,255,255,0.06), transparent 60%),
                linear-gradient(160deg, rgba(15,23,42,0.85), rgba(5,10,18,0.92));
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 6px 16px rgba(0,0,0,0.35);
        }

        .champ-top-player {
            display: grid;
            grid-template-columns: 28px 1fr auto;
            align-items: center;
            gap: 8px;
            padding: 4px 6px;
            border-radius: 10px;
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.05);
            min-width: 0;
        }

        .champ-top-player .ctp-photo {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        .champ-top-player .ctp-photo-fallback {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 0.62rem;
            font-weight: 900;
            color: #f8fbff;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255,255,255,0.18);
            letter-spacing: -0.5px;
        }

        .champ-top-player .ctp-name {
            min-width: 0;
            font-size: 0.74rem;
            font-weight: 700;
            color: #e6edf3;
            text-align: left;
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .champ-top-player .ctp-pts {
            font-size: 0.78rem;
            font-weight: 900;
            color: #fde68a;
            letter-spacing: 0.2px;
            text-shadow: 0 0 8px rgba(255,215,0,0.25);
        }

        .champ-top-player .ctp-captain {
            display: inline-block;
            margin-left: 4px;
            padding: 0 4px;
            font-size: 0.55rem;
            font-weight: 900;
            color: #0d1117;
            background: linear-gradient(135deg, #ffe97a, #ffd700);
            border-radius: 4px;
            vertical-align: middle;
            letter-spacing: 0.04em;
        }

        .champ-card[data-rank="1"] .champ-top-players {
            background:
                radial-gradient(circle at 30% 0%, rgba(255,215,0,0.12), transparent 60%),
                linear-gradient(160deg, rgba(60,46,16,0.85), rgba(20,15,5,0.92));
            border-color: rgba(255,215,0,0.28);
        }
        .champ-card[data-rank="1"] .champ-top-player .ctp-photo,
        .champ-card[data-rank="1"] .champ-top-player .ctp-photo-fallback {
            border-color: rgba(255,215,0,0.45);
            box-shadow: 0 2px 8px rgba(255,215,0,0.25);
        }
        .champ-card[data-rank="1"] .champ-top-player .ctp-name {
            color: #fef9c3;
        }

        .champ-name {
            margin: 0;
            font-size: clamp(0.86rem, 2vw, 1.05rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #f8fbff;
            text-align: center;
            line-height: 1.1;
            align-self: center;
        }

        .champ-points {
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            gap: 5px;
            font-weight: 900;
            color: #fde68a;
            font-size: clamp(1rem, 2.6vw, 1.35rem);
            letter-spacing: 0.5px;
            text-shadow: 0 0 18px rgba(255,215,0,0.35);
            align-self: center;
        }

        .champ-points small {
            font-size: 0.62em;
            font-weight: 700;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .champ-trend {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 9px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
        }

        .champ-trend.up {
            color: #bbf7d0;
            background: rgba(34,197,94,0.18);
            border: 1px solid rgba(34,197,94,0.45);
        }
        .champ-trend.down {
            color: #fecaca;
            background: rgba(239,68,68,0.16);
            border: 1px solid rgba(239,68,68,0.45);
        }
        .champ-trend.neutral {
            color: rgba(230,237,243,0.78);
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.18);
        }

        /* Platzierungen – Flex-Reihenfolge erzeugt das Podest:
           Rang 2 links, Rang 1 in der Mitte (höchste Karte), Rang 3 rechts.
           Durch Flex statt Absolute liegen die Karten nebeneinander, sodass
           Klicks auf Rang 2 und 3 nicht mehr von Rang 1 verdeckt werden. */
        .champ-card[data-rank="1"] {
            order: 2;
            flex: 1 1 0;
            max-width: clamp(190px, 32vw, 280px);
            z-index: 5;
            padding-bottom: 22px;
            border-color: rgba(255,215,0,0.55);
            background:
                linear-gradient(165deg, rgba(40,33,18,0.95) 0%, rgba(20,17,8,0.97) 65%, rgba(10,8,4,0.98) 100%),
                radial-gradient(circle at 30% 0%, rgba(255,215,0,0.32), transparent 55%);
            box-shadow:
                0 30px 60px rgba(0,0,0,0.6),
                0 0 50px rgba(255,215,0,0.35),
                0 0 0 1px rgba(255,215,0,0.4) inset;
        }
        .champ-card[data-rank="1"] .champ-name {
            color: #fef3c7;
            font-size: clamp(0.95rem, 2.2vw, 1.15rem);
        }

        .champ-card[data-rank="2"] {
            order: 1;
            flex: 1 1 0;
            max-width: clamp(150px, 25vw, 220px);
            z-index: 4;
        }
        .champ-card[data-rank="3"] {
            order: 3;
            flex: 1 1 0;
            max-width: clamp(150px, 25vw, 220px);
            z-index: 4;
        }

        /* Krone für #1 */
        .champ-crown {
            position: absolute;
            top: -38px;
            left: 50%;
            transform: translate(-50%, 0) translateZ(50px);
            width: clamp(46px, 9vw, 64px);
            height: auto;
            filter: drop-shadow(0 6px 14px rgba(255,215,0,0.55));
            pointer-events: none;
        }

        @keyframes champ-crown-bob {
            0%, 100% { transform: translate(-50%, 0) translateZ(50px); }
            50%      { transform: translate(-50%, -6px) translateZ(50px); }
        }

        /* Verfolger-Karten Platz 4–10 (Top 10).
           Wir verwenden ein automatisch umbrechendes Grid: zwei Spalten
           breit auf Desktop/Tablet (oder mehr, wenn der Platz reicht),
           eine Spalte auf schmalen Mobil-Displays. So lassen sich alle
           sieben Verfolger gleichmässig anzeigen, ohne dass der Bereich
           überfüllt wirkt oder zu lange wird. */
        .champ-chasers {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: clamp(8px, 2vw, 14px);
            margin: 22px auto 0;
            width: min(94vw, 940px);
        }

        .champ-chaser {
            position: relative;
            display: grid;
            grid-template-columns: 36px 1fr auto;
            align-items: center;
            gap: 10px;
            padding: 10px 14px 10px 10px;
            min-width: 0;
            text-align: left;
            font-family: inherit;
            color: inherit;
            border-radius: 14px;
            background:
                linear-gradient(135deg, rgba(29,39,59,0.92), rgba(13,18,31,0.95));
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 24px rgba(0,0,0,0.4);
            cursor: pointer;
            opacity: 0;
            transform: translateY(18px);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .champ-chaser:hover {
            transform: translateY(-4px);
            border-color: rgba(255,215,0,0.35);
            box-shadow: 0 14px 28px rgba(0,0,0,0.45), 0 0 22px rgba(255,215,0,0.15);
        }

        .champ-chaser .champ-rank-mini {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            font-weight: 900;
            font-size: 0.95rem;
            color: #f1f5f9;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.15);
        }

        .champ-chaser .champ-chaser-info {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .champ-chaser .champ-chaser-name {
            font-weight: 800;
            font-size: 0.92rem;
            color: #f8fbff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .champ-chaser .champ-chaser-trend {
            font-size: 0.7rem;
            color: rgba(230,237,243,0.7);
        }
        .champ-chaser .champ-chaser-points {
            font-weight: 900;
            color: #fde68a;
            font-size: 1rem;
        }
        .champ-chaser .champ-chaser-points small {
            display: block;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.55);
            font-weight: 700;
            text-align: right;
            letter-spacing: 0.06em;
        }

        /* Intro-Animationen: dramatischer Aufbau über ~4–5 Sekunden.
           Reihenfolge: erst Rang 3 (rechts), dann Rang 2 (links), zum Schluss
           steigt Rang 1 in der Mitte hoch und wird gekrönt. Danach kommen
           die Verfolger (Rang 4 + 5) hinterher. Innerhalb jeder Hero-Karte
           erscheinen Vorname → Top-Spieler → weitere Spieler → Punkte. */
        .champ-card[data-rank="1"] {
            transform: translateY(140px) translateZ(-320px) scale(0.58);
            transform-origin: 50% 100%;
            animation: champ-fly-in-1 1.55s cubic-bezier(0.22, 0.85, 0.32, 1.05) 1.6s forwards;
        }
        .champ-card[data-rank="2"] {
            transform: translateX(-280px) translateZ(-130px) rotateY(28deg) scale(0.62);
            transform-origin: 100% 100%;
            animation: champ-fly-in-2 1.25s cubic-bezier(0.22, 0.85, 0.32, 1.05) 0.85s forwards;
        }
        .champ-card[data-rank="3"] {
            transform: translateX(280px) translateZ(-130px) rotateY(-28deg) scale(0.62);
            transform-origin: 0% 100%;
            animation: champ-fly-in-3 1.25s cubic-bezier(0.22, 0.85, 0.32, 1.05) 0.25s forwards;
        }

        @keyframes champ-fly-in-1 {
            0%   { opacity: 0; transform: translateY(120px) translateZ(-300px) scale(0.6); }
            55%  { opacity: 1; transform: translateY(-12px) translateZ(60px) scale(1.06); }
            80%  { opacity: 1; transform: translateY(2px) translateZ(40px) scale(0.99); }
            100% { opacity: 1; transform: translateY(0) translateZ(30px) scale(1); }
        }
        @keyframes champ-fly-in-2 {
            0%   { opacity: 0; transform: translateX(-260px) translateZ(-120px) rotateY(28deg) scale(0.65); }
            70%  { opacity: 1; transform: translateX(8px) translateZ(-10px) rotateY(10deg) scale(0.96); }
            100% { opacity: 1; transform: translateX(0) translateZ(-25px) rotateY(14deg) scale(0.92); }
        }
        @keyframes champ-fly-in-3 {
            0%   { opacity: 0; transform: translateX(260px) translateZ(-120px) rotateY(-28deg) scale(0.65); }
            70%  { opacity: 1; transform: translateX(-8px) translateZ(-10px) rotateY(-10deg) scale(0.96); }
            100% { opacity: 1; transform: translateX(0) translateZ(-25px) rotateY(-14deg) scale(0.92); }
        }

        /* Krone erscheint erst, nachdem Rang 1 oben angekommen ist (~3.1s) */
        .champ-crown {
            opacity: 0;
            animation: champ-crown-drop 0.95s cubic-bezier(0.22, 0.85, 0.32, 1.05) 3.1s forwards,
                       champ-crown-bob 2.8s ease-in-out 4.1s infinite;
        }

        @keyframes champ-crown-drop {
            0%   { opacity: 0; transform: translate(-50%, -120px) translateZ(50px) scale(0.4) rotate(-25deg); }
            60%  { opacity: 1; transform: translate(-50%, 8px) translateZ(50px) scale(1.1) rotate(8deg); }
            100% { opacity: 1; transform: translate(-50%, 0) translateZ(50px) scale(1) rotate(0); }
        }

        /* Generischer Einflug für alle Verfolger-Karten (Plätze 4–10).
           Die individuelle Verzögerung wird per Inline-Style über
           `--chaser-delay` gesetzt, damit die Karten nacheinander
           erscheinen statt alle gleichzeitig. */
        .champ-chaser {
            animation: champ-chaser-in 0.7s cubic-bezier(0.22, 0.85, 0.32, 1.05) var(--chaser-delay, 3.7s) forwards;
        }

        @keyframes champ-chaser-in {
            from { opacity: 0; transform: translateY(24px) scale(0.94); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Sobald is-ready gesetzt wird, wird die Einflug-Animation per JS auf `none` gesetzt.
           Danach greifen die :hover-Regeln normal über den Cascade. */
        .champ-card.is-ready {
            animation: none !important;
            opacity: 1;
        }
        .champ-card.is-ready[data-rank="1"] {
            transform: translateY(0) translateZ(30px) scale(1);
        }
        .champ-card.is-ready[data-rank="2"] {
            transform: translateX(0) translateZ(-25px) rotateY(14deg) scale(0.92);
        }
        .champ-card.is-ready[data-rank="3"] {
            transform: translateX(0) translateZ(-25px) rotateY(-14deg) scale(0.92);
        }

        /* Hover-Tilt für Top-Karten */
        @media (hover: hover) {
            .champ-card.is-ready[data-rank="1"]:hover {
                transform: translateY(-6px) translateZ(60px) scale(1.04) !important;
                box-shadow: 0 36px 70px rgba(0,0,0,0.65), 0 0 60px rgba(255,215,0,0.55), 0 0 0 1px rgba(255,215,0,0.5) inset;
            }
            .champ-card.is-ready[data-rank="2"]:hover {
                transform: translateX(0) translateZ(15px) rotateY(6deg) scale(0.97) !important;
                box-shadow: 0 28px 55px rgba(0,0,0,0.6), 0 0 40px rgba(203,213,225,0.35), 0 0 0 1px rgba(203,213,225,0.4) inset;
                border-color: rgba(203,213,225,0.65);
            }
            .champ-card.is-ready[data-rank="3"]:hover {
                transform: translateX(0) translateZ(15px) rotateY(-6deg) scale(0.97) !important;
                box-shadow: 0 28px 55px rgba(0,0,0,0.6), 0 0 40px rgba(214,138,82,0.4), 0 0 0 1px rgba(214,138,82,0.5) inset;
                border-color: rgba(214,138,82,0.65);
            }
        }

        /* ================================================================
           NEW: Manager Hero Card Layout
           Vorname (Hero) ─ Player Constellation ─ Punkte (Link)
           Erhält das bestehende Podest und seine Animation, ersetzt nur
           den Inhalt (Spieler-Liste) durch eine emotionale Sammelkarte.
           ================================================================ */
        .manager-hero-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: clamp(300px, 38vw, 380px);
            padding: 18px 12px 14px;
        }

        .manager-firstname {
            position: relative;
            display: block;
            margin: 0 0 2px;
            padding: 4px 6px 6px;
            font-weight: 950;
            line-height: 0.96;
            letter-spacing: -0.04em;
            font-size: clamp(1.6rem, 4.6vw, 2.6rem);
            color: #f8fbff;
            text-shadow: 0 4px 22px rgba(0,0,0,0.55), 0 0 18px rgba(255,255,255,0.06);
            cursor: pointer;
            background: none;
            border: 0;
            font-family: inherit;
            text-align: center;
            width: 100%;
            transition: transform 0.25s ease, color 0.25s ease, text-shadow 0.25s ease;
            opacity: 0;
            transform: translateY(-12px) scale(0.94);
            -webkit-tap-highlight-color: transparent;
            z-index: 6;
            word-break: break-word;
        }
        .manager-firstname::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: 0;
            width: 38%;
            height: 2px;
            transform: translateX(-50%) scaleX(0);
            transform-origin: 50% 50%;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.65), transparent);
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0.6;
            border-radius: 2px;
            pointer-events: none;
        }
        .manager-firstname:hover { transform: translateY(-1px) scale(1.02); }
        .manager-firstname:hover::after { transform: translateX(-50%) scaleX(1); opacity: 1; }
        .manager-firstname:focus-visible {
            outline: 2px solid #ffd700;
            outline-offset: 4px;
            border-radius: 8px;
        }
        .champ-card[data-rank="1"] .manager-firstname {
            color: #fef3c7;
            font-size: clamp(1.85rem, 5.2vw, 3rem);
            text-shadow: 0 4px 26px rgba(0,0,0,0.6), 0 0 22px rgba(255,215,0,0.35);
        }
        .champ-card[data-rank="2"] .manager-firstname { color: #f1f5f9; }
        .champ-card[data-rank="3"] .manager-firstname { color: #fde7d4; }

        /* Player Constellation – Top-Spieler in organischer Anordnung */
        .manager-player-constellation {
            position: relative;
            width: 100%;
            flex: 1 1 auto;
            min-height: clamp(150px, 20vw, 220px);
            margin: 6px 0 8px;
            isolation: isolate;
        }

        .manager-player-orb {
            position: absolute;
            border: 0;
            padding: 0;
            background: transparent;
            font-family: inherit;
            color: inherit;
            cursor: pointer;
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.22, 0.85, 0.4, 1.05),
                        box-shadow 0.3s ease,
                        filter 0.3s ease;
            opacity: 0;
            /* Centering läuft über die eigenständige `translate`-Property,
               damit das `transform` ausschließlich von Pop-/Float-Animationen
               und Hover-States verwendet wird. So entstehen keine
               Verschiebungs-Sprünge beim Übergang zwischen den Animationen
               und der Browser kann den Orb dauerhaft auf einer GPU-Schicht
               kompositieren – die Float-Bewegung läuft dadurch von Anfang
               an flüssig statt ruckhaft. */
            translate: -50% -50%;
            transform: scale(0.4);
            transform-origin: 50% 50%;
            -webkit-tap-highlight-color: transparent;
            will-change: transform, opacity;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .manager-player-orb-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            background:
                radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), transparent 55%),
                linear-gradient(160deg, #1e293b, #0f172a 70%);
            border: 2px solid rgba(255,255,255,0.4);
            box-shadow:
                0 8px 22px rgba(0,0,0,0.55),
                0 0 0 1px rgba(255,255,255,0.06) inset;
            display: grid;
            place-items: center;
        }
        .manager-player-orb-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .manager-player-orb-fallback {
            font-weight: 900;
            color: #f8fbff;
            letter-spacing: -0.03em;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .manager-player-orb .orb-cap {
            position: absolute;
            right: -2px;
            top: -2px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 0.7rem;
            font-weight: 900;
            color: #0d1117;
            background: linear-gradient(135deg, #ffe97a, #ffd700 55%, #c79500);
            border: 1.5px solid rgba(13,17,23,0.6);
            box-shadow: 0 3px 8px rgba(0,0,0,0.5);
            z-index: 3;
            pointer-events: none;
        }
        .manager-player-orb .orb-pts {
            position: absolute;
            left: 50%;
            bottom: -8px;
            transform: translateX(-50%);
            padding: 2px 7px;
            border-radius: 999px;
            font-size: 0.62rem;
            font-weight: 900;
            color: #0d1117;
            background: linear-gradient(135deg, #fef9c3, #fde68a);
            border: 1px solid rgba(0,0,0,0.25);
            box-shadow: 0 4px 10px rgba(0,0,0,0.45);
            white-space: nowrap;
            line-height: 1;
            pointer-events: none;
            z-index: 4;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .manager-player-orb.has-pts .orb-pts { opacity: 1; }

        /* Hauptspieler – zentral, gross, mit Glow */
        .manager-main-player .manager-player-orb-inner {
            border-color: rgba(255,215,0,0.7);
            box-shadow:
                0 0 0 3px rgba(255,215,0,0.18),
                0 0 28px rgba(255,215,0,0.45),
                0 14px 30px rgba(0,0,0,0.6);
        }
        .manager-main-player .manager-player-orb-fallback { font-size: clamp(1.3rem, 3.6vw, 2rem); }

        /* Sekundäre Spieler (Plätze 2 + 3) – mittlere Grösse */
        .manager-player-orb.size-md .manager-player-orb-inner {
            border-color: rgba(255,255,255,0.55);
            box-shadow:
                0 0 0 2px rgba(255,255,255,0.08),
                0 8px 22px rgba(0,0,0,0.55);
        }
        .manager-player-orb.size-md .manager-player-orb-fallback { font-size: clamp(0.85rem, 2.2vw, 1.15rem); }

        /* Kleinere Spieler (Plätze 4–8) */
        .manager-player-orb.size-sm .manager-player-orb-inner {
            border-color: rgba(255,255,255,0.42);
            box-shadow: 0 6px 14px rgba(0,0,0,0.5);
        }
        .manager-player-orb.size-sm .manager-player-orb-fallback { font-size: clamp(0.65rem, 1.6vw, 0.85rem); }

        @media (hover: hover) {
            .manager-player-orb:hover {
                transform: scale(1.08) !important;
                z-index: 9;
                filter: brightness(1.08);
            }
            .manager-main-player:hover {
                transform: scale(1.05) !important;
            }
        }
        .manager-player-orb:focus-visible {
            outline: 2px solid #ffd700;
            outline-offset: 3px;
        }

        /* Punkte-Link unten – klickbar, optisch dezenter als Vorname */
        .manager-points-link {
            display: inline-flex;
            align-items: baseline;
            justify-content: center;
            gap: 5px;
            font-weight: 900;
            color: #fde68a;
            font-size: clamp(0.95rem, 2.4vw, 1.25rem);
            letter-spacing: 0.5px;
            text-shadow: 0 0 18px rgba(255,215,0,0.35);
            align-self: center;
            cursor: pointer;
            background: rgba(250,204,21,0.08);
            border: 1px solid rgba(250,204,21,0.32);
            border-radius: 999px;
            padding: 5px 14px;
            text-decoration: none;
            transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
            font-family: inherit;
            opacity: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .manager-points-link:hover {
            background: rgba(250,204,21,0.16);
            border-color: rgba(250,204,21,0.55);
            box-shadow: 0 0 18px rgba(250,204,21,0.18);
            transform: translateY(-1px);
        }
        .manager-points-link:focus-visible {
            outline: 2px solid #ffd700;
            outline-offset: 3px;
        }
        .manager-points-link small {
            font-size: 0.62em;
            font-weight: 700;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* Innerhalb-der-Karte Animationen: Vorname → Top-Spieler → Orbs → Punkte.
           Werden nur ausgespielt, wenn die Hülle (.champ-card) bereits eingeflogen
           ist – die Verzögerungen laufen relativ zum Karten-Einflug, also über
           Inline-Style (animation-delay) gesetzt. */
        @keyframes manager-firstname-in {
            0%   { opacity: 0; transform: translateY(-14px) scale(0.92); }
            55%  { opacity: 1; transform: translateY(2px) scale(1.04); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes manager-orb-pop {
            0%   { opacity: 0; transform: scale(0.35); }
            65%  { opacity: 1; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
        /* Float-Animation: arbeitet ausschließlich auf `transform` (Centering
           liegt auf der separaten `translate`-Property). Dadurch ist die
           Bewegung von Anfang an GPU-gestützt und flüssig. Start- und Endwert
           sind identisch zum Pop-Endwert (scale 1, kein Y-Offset), damit kein
           Sprung beim Übergang Pop → Float entsteht. */
        @keyframes manager-orb-float {
            0%   { transform: translate3d(0, 0, 0) scale(1); }
            25%  { transform: translate3d(0, -2px, 0) scale(1); }
            75%  { transform: translate3d(0, 2px, 0) scale(1); }
            100% { transform: translate3d(0, 0, 0) scale(1); }
        }
        @keyframes manager-points-in {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .champ-card.is-running .manager-firstname {
            animation: manager-firstname-in 0.65s cubic-bezier(0.22, 0.85, 0.4, 1.05) var(--firstname-delay, 0.2s) forwards;
        }
        .champ-card.is-running .manager-player-orb {
            animation: manager-orb-pop 0.55s cubic-bezier(0.22, 0.85, 0.4, 1.05) var(--orb-delay, 0.6s) forwards;
        }
        .champ-card.is-ready .manager-player-orb {
            opacity: 1;
            transform: scale(1);
            animation: manager-orb-float 4.5s ease-in-out var(--orb-float-delay, 0s) infinite;
        }
        .champ-card.is-running .manager-points-link {
            animation: manager-points-in 0.5s ease var(--points-delay, 1.4s) forwards;
        }
        .champ-card.is-ready .manager-firstname {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .champ-card.is-ready .manager-points-link {
            opacity: 1;
        }

        @media (max-width: 560px) {
            .champ-podium {
                gap: 4px;
                padding: 56px 0 22px;
            }
            .champ-card { padding: 10px 8px 12px; gap: 8px; border-radius: 18px; }
            .champ-card[data-rank="1"] { padding-bottom: 18px; }
            .manager-hero-card { min-height: clamp(240px, 56vw, 320px); padding: 12px 6px 10px; }
            .manager-firstname { font-size: clamp(1.2rem, 6.6vw, 1.7rem); }
            .champ-card[data-rank="1"] .manager-firstname { font-size: clamp(1.4rem, 7.6vw, 2.05rem); }
            .manager-player-constellation { min-height: clamp(120px, 38vw, 180px); margin: 4px 0 6px; }
            .manager-points-link { padding: 4px 10px; font-size: clamp(0.78rem, 3.2vw, 0.95rem); }
            .manager-player-orb .orb-cap { width: 16px; height: 16px; font-size: 0.55rem; }
            .manager-player-orb .orb-pts { font-size: 0.55rem; padding: 1px 5px; bottom: -6px; }
            .champ-chasers {
                grid-template-columns: 1fr;
                gap: 6px;
                margin-top: 16px;
            }
            .champ-chaser { padding: 8px 10px 8px 8px; }
            .champ-chaser .champ-rank-mini { width: 30px; height: 30px; font-size: 0.85rem; }
            .champ-chaser .champ-chaser-name { font-size: 0.85rem; }
            .champ-chaser .champ-chaser-points { font-size: 0.92rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            .champ-card,
            .champ-chaser,
            .champ-spotlight,
            .champ-crown,
            .manager-firstname,
            .manager-player-orb,
            .manager-points-link {
                animation-duration: 0.001s !important;
                animation-delay: 0s !important;
            }
            .champ-card { opacity: 1 !important; }
            .champ-chaser { opacity: 1 !important; transform: none !important; }
            .manager-firstname,
            .manager-points-link { opacity: 1 !important; transform: none !important; }
            .manager-player-orb { opacity: 1 !important; transform: scale(1) !important; }
        }

        @media (max-width: 560px) {
            .carousel { height: min(63svh, 420px); }
            .player-card {
                padding: 8px;
                gap: 6px;
            }
            .player-info { gap: 4px; }
            .player-name {
                font-size: 0.78rem;
                line-height: 1.06;
                letter-spacing: -0.035em;
                white-space: nowrap;
                display: block;
                overflow: visible;
                text-overflow: clip;
            }
            .meta-row {
                font-size: 0.64rem;
                line-height: 1.15;
                gap: 5px;
            }
            .meta-icon {
                width: 14px;
                height: 14px;
                flex-basis: 14px;
            }
            .drafts {
                font-size: 0.62rem;
                padding: 4px 8px;
                gap: 4px;
            }
        }
    </style>
</head>
<body>
<!-- =====================================================================
     HERO: „Live Champions Stage" – Top-Manager-Bereich
     Steht oberhalb des bestehenden Karussells. Lädt die Rangliste über
     denselben Cache- und Berechnungspfad wie rangliste.html / teams.html
     (DreamTeamCache + identisches buildRanking-Verfahren), damit Punkte
     und Reihenfolge der Manager überall exakt übereinstimmen.
     ===================================================================== -->
<section class="champ-stage" aria-label="Top Manager">
    <div class="champ-spotlight" aria-hidden="true"></div>

    <header class="champ-header">
        <h2 class="champ-title">
            <span class="gold-text">Top</span>
            <span class="accent">Manager</span>
        </h2>
    </header>

    <div class="champ-arena">
        <div class="champ-podium" id="champPodium" aria-live="polite"></div>
        <div class="champ-chasers" id="champChasers"></div>
    </div>
</section>



<!-- data.js muss als erstes geladen werden, damit playersData (deklariert
     mit const auf oberster Skriptebene) für alle nachfolgenden klassischen
     Scripts (ChampStage + Karussell) als Bezeichner verfügbar ist. -->
<script src="data.js"></script>

<!-- =====================================================================
     Champions-Stage Script – lädt echte Ranglisten-Daten aus Firebase,
     verwendet dieselbe Berechnungslogik wie rangliste.html.
     ===================================================================== -->
<script src="tournament-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="cache.js"></script>
<script>
(function () {
    'use strict';

    const podium  = document.getElementById('champPodium');
    const chasers = document.getElementById('champChasers');
    if (!podium || !chasers) return;

    const APP = window.APP_CONFIG;
    if (!APP) return;

    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));

    const initials = (name) => String(name || '?')
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0]?.toUpperCase() || '')
        .join('') || '?';

    // Vorname-Extraktion für die Hero-Card-Überschrift. Akzeptiert sowohl
    // "Vorname Nachname" als auch reine Vornamen ohne Nachnamen.
    const firstNameOf = (fullName) => {
        const trimmed = String(fullName || '').trim();
        if (!trimmed) return 'Manager';
        return trimmed.split(/\s+/)[0];
    };

    // Player-Avatar fΓΌr die Constellation. Liefert entweder ein <img> oder
    // einen Initialen-Fallback. Beide haben dieselben Maße, damit das Layout
    // bei fehlenden Bildern nicht springt.
    function playerAvatarHtml(p) {
        const fallback = escapeHtml(initials(p.name));
        if (p.photo && /^https?:/i.test(p.photo)) {
            return `<img src="${escapeHtml(p.photo)}" alt="" loading="lazy" referrerpolicy="no-referrer" data-fallback="${fallback}">`;
        }
        return `<span class="manager-player-orb-fallback" aria-hidden="true">${fallback}</span>`;
    }

    // Layout-Konstanten: Wie viele Spieler erscheinen je Podestrang und in
    // welcher Konstellation (relative Koordinaten in % innerhalb des
    // Constellation-Containers, Größe als Prozent der Containerbreite).
    // Index 0 ist der punktbeste Spieler (zentral, am größten).
    // Reihenfolge der Slots entspricht der Plat zierung Spieler 1..N.
    const LAYOUTS = {
        // Rang 1: Mehr Platz, bis zu 8 Spieler
        1: [
            { x: 50, y: 48, size: 56, cls: 'manager-main-player', z: 5 },
            { x: 18, y: 30, size: 30, cls: 'size-md', z: 4 },
            { x: 82, y: 30, size: 30, cls: 'size-md', z: 4 },
            { x: 12, y: 72, size: 24, cls: 'size-sm', z: 3 },
            { x: 88, y: 72, size: 24, cls: 'size-sm', z: 3 },
            { x: 32, y: 88, size: 22, cls: 'size-sm', z: 3 },
            { x: 68, y: 88, size: 22, cls: 'size-sm', z: 3 },
            { x: 50, y: 14, size: 20, cls: 'size-sm', z: 2 }
        ],
        // Rang 2 + 3: Schmalere Karten, bis zu 6 Spieler
        2: [
            { x: 50, y: 48, size: 60, cls: 'manager-main-player', z: 5 },
            { x: 20, y: 28, size: 32, cls: 'size-md', z: 4 },
            { x: 82, y: 32, size: 32, cls: 'size-md', z: 4 },
            { x: 16, y: 78, size: 24, cls: 'size-sm', z: 3 },
            { x: 84, y: 78, size: 24, cls: 'size-sm', z: 3 },
            { x: 50, y: 90, size: 22, cls: 'size-sm', z: 2 }
        ],
        3: [
            { x: 50, y: 48, size: 60, cls: 'manager-main-player', z: 5 },
            { x: 20, y: 28, size: 32, cls: 'size-md', z: 4 },
            { x: 82, y: 32, size: 32, cls: 'size-md', z: 4 },
            { x: 16, y: 78, size: 24, cls: 'size-sm', z: 3 },
            { x: 84, y: 78, size: 24, cls: 'size-sm', z: 3 },
            { x: 50, y: 90, size: 22, cls: 'size-sm', z: 2 }
        ]
    };

    // Erzeugt die Constellation aus den Top-Spielern eines Managers.
    // baseDelay = Karten-Einflug-Verzögerung in Sekunden. Damit Rang 1 dieselbe
    // dramaturgische Reihenfolge zeigt wie Rang 2 und 3 (zuerst Hauptspieler im
    // Zentrum, dann ein Spieler nach dem anderen rundherum), addieren wir
    // baseDelay zur Orb-Verzögerung. So beginnen die Orbs erst dann zu poppen,
    // wenn die jeweilige Karte sichtbar wird – nicht bereits unsichtbar
    // hinter der Opacity-0-Karte.
    function buildConstellation(manager, rank, baseDelay = 0) {
        const layout = LAYOUTS[rank] || LAYOUTS[2];
        const all = (manager.mergedPlayers || []).filter((p) => Number.isFinite(p.pts));
        // Kein einziger Spieler → schöner Fallback mit Initialen des Managers
        if (all.length === 0) {
            return `
                <div class="manager-player-constellation" aria-hidden="true">
                    <button type="button" class="manager-player-orb manager-main-player" tabindex="-1"
                            style="left:50%;top:50%;width:60%;aspect-ratio:1/1;z-index:5;">
                        <span class="manager-player-orb-inner">
                            <span class="manager-player-orb-fallback">${escapeHtml(initials(manager.manager))}</span>
                        </span>
                    </button>
                </div>
            `;
        }

        const players = all.slice(0, Math.min(layout.length, 8));
        const orbs = players.map((p, idx) => {
            const slot = layout[idx];
            const cap = p.isCaptain ? '<span class="orb-cap" title="Kapitän (×2)">C</span>' : '';
            const ptsText = Math.round(p.pts).toLocaleString('de-DE') + ' P';
            const showPts = idx < 3;
            const safeName = escapeHtml(p.name || 'Unbekannt');
            const dataPid = p.id ? `data-player-id="${escapeHtml(p.id)}"` : '';
            const orbDelay = (baseDelay + 0.55 + 0.15 * idx).toFixed(2) + 's';
            const orbFloatDelay = (idx * 0.4).toFixed(2) + 's';
            return `
                <button type="button"
                        class="manager-player-orb ${slot.cls} ${showPts ? 'has-pts' : ''}"
                        style="left:${slot.x}%; top:${slot.y}%; width:${slot.size}%; aspect-ratio:1/1; z-index:${slot.z}; --orb-delay: ${orbDelay}; --orb-float-delay: ${orbFloatDelay};"
                        data-player-name="${safeName}"
                        ${dataPid}
                        data-action="player"
                        aria-label="Spieler ${safeName}, ${ptsText}. Spieleranalyse öffnen.">
                    <span class="manager-player-orb-inner">
                        ${playerAvatarHtml(p)}
                    </span>
                    ${cap}
                    ${showPts ? `<span class="orb-pts">${ptsText}</span>` : ''}
                </button>
            `;
        }).join('');

        return `<div class="manager-player-constellation">${orbs}</div>`;
    }

    // ── Klick-Ziele ───────────────────────────────────────────────────────
    // Manager-Team öffnen (über bestehende teams.html-Logik). Falls ein
    // Hostprojekt eine globale Funktion bereitstellt, bevorzugen wir diese.
    function openManagerTeam(manager) {
        const name = manager && manager.manager ? manager.manager : '';
        if (!name) return;
        if (typeof window.openManagerTeam === 'function' && window.openManagerTeam !== openManagerTeam) {
            try { window.openManagerTeam(manager); return; } catch (_) { /* fallback */ }
        }
        window.location.href = `teams.html?manager=${encodeURIComponent(name)}`;
    }
    window.openManagerTeam = window.openManagerTeam || openManagerTeam;

    // Spieleranalyse öffnen – wir verwenden dieselbe URL-Konvention wie
    // rangliste.html und teams.html (?player=<Name>).
    function openPlayerAnalysis(player) {
        if (!player) return;
        if (typeof window.openPlayerAnalysis === 'function' && window.openPlayerAnalysis !== openPlayerAnalysis) {
            try { window.openPlayerAnalysis(player); return; } catch (_) { /* fallback */ }
        }
        const name = player.name || '';
        if (!name) return;
        window.location.href = `spieleranalyse.html?player=${encodeURIComponent(name)}`;
    }
    window.openPlayerAnalysis = window.openPlayerAnalysis || openPlayerAnalysis;

    // Rangliste öffnen
    function openRanking() {
        if (typeof window.openRanking === 'function' && window.openRanking !== openRanking) {
            try { window.openRanking(); return; } catch (_) { /* fallback */ }
        }
        window.location.href = 'rangliste.html';
    }
    window.openRanking = window.openRanking || openRanking;

    // ── Ranking-Berechnung (identisch zu rangliste.html) ──────────────────

    function getPlayerById(playerId) {
        if (typeof playersData === 'undefined' || !Array.isArray(playersData)) return null;
        return playersData.find((pd) => String(pd['player.id']) === String(playerId)) || null;
    }

    function buildPlayerPointsMap(rawPoints) {
        const map = {};
        Object.entries(rawPoints || {}).forEach(([id, docData]) => {
            map[String(id)] = docData && typeof docData.totalPoints === 'number' ? docData.totalPoints : 0;
        });
        return map;
    }

    function extractMatchData(rawPoints) {
        const playerMatchPoints = {};
        const nationStatus = {};
        let maxNationGames = 0;
        const matchIdsSet = new Set();

        Object.entries(rawPoints || {}).forEach(([playerId, docData]) => {
            const fullP = getPlayerById(playerId);
            const nation = fullP ? fullP['Nationalteam.name'] : null;
            const perMatch = {};

            Object.entries(docData || {}).forEach(([key, val]) => {
                if (!key.startsWith('Spiel_') || !val || typeof val !== 'object') return;
                const matchId = Number(val.MatchID);
                if (!Number.isFinite(matchId)) return;
                matchIdsSet.add(matchId);
                perMatch[matchId] = typeof val.TotalPunkte === 'number' ? val.TotalPunkte : 0;

                if (nation) {
                    if (!nationStatus[nation]) {
                        nationStatus[nation] = { latestMatchId: -Infinity, outcome: 'draw', matchIds: new Set() };
                    }
                    nationStatus[nation].matchIds.add(matchId);
                    if (matchId >= nationStatus[nation].latestMatchId) {
                        let outcome = 'draw';
                        const lineup = val.Aufstellung || {};
                        if (typeof lineup.WIN === 'number' && lineup.WIN !== 0) outcome = 'win';
                        else if (typeof lineup.LOSS === 'number' && lineup.LOSS !== 0) outcome = 'loss';
                        else if (typeof lineup.DRAW === 'number' && lineup.DRAW !== 0) outcome = 'draw';
                        nationStatus[nation].latestMatchId = matchId;
                        nationStatus[nation].outcome = outcome;
                    }
                }
            });

            playerMatchPoints[String(playerId)] = perMatch;
        });

        Object.values(nationStatus).forEach((info) => {
            info.totalGames = info.matchIds.size;
            if (info.totalGames > maxNationGames) maxNationGames = info.totalGames;
        });

        return { playerMatchPoints, nationStatus, maxNationGames };
    }

    function enrichTeams(rawTeams, playerPointsMap, playerMatchPoints, nationStatus, maxNationGames) {
        return (Array.isArray(rawTeams) ? rawTeams : []).map((team) => {
            const mergedPlayers = (team.players || []).map((p, idx) => {
                let fullP = getPlayerById(p.playerId);
                if (!fullP && typeof playersData !== 'undefined' && Array.isArray(playersData)) {
                    fullP = playersData.find((pd) => pd.Spielername === p.name) || null;
                }
                const playerId = fullP ? String(fullP['player.id']) : `fallback-${idx}`;
                const basePts = fullP ? (playerPointsMap[playerId] || 0) : 0;
                const finalPts = p.isCaptain ? basePts * 2 : basePts;
                const matchesMap = fullP ? (playerMatchPoints[playerId] || {}) : {};
                return {
                    id: playerId,
                    name: fullP ? fullP.Spielername : (p.name || 'Unbekannt'),
                    pts: finalPts,
                    basePts,
                    isCaptain: !!p.isCaptain,
                    photo: fullP ? (fullP.Spielerfoto || '') : '',
                    nation: fullP ? (fullP['Nationalteam.name'] || '?') : '?',
                    matchPoints: matchesMap,
                    matchCount: Object.keys(matchesMap).length
                };
            });

            mergedPlayers.sort((a, b) => b.pts - a.pts);
            const totalScore = mergedPlayers.reduce((sum, p) => sum + p.pts, 0);

            return { ...team, manager: team.manager || 'Unbekannt', mergedPlayers, totalScore };
        });
    }

    function computeRanking(teams) {
        return [...teams].sort((a, b) => {
            const diff = b.totalScore - a.totalScore;
            if (diff !== 0) return diff;
            return a.manager.localeCompare(b.manager, 'de');
        });
    }

    function buildRanking(data) {
        const rawPoints = data.points || {};
        const playerPointsMap = buildPlayerPointsMap(rawPoints);
        const { playerMatchPoints, nationStatus, maxNationGames } = extractMatchData(rawPoints);
        const enriched = enrichTeams(data.teams || [], playerPointsMap, playerMatchPoints, nationStatus, maxNationGames);
        return computeRanking(enriched);
    }

    /** Returns true if the points object contains at least one player with actual data. */
    function hasRealPoints(rawPoints) {
        return rawPoints && typeof rawPoints === 'object' && Object.keys(rawPoints).length > 0;
    }

    // ── DOM-Rendering ─────────────────────────────────────────────────────

    const CROWN_SVG = `<svg class="champ-crown" viewBox="0 0 64 48" aria-hidden="true">
        <defs>
            <linearGradient id="champCrownGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"  stop-color="#fff5b8"/>
                <stop offset="55%" stop-color="#ffd700"/>
                <stop offset="100%" stop-color="#b8860b"/>
            </linearGradient>
        </defs>
        <path d="M4 14 L16 30 L32 6 L48 30 L60 14 L56 42 L8 42 Z"
              fill="url(#champCrownGrad)"
              stroke="rgba(0,0,0,0.35)" stroke-width="1.2" stroke-linejoin="round"/>
        <circle cx="4"  cy="14" r="3.2" fill="#ff5d8f" stroke="rgba(0,0,0,0.35)" stroke-width="0.8"/>
        <circle cx="32" cy="6"  r="3.6" fill="#7dd3fc" stroke="rgba(0,0,0,0.35)" stroke-width="0.8"/>
        <circle cx="60" cy="14" r="3.2" fill="#86efac" stroke="rgba(0,0,0,0.35)" stroke-width="0.8"/>
        <rect x="8" y="38" width="48" height="4" rx="1.5"
              fill="#a16207" stroke="rgba(0,0,0,0.3)" stroke-width="0.6"/>
    </svg>`;

    function animateCount(el, target, duration, delay) {
        const start = performance.now() + delay;
        const easeOut = (t) => 1 - Math.pow(1 - t, 3);
        const step = (now) => {
            if (now < start) { requestAnimationFrame(step); return; }
            const t = Math.min(1, (now - start) / duration);
            const v = Math.round(target * easeOut(t));
            el.textContent = v.toLocaleString('de-DE');
            if (t < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    }

    let readyTimer = null;
    let latestRankingTeams = [];

    function renderChampStage(rankedManagers) {
        latestRankingTeams = Array.isArray(rankedManagers) ? rankedManagers : [];
        window.__dtTestRankingTeams = latestRankingTeams;
        if (readyTimer !== null) {
            clearTimeout(readyTimer);
            readyTimer = null;
        }

        podium.innerHTML = '';
        chasers.innerHTML = '';

        const top3 = rankedManagers.slice(0, 3);
        // Verfolger: bis zu 7 weitere Manager (Plätze 4–10), damit eine vollständige
        // Top 10 sichtbar ist. Reihenfolge bleibt im selben kompakten Stil wie zuvor.
        const rest = rankedManagers.slice(3, 10);

        top3.forEach((m, i) => {
            const rank = i + 1;
            // Wir verwenden ein <div> statt <button>, damit Klicks gezielt
            // auf die einzelnen Hero-Bestandteile (Vorname, Spieler-Orbs,
            // Punkte) gehen können – die Karte selbst ist nicht mehr ein
            // einziger Klickbereich.
            const card = document.createElement('div');
            card.className = 'champ-card manager-hero-card is-running';
            card.dataset.rank = String(rank);
            card.dataset.points = String(m.totalScore);
            card.setAttribute('aria-label', `Platz ${rank}: ${m.manager}, ${m.totalScore} Punkte.`);

            // Verzögerungen relativ zum Karten-Einflug: Rang 3 startet bei 0.25s,
            // Rang 2 bei 0.85s und Rang 1 bei 1.6s. Innerhalb der Karte addieren
            // wir den Karten-Delay zu den eigenen Animationsverzögerungen.
            const baseDelay = rank === 1 ? 1.6 : rank === 2 ? 0.85 : 0.25;
            const firstnameDelay = (baseDelay + 0.4).toFixed(2) + 's';
            const pointsDelay    = (baseDelay + 1.6).toFixed(2) + 's';
            card.style.setProperty('--firstname-delay', firstnameDelay);
            card.style.setProperty('--points-delay', pointsDelay);

            const firstName = escapeHtml(firstNameOf(m.manager));
            card.innerHTML = `
                ${rank === 1 ? CROWN_SVG : ''}
                <span class="champ-rank-badge">#${rank}</span>
                <button type="button" class="manager-firstname"
                        data-action="manager"
                        aria-label="Team von ${escapeHtml(m.manager)} anzeigen">${firstName}</button>
                ${buildConstellation(m, rank, baseDelay)}
                <button type="button" class="manager-points-link"
                        data-action="points"
                        aria-label="Gesamte Rangliste anzeigen">
                    <span class="champ-points-value" data-target="${m.totalScore}">0</span>
                    <small>Pkt</small>
                </button>
            `;

            // Click-Delegation: Vorname → Team, Punkte → Rangliste, Orb → Spieleranalyse.
            card.addEventListener('click', (ev) => {
                const target = ev.target.closest('[data-action]');
                if (!target || !card.contains(target)) return;
                ev.preventDefault();
                ev.stopPropagation();
                const action = target.dataset.action;
                if (action === 'manager') {
                    openManagerTeam(m);
                } else if (action === 'points') {
                    openRanking();
                } else if (action === 'player') {
                    const playerName = target.dataset.playerName;
                    const player = (m.mergedPlayers || []).find((p) => p.name === playerName);
                    if (player) openPlayerAnalysis(player);
                    else if (playerName) openPlayerAnalysis({ name: playerName });
                }
            });

            podium.appendChild(card);
        });

        // Verfolger-Karten (Plätze 4–10). Wir verzögern jede Karte um 0.18s
        // gegenüber der vorigen, damit sie sequenziell erscheinen – im
        // selben Stil wie zuvor Platz 4 und 5, nur erweitert auf Top 10.
        rest.forEach((m, i) => {
            const rank = i + 4;
            const row = document.createElement('button');
            row.type = 'button';
            row.className = 'champ-chaser';
            row.dataset.rank = String(rank);
            row.style.setProperty('--chaser-delay', (3.7 + i * 0.18).toFixed(2) + 's');
            row.setAttribute('aria-label', `Platz ${rank}: ${m.manager}, ${m.totalScore} Punkte. Zum Team.`);
            row.innerHTML = `
                <div class="champ-rank-mini">#${rank}</div>
                <div class="champ-chaser-info">
                    <span class="champ-chaser-name">${escapeHtml(m.manager)}</span>
                </div>
                <div class="champ-chaser-points">
                    <span class="champ-points-value" data-target="${m.totalScore}">0</span>
                    <small>Pkt</small>
                </div>
            `;
            row.addEventListener('click', () => openManagerTeam(m));
            chasers.appendChild(row);
        });

        // Spielerfoto-Fallback: Wenn das Foto nicht lädt, ersetzen wir das
        // <img> durch ein <span> mit den Initialen, das exakt dieselben Maße
        // hat. data-fallback hält dafür die vorbereiteten Initialen bereit.
        podium.querySelectorAll('.manager-player-orb-inner img').forEach((img) => {
            img.addEventListener('error', () => {
                const fallback = document.createElement('span');
                fallback.className = 'manager-player-orb-fallback';
                fallback.setAttribute('aria-hidden', 'true');
                fallback.textContent = img.dataset.fallback || '?';
                img.replaceWith(fallback);
            }, { once: true });
        });

        // Punkte-Hochzähl-Animation: Reihenfolge entspricht dem Aufbau des
        // Podests (Rang 3 → Rang 2 → Rang 1 → Verfolger). Die Werte werden
        // pro Karte gezielt verzögert, damit der Counter zur Einflug-Animation
        // passt. Verfolger 4–10 erben einen Stagger von je +180ms.
        const counterDelays = {
            '3': 2300, '2': 2700, '1': 3500
        };
        document.querySelectorAll('.champ-points-value').forEach((el) => {
            const card = el.closest('[data-rank]');
            const rankStr = card ? card.dataset.rank : '0';
            const rankNum = Number(rankStr);
            let delay;
            if (counterDelays[rankStr] !== undefined) {
                delay = counterDelays[rankStr];
            } else if (rankNum >= 4) {
                delay = 3900 + (rankNum - 4) * 180;
            } else {
                delay = 2500;
            }
            animateCount(el, Number(el.dataset.target) || 0, 1500, delay);
        });

        // Nach Abschluss aller Intro-Animationen (Hero-Karten + Verfolger 4–10)
        // Animationen abschalten, damit Hover-Transitions normal greifen und
        // die Orbs in einen ruhigen Float-Loop übergehen. Die Hero-Karten sind
        // nach ~4.6s fertig und können sofort in den Float-Modus wechseln.
        readyTimer = setTimeout(() => {
            readyTimer = null;
            document.querySelectorAll('.champ-card').forEach((c) => {
                c.classList.remove('is-running');
                c.classList.add('is-ready');
            });
        }, 4600);
    }

    // ── Daten laden ───────────────────────────────────────────────────────
    // Wir verwenden exakt dieselben Cache-Optionen wie rangliste.html und
    // teams.html (year + allowEmptyPoints:true), damit sich die Top-Manager-
    // Sektion garantiert auf dieselben Quelldaten und denselben Cache-State
    // stützt. Die Berechnungslogik (Punkte je Spieler, Captain ×2, Summe
    // über alle Spieler, Tiebreak nach Manager-Name) ist bewusst 1:1 aus
    // rangliste.html übernommen, damit die Reihenfolge und die Punkte
    // überall identisch sind.

    let metaUnsubscribe = null;
    let isMetaRefreshRunning = false;

    async function initChampStage() {
        const db = APP.getDb();

        const CACHE_OPTIONS = { db, year: APP.year, allowEmptyPoints: true, log: false };

        // Pre-render from cache only when we actually have points data so managers
        // don't appear with 0 Punkte before the real fetch completes.
        try {
            const cached = DreamTeamCache.getCachedBundle(CACHE_OPTIONS);
            if (cached.ok
                && (cached.data.teams || []).length > 0
                && hasRealPoints(cached.data.points)) {
                renderChampStage(buildRanking(cached.data));
            }
        } catch (_) { /* ignore cache errors, fresh fetch will follow */ }

        try {
            const fresh = await DreamTeamCache.loadBundle(CACHE_OPTIONS);
            renderChampStage(buildRanking(fresh.data));
        } catch (err) {
            console.warn('[ChampStage] Fehler beim Laden der Rangliste:', err);
            return;
        }

        // Live-Updates: dasselbe Meta-Abo wie auf rangliste.html / teams.html,
        // damit Punkte- oder Team-Änderungen sofort übernommen werden und die
        // Top-Manager-Sektion nicht von der Rangliste abweicht.
        if (!metaUnsubscribe && typeof DreamTeamCache.subscribeToMeta === 'function') {
            metaUnsubscribe = DreamTeamCache.subscribeToMeta({
                ...CACHE_OPTIONS,
                onChange: async ({ remoteMeta }) => {
                    if (isMetaRefreshRunning) return;
                    isMetaRefreshRunning = true;
                    try {
                        const updated = await DreamTeamCache.loadBundle({
                            ...CACHE_OPTIONS,
                            remoteMetaOverride: remoteMeta
                        });
                        renderChampStage(buildRanking(updated.data));
                    } catch (err) {
                        console.warn('[ChampStage] Meta-Refresh fehlgeschlagen:', err);
                    } finally {
                        isMetaRefreshRunning = false;
                    }
                },
                onError: (err) => {
                    console.warn('[ChampStage] Meta-Listener Fehler:', err);
                }
            });
        }
    }

    window.addEventListener('beforeunload', () => {
        if (typeof metaUnsubscribe === 'function') metaUnsubscribe();
    });

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initChampStage);
    } else {
        initChampStage();
    }
})();
</script>

</body>
</html>
