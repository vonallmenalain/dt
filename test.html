<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EM 2024 DreamTeam</title>
  <style>
    :root { --bg:#0d1117; --card:#111827; --text:#e5e7eb; --gold:#ffd700; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 50% -10%, #1f2937, #0d1117 55%);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: grid;
      place-items: center;
      padding: 24px 16px;
    }
    .wrap { width: min(920px, 100%); }
    h1 {
      margin: 0 0 16px;
      text-align: center;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--gold), #fbbf24, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .carousel {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(180px, 1fr);
      gap: 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 8px 2px 14px;
    }
    .card {
      scroll-snap-align: center;
      background: linear-gradient(160deg, #1f2937, var(--card));
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 12px;
      min-height: 220px;
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .photo { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; background: #0b1220; }
    .name { margin: 0; font-size: 1rem; font-weight: 800; }
    .meta { margin: 0; font-size: .85rem; opacity: .9; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>EM 2024 DreamTeam</h1>
    <section class="carousel" id="carousel" aria-label="Spieler-Karussell"></section>
  </main>

  <script src="data.js"></script>
  <script>
    const source = Array.isArray(window.DREAMTEAM_PLAYERS)
      ? window.DREAMTEAM_PLAYERS
      : Array.isArray(window.players)
        ? window.players
        : [];

    const carousel = document.getElementById('carousel');
    const items = source.slice(0, 24);

    items.forEach((p) => {
      const card = document.createElement('article');
      card.className = 'card';
      const name = p?.name || p?.playerName || 'Unbekannt';
      const club = p?.club || p?.team || p?.verein || '';
      const nation = p?.nation || p?.country || p?.land || '';
      const photo = p?.image || p?.photo || p?.bild || '';

      card.innerHTML = `
        <img class="photo" loading="lazy" src="${photo}" alt="${name}">
        <h2 class="name">${name}</h2>
        <p class="meta">${club}</p>
        <p class="meta">${nation}</p>
      `;

      carousel.appendChild(card);
    });
  </script>
</body>
</html>
