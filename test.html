<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DreamTeam - Testseite</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --dark-bg: #0d1117;
            --gold: #ffd700;
            --card-w: clamp(178px, 36vw, 235px);
            --card-h: clamp(252px, 51vw, 322px);
            --blur: 14px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: var(--dark-bg);
            color: #e6edf3;
            min-height: 100svh;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            overflow: hidden;
        }

        .hero {
            position: relative;
            min-height: 100svh;
            width: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
            justify-items: center;
            padding: max(16px, env(safe-area-inset-top)) 16px max(22px, env(safe-area-inset-bottom));
            overflow: hidden;
            touch-action: pan-y;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 90% 70% at 50% 110%, rgba(40,167,69,0.45) 0%, transparent 65%),
                radial-gradient(ellipse 70% 50% at 50% 80%, rgba(40,167,69,0.25) 0%, transparent 55%),
                radial-gradient(ellipse 60% 40% at 20% 0%, rgba(255,215,0,0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 0%, rgba(40,167,69,0.18) 0%, transparent 50%),
                linear-gradient(180deg, #050a0e 0%, #0d1117 32%, #0d1f10 100%);
            z-index: 0;
        }

        .hero-title {
            position: relative;
            z-index: 2;
            font-size: clamp(2.15rem, 5.6vw, 3.8rem);
            font-weight: 900;
            line-height: 1.05;
            margin: 10px 0 0;
            letter-spacing: -1px;
            text-align: center;
        }

        .gold-text {
            background: linear-gradient(135deg, var(--gold), #fbbf24, #e5a800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .accent {
            background: linear-gradient(135deg, #4ade80, #22c55e, #16a34a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .carousel {
            position: relative;
            z-index: 2;
            width: min(100%, 940px);
            height: min(66svh, 510px);
            margin-top: clamp(12px, 3vh, 22px);
            perspective: 1100px;
            isolation: isolate;
            touch-action: pan-y;
            user-select: none;
            cursor: grab;
        }

        .carousel:active { cursor: grabbing; }

        .track {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .player-card {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            border-radius: 20px;
            overflow: hidden;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background:
                linear-gradient(165deg, rgba(29,39,59,0.95) 0%, rgba(19,27,43,0.96) 65%, rgba(13,18,31,0.98) 100%),
                radial-gradient(circle at 20% 0%, rgba(255,215,0,0.14), transparent 52%);
            border: 1px solid rgba(255,255,255,0.16);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(var(--blur));
            transition: box-shadow 0.25s ease;
            will-change: transform, opacity, filter;
        }

        .player-photo-wrap {
            width: 100%;
            height: 50%;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.3);
            background: linear-gradient(180deg, #fcfdff 0%, #e8edf6 100%);
            display: grid;
            place-items: center;
            padding: 12px;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 4px 10px rgba(8, 15, 27, 0.15);
        }

        .player-photo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
            pointer-events: none;
        }

        .player-info {
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .player-name {
            margin: 0;
            font-size: clamp(1rem, 2.8vw, 1.12rem);
            line-height: 1.16;
            font-weight: 800;
            color: #f8fbff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
            font-size: 0.8rem;
            line-height: 1.2;
            color: rgba(230,237,243,0.84);
        }

        .meta-row span {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .meta-icon {
            width: 20px;
            height: 20px;
            flex: 0 0 20px;
            object-fit: contain;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            padding: 1px;
        }

        .flag-icon {
            object-fit: cover;
            border-radius: 4px;
            padding: 0;
        }

        .drafts {
            margin-top: 4px;
            width: fit-content;
            max-width: 100%;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            background: linear-gradient(135deg, rgba(34,197,94,0.26), rgba(250,204,21,0.18));
            color: #e8f7da;
            border: 1px solid rgba(134,239,172,0.42);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .drafts strong {
            color: #fef08a;
            font-weight: 800;
        }

        .hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.68;
            font-size: 0.78rem;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        @media (max-width: 560px) {
            .carousel { height: min(63svh, 420px); }
        }
    </style>
</head>
<body>
<section class="hero">
    <h1 class="hero-title">
        <span class="gold-text">EM 2024</span><br>
        <span class="accent">DreamTeam</span>
    </h1>

    <div class="carousel" id="carousel" aria-label="Karussell der meistgedrafteten Spieler">
        <div class="track" id="track"></div>
    </div>
</section>

<script src="data.js"></script>
<script>

const track = document.getElementById('track');
const carousel = document.getElementById('carousel');

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function normalizePlayer(raw) {
    return {
        id: String(raw['player.id']),
        name: raw.Spielername,
        country: raw['Nationalteam.name'] || '',
        countryFlag: raw['Nationalteam.logo'] || '',
        club: raw['Club.name'] || '',
        clubLogo: raw['Club.logo'] || '',
        img: raw.Spielerfoto || ''
    };
}

function parseTeamsFromStorage() {
    const candidates = [];
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key || !key.endsWith('_teams')) continue;
        try {
            const parsed = JSON.parse(localStorage.getItem(key));
            const teams = Array.isArray(parsed) ? parsed : (Array.isArray(parsed?.data) ? parsed.data : null);
            if (Array.isArray(teams) && teams.length) candidates.push(teams);
        } catch (_) {}
    }
    return candidates.sort((a, b) => b.length - a.length)[0] || [];
}

function buildTopDraftedPlayers(limit = 15) {
    const playersById = new Map((Array.isArray(playersData) ? playersData : []).map((p) => [String(p['player.id']), p]));
    const pickCounts = new Map();
    const teams = parseTeamsFromStorage();

    teams.forEach((team) => {
        (team?.players || []).forEach((player) => {
            const id = String(player?.playerId || '');
            if (!id || !playersById.has(id)) return;
            pickCounts.set(id, (pickCounts.get(id) || 0) + 1);
        });
    });

    return Array.from(pickCounts.entries())
        .map(([id, drafts]) => ({ ...normalizePlayer(playersById.get(id)), drafts }))
        .sort((a, b) => b.drafts - a.drafts)
        .slice(0, limit);
}

const players = buildTopDraftedPlayers();

if (!players.length) {
    track.innerHTML = '<article class="player-card"><h3>Noch keine Draft-Daten gefunden</h3><p class="meta">Bitte zuerst Teams erstellen bzw. synchronisieren.</p></article>';
}

const cards = players.map((p) => {
    const el = document.createElement('article');
    el.className = 'player-card';
    el.innerHTML = `
        <div class="player-photo-wrap">
            <img class="player-photo" loading="lazy" src="${escapeHtml(p.img)}" alt="Spielerfoto von ${escapeHtml(p.name)}">
        </div>
        <div class="player-info">
            <h3 class="player-name">${escapeHtml(p.name)}</h3>
            <div class="meta-row"><img class="meta-icon flag-icon" loading="lazy" src="${escapeHtml(p.countryFlag)}" alt="Flagge ${escapeHtml(p.country)}"><span>${escapeHtml(p.country)}</span></div>
            <div class="meta-row"><img class="meta-icon club-icon" loading="lazy" src="${escapeHtml(p.clubLogo)}" alt="Vereinslogo ${escapeHtml(p.club)}"><span>${escapeHtml(p.club)}</span></div>
            <div class="drafts"><span>👥</span><strong>${p.drafts.toLocaleString('de-DE')}x</strong><span>gedraftet</span></div>
        </div>
    `;
    track.appendChild(el);
    return el;
});
const state = {pos: 0, vel: 0, drag: false, lastX: 0, lastT: 0};
let cardGap = 168;
let raf = null;

function resizeCarousel() {
    const w = carousel.clientWidth;
    cardGap = Math.max(128, Math.min(212, w * 0.26));
}

function mod(a, n) { return ((a % n) + n) % n; }

function render() {
    const n = cards.length;
    if (!n) return;
    for (let i = 0; i < n; i++) {
        let delta = i - state.pos;
        delta = mod(delta + n / 2, n) - n / 2;

        const abs = Math.abs(delta);
        const clamped = Math.min(abs, 4.6);
        const x = delta * cardGap;
        const scale = 1 - clamped * 0.12;
        const z = 300 - clamped * 85;
        const rotY = delta * -8;
        const y = clamped * 9;
        const op = 1 - clamped * 0.16;

        const card = cards[i];
        card.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateY(${rotY}deg) scale(${scale})`;
        card.style.opacity = String(Math.max(0, op));
        card.style.filter = `saturate(${1.1 - clamped * 0.1}) blur(${Math.max(0, clamped - 2.2) * 0.9}px)`;
        card.style.zIndex = String(Math.round(1000 - clamped * 100));
        card.style.boxShadow = abs < 0.38
            ? '0 20px 50px rgba(0,0,0,0.58), 0 0 38px rgba(255,215,0,0.2)'
            : '0 14px 36px rgba(0,0,0,0.42)';
        card.style.pointerEvents = abs < 0.5 ? 'auto' : 'none';
    }
}

function tick() {
    if (!cards.length) return;

    if (!state.drag) {
        state.pos += state.vel;
        state.vel *= 0.92;
        if (Math.abs(state.vel) < 0.0005) {
            const target = Math.round(state.pos);
            state.pos += (target - state.pos) * 0.08;
        }
    }

    if (state.pos >= players.length) state.pos -= players.length;
    if (state.pos < 0) state.pos += players.length;

    render();
    raf = requestAnimationFrame(tick);
}

function pointerDown(clientX) {
    state.drag = true;
    state.lastX = clientX;
    state.lastT = performance.now();
}

function pointerMove(clientX) {
    if (!state.drag) return;
    const now = performance.now();
    const dx = clientX - state.lastX;
    const dt = Math.max(8, now - state.lastT);
    const units = dx / cardGap;

    state.pos -= units;
    state.vel = (state.vel * 0.7) + ((-units / dt) * 16);

    state.lastX = clientX;
    state.lastT = now;
}

function pointerUp() {
    state.drag = false;
}

carousel.addEventListener('pointerdown', (e) => {
    carousel.setPointerCapture(e.pointerId);
    pointerDown(e.clientX);
});
carousel.addEventListener('pointermove', (e) => pointerMove(e.clientX));
carousel.addEventListener('pointerup', pointerUp);
carousel.addEventListener('pointercancel', pointerUp);
carousel.addEventListener('lostpointercapture', pointerUp);

carousel.addEventListener('wheel', (e) => {
    e.preventDefault();
    const speed = (Math.abs(e.deltaY) > Math.abs(e.deltaX) ? e.deltaY : e.deltaX) * 0.0012;
    state.vel += speed;
}, {passive: false});

window.addEventListener('resize', resizeCarousel, {passive: true});
resizeCarousel();
if (cards.length) {
    render();
    tick();
}
</script>
</body>
</html>
