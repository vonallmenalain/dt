<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DreamTeam - Testseite</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --dark-bg: #0d1117;
            --gold: #ffd700;
            --card-w: clamp(98px, 16.5vw, 128px);
            --card-h: clamp(148px, 24.8vw, 188px);
            --blur: 14px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: var(--dark-bg);
            color: #e6edf3;
            min-height: 100svh;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .hero {
            position: relative;
            min-height: 100svh;
            width: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
            justify-items: center;
            padding: max(16px, env(safe-area-inset-top)) 16px max(22px, env(safe-area-inset-bottom));
            overflow: hidden;
            touch-action: pan-y;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 90% 70% at 50% 110%, rgba(40,167,69,0.45) 0%, transparent 65%),
                radial-gradient(ellipse 70% 50% at 50% 80%, rgba(40,167,69,0.25) 0%, transparent 55%),
                radial-gradient(ellipse 60% 40% at 20% 0%, rgba(255,215,0,0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 0%, rgba(40,167,69,0.18) 0%, transparent 50%),
                linear-gradient(180deg, #050a0e 0%, #0d1117 32%, #0d1f10 100%);
            z-index: 0;
        }

        .hero-title {
            position: relative;
            z-index: 2;
            font-size: clamp(2.15rem, 5.6vw, 3.8rem);
            font-weight: 900;
            line-height: 1.05;
            margin: 10px 0 0;
            letter-spacing: -1px;
            text-align: center;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .gold-text {
            background: linear-gradient(135deg, var(--gold), #fbbf24, #e5a800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .accent {
            background: linear-gradient(135deg, #4ade80, #22c55e, #16a34a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .carousel {
            position: relative;
            z-index: 2;
            width: min(66vw, 620px);
            height: min(48svh, 360px);
            margin-top: 6px;
            perspective: 1100px;
            isolation: isolate;
            touch-action: pan-y;
            user-select: none;
            cursor: grab;
        }

        .carousel:active { cursor: grabbing; }
        .manager-carousel-card {
            justify-content: space-between;
            padding: 12px 10px 14px;
            gap: 12px;
        }
        .manager-card-rank {
            position: absolute;
            top: 10px;
            left: 10px;
            min-width: 48px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 950;
            letter-spacing: 0.02em;
            color: #0b1020;
            background: linear-gradient(140deg, #fff0a8, #ffd700 55%, #ca9200);
            border: 2px solid rgba(11,16,32,0.45);
            box-shadow: 0 8px 18px rgba(0,0,0,0.48), 0 0 0 2px rgba(255,215,0,0.22);
            z-index: 2;
        }
        .manager-carousel-card[data-rank="2"] .manager-card-rank { background: linear-gradient(140deg, #f8fafc, #d3dce9 55%, #7b8ca3); }
        .manager-carousel-card[data-rank="3"] .manager-card-rank { background: linear-gradient(140deg, #f6dfca, #d69869 55%, #8d552a); color: #fff; }
        .manager-card-name {
            margin: 38px 0 4px;
            text-align: center;
            font-weight: 950;
            font-size: clamp(0.92rem, 2.2vw, 1.05rem);
            line-height: 1.06;
            letter-spacing: -0.02em;
            color: #f8fbff;
            text-shadow: 0 0 14px rgba(255,255,255,0.08);
        }
        .manager-card-points {
            align-self: center;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 900;
            color: #fde68a;
            background: rgba(250,204,21,0.12);
            border: 1px solid rgba(250,204,21,0.42);
        }
        .manager-card-topplayers {
            margin-top: auto;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 0;
            width: 100%;
            min-height: 82px;
        }
        .manager-card-player {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            min-width: 0;
            width: 54px;
            position: relative;
        }
        .manager-card-player-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            overflow: hidden;
            border: 1.8px solid rgba(255,255,255,0.42);
            box-shadow: 0 4px 10px rgba(0,0,0,0.35);
            position: relative;
            background: #0f172a;
        }
        .manager-card-player-avatar img { width:100%; height:100%; object-fit:cover; }
        .manager-card-player.rank-2,
        .manager-card-player.rank-3 {
            transform: translateY(8px);
            z-index: 1;
        }
        .manager-card-player.rank-1 {
            width: 76px;
            z-index: 3;
            margin: 0 -8px;
        }
        .manager-card-player.rank-1 .manager-card-player-avatar {
            width: 76px;
            height: 76px;
            border-width: 2.2px;
            border-color: rgba(255,215,0,0.62);
            box-shadow: 0 0 0 2px rgba(255,215,0,0.26), 0 8px 16px rgba(0,0,0,0.44);
        }
        .manager-card-player.rank-2 { z-index: 2; margin-right: -5px; }
        .manager-card-player.rank-3 { z-index: 1; margin-left: -5px; }
        .manager-card-player-name {
            width: 100%;
            font-size: 0.62rem;
            font-weight: 700;
            line-height: 1.05;
            text-align: center;
            color: rgba(230,237,243,0.92);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .manager-card-player-points {
            font-size: 0.62rem;
            font-weight: 800;
            color: #86efac;
            line-height: 1;
        }
        .captain-badge { position:absolute; right:-2px; bottom:-2px; width:18px; height:18px; border-radius:50%; background:#f97316; color:#fff; font-size:0.66rem; font-weight:900; display:grid; place-items:center; border:1px solid rgba(0,0,0,0.35); }
        .manager-carousel-card[data-rank="1"] {
            background:
                linear-gradient(165deg, rgba(74,57,11,0.95) 0%, rgba(54,39,10,0.96) 62%, rgba(33,24,8,0.98) 100%),
                radial-gradient(circle at 22% 0%, rgba(255,215,0,0.34), transparent 54%);
            border-color: rgba(255,215,0,0.45);
        }
        .manager-carousel-card[data-rank="2"] {
            background:
                linear-gradient(165deg, rgba(48,56,70,0.95) 0%, rgba(37,43,58,0.97) 62%, rgba(24,29,43,0.98) 100%),
                radial-gradient(circle at 22% 0%, rgba(226,232,240,0.28), transparent 54%);
            border-color: rgba(203,213,225,0.4);
        }
        .manager-carousel-card[data-rank="3"] {
            background:
                linear-gradient(165deg, rgba(70,44,30,0.95) 0%, rgba(58,36,24,0.97) 62%, rgba(41,26,18,0.98) 100%),
                radial-gradient(circle at 22% 0%, rgba(214,138,82,0.34), transparent 54%);
            border-color: rgba(214,138,82,0.42);
        }

        .track {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .player-card {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            border-radius: 20px;
            overflow: hidden;
            padding: 9px;
            display: flex;
            flex-direction: column;
            gap: 7px;
            background:
                linear-gradient(165deg, rgba(29,39,59,0.95) 0%, rgba(19,27,43,0.96) 65%, rgba(13,18,31,0.98) 100%),
                radial-gradient(circle at 20% 0%, rgba(255,215,0,0.14), transparent 52%);
            border: 1px solid rgba(255,255,255,0.16);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(var(--blur));
            transition: box-shadow 0.25s ease;
            will-change: transform, opacity, filter;
        }

        .player-photo-wrap {
            width: 78%;
            aspect-ratio: 1 / 1;
            align-self: center;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.04);
            display: grid;
            place-items: center;
            padding: 0;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 4px 10px rgba(8, 15, 27, 0.15);
        }

        .player-photo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
            pointer-events: none;
        }

        .player-info {
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .player-name {
            margin: 0;
            width: 100%;
            max-width: 100%;
            min-width: 0;
            font-size: clamp(0.78rem, 1.9vw, 0.96rem);
            line-height: 1.06;
            font-weight: 900;
            letter-spacing: -0.035em;
            color: #f8fbff;
            display: block;
            white-space: nowrap;
            overflow: visible;
            text-overflow: clip;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 7px;
            min-width: 0;
            font-size: 0.72rem;
            line-height: 1.2;
            color: rgba(230,237,243,0.84);
        }

        .meta-row span {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .meta-icon {
            width: 17px;
            height: 17px;
            flex: 0 0 17px;
            object-fit: contain;
            border-radius: 0;
            border: 0;
            background: transparent;
            padding: 0;
        }

        .flag-icon {
            object-fit: cover;
            border-radius: 0;
        }

        .drafts {
            margin-top: 4px;
            width: fit-content;
            max-width: 100%;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            background: linear-gradient(135deg, rgba(34,197,94,0.26), rgba(250,204,21,0.18));
            color: #e8f7da;
            border: 1px solid rgba(134,239,172,0.42);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .drafts strong {
            color: #fef08a;
            font-weight: 800;
        }

        .hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.68;
            font-size: 0.78rem;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        /* ================================================================
           HERO: „Live Champions Stage" – Prototyp oberhalb des Karussells
           Eigener Namespace `champ-` damit die bestehende Karussell-CSS
           absolut unverändert bleibt.
           ================================================================ */
        .champ-stage {
            position: relative;
            width: 100%;
            padding: max(22px, env(safe-area-inset-top)) 16px 26px;
            overflow: hidden;
            isolation: isolate;
            background:
                radial-gradient(ellipse 70% 55% at 50% 10%, rgba(255,215,0,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 80% 60% at 50% 100%, rgba(34,197,94,0.42) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 15% 85%, rgba(40,167,69,0.35) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 85% 85%, rgba(40,167,69,0.35) 0%, transparent 60%),
                linear-gradient(180deg, #050a0e 0%, #0b1a14 45%, #0d2418 100%);
            border-bottom: 1px solid rgba(255,215,0,0.18);
        }

        .champ-stage::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 90px),
                repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 60px);
            mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 35%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 35%, transparent 80%);
            pointer-events: none;
            z-index: 0;
        }

        .champ-spotlight {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 60%;
            background: radial-gradient(ellipse 50% 100% at 50% 0%, rgba(255,215,0,0.28), transparent 70%);
            filter: blur(8px);
            pointer-events: none;
            z-index: 0;
            animation: champ-spotlight-pulse 4s ease-in-out infinite;
        }

        @keyframes champ-spotlight-pulse {
            0%, 100% { opacity: 0.55; transform: translateX(-50%) scale(1); }
            50%      { opacity: 0.95; transform: translateX(-50%) scale(1.05); }
        }

        .champ-header {
            position: relative;
            z-index: 2;
            text-align: center;
            margin: 0 auto 14px;
            max-width: 920px;
        }

        .champ-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #fef3c7;
            background: linear-gradient(135deg, rgba(34,197,94,0.35), rgba(255,215,0,0.22));
            border: 1px solid rgba(255,215,0,0.45);
            box-shadow: 0 0 18px rgba(255,215,0,0.18), inset 0 0 12px rgba(34,197,94,0.18);
        }

        .champ-eyebrow .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 0 0 rgba(239,68,68,0.8);
            animation: champ-live 1.4s ease-out infinite;
        }

        @keyframes champ-live {
            0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.85); }
            100% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
        }

        .champ-title {
            margin: 10px 0 4px;
            font-size: clamp(1.7rem, 5vw, 3rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -1px;
        }

        .champ-subtitle {
            margin: 0;
            font-size: clamp(0.82rem, 1.9vw, 1rem);
            color: rgba(230,237,243,0.72);
            font-weight: 500;
        }

        /* Stage – Podest mit 3D-Karten */
        .champ-arena {
            position: relative;
            z-index: 2;
            width: min(94vw, 940px);
            margin: 0 auto;
            perspective: 1400px;
            perspective-origin: 50% 38%;
        }

        .champ-podium {
            position: relative;
            height: clamp(290px, 48vw, 420px);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            transform-style: preserve-3d;
        }

        .champ-card {
            position: absolute;
            bottom: 38px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 14px 12px 16px;
            border-radius: 22px;
            cursor: pointer;
            user-select: none;
            font-family: inherit;
            color: inherit;
            text-align: center;
            transform-style: preserve-3d;
            background:
                linear-gradient(165deg, rgba(29,39,59,0.96) 0%, rgba(19,27,43,0.97) 60%, rgba(10,18,12,0.98) 100%),
                radial-gradient(circle at 30% 0%, rgba(34,197,94,0.18), transparent 55%);
            border: 1px solid rgba(255,255,255,0.14);
            box-shadow:
                0 24px 50px rgba(0,0,0,0.55),
                0 0 0 1px rgba(255,255,255,0.04) inset;
            backdrop-filter: blur(10px);
            transition: transform 0.35s cubic-bezier(0.22, 0.85, 0.4, 1.05),
                        box-shadow 0.35s ease,
                        border-color 0.35s ease,
                        filter 0.35s ease;
            will-change: transform, opacity;
            opacity: 0;
        }

        .champ-card:focus-visible {
            outline: 2px solid #ffd700;
            outline-offset: 4px;
        }

        .champ-card .champ-rank-badge {
            position: absolute;
            top: -14px;
            left: -14px;
            min-width: 36px;
            height: 36px;
            padding: 0 10px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            font-weight: 900;
            font-size: 0.95rem;
            color: #0d1117;
            background: linear-gradient(135deg, #ffe97a, #ffd700 55%, #c79500);
            border: 2px solid rgba(13,17,23,0.55);
            box-shadow: 0 8px 22px rgba(0,0,0,0.5), 0 0 0 3px rgba(255,215,0,0.18);
            transform: translateZ(40px);
        }

        .champ-card[data-rank="2"] .champ-rank-badge {
            background: linear-gradient(135deg, #f1f5f9, #cbd5e1 55%, #64748b);
        }
        .champ-card[data-rank="3"] .champ-rank-badge {
            background: linear-gradient(135deg, #fcd9b6, #d68a52 55%, #8a4a26);
            color: #fff;
        }

        .champ-avatar {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 18px;
            display: grid;
            place-items: center;
            font-weight: 900;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            color: #f8fbff;
            letter-spacing: -1px;
            background:
                radial-gradient(circle at 30% 25%, rgba(255,255,255,0.18), transparent 55%),
                linear-gradient(160deg, #1e293b, #0f172a 70%);
            border: 1px solid rgba(255,255,255,0.14);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 6px 16px rgba(0,0,0,0.35);
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .champ-name {
            margin: 0;
            font-size: clamp(0.86rem, 2vw, 1.05rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #f8fbff;
            text-align: center;
            line-height: 1.1;
        }

        .champ-points {
            display: inline-flex;
            align-items: baseline;
            gap: 5px;
            font-weight: 900;
            color: #fde68a;
            font-size: clamp(1rem, 2.6vw, 1.35rem);
            letter-spacing: 0.5px;
            text-shadow: 0 0 18px rgba(255,215,0,0.35);
        }

        .champ-points small {
            font-size: 0.62em;
            font-weight: 700;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .champ-trend {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 9px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            line-height: 1;
            white-space: nowrap;
        }

        .champ-trend.up {
            color: #bbf7d0;
            background: rgba(34,197,94,0.18);
            border: 1px solid rgba(34,197,94,0.45);
        }
        .champ-trend.down {
            color: #fecaca;
            background: rgba(239,68,68,0.16);
            border: 1px solid rgba(239,68,68,0.45);
        }
        .champ-trend.neutral {
            color: rgba(230,237,243,0.78);
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.18);
        }

        /* Platzierungen */
        .champ-card[data-rank="1"] {
            width: clamp(150px, 26vw, 210px);
            z-index: 5;
            border-color: rgba(255,215,0,0.55);
            background:
                linear-gradient(165deg, rgba(40,33,18,0.95) 0%, rgba(20,17,8,0.97) 65%, rgba(10,8,4,0.98) 100%),
                radial-gradient(circle at 30% 0%, rgba(255,215,0,0.32), transparent 55%);
            box-shadow:
                0 30px 60px rgba(0,0,0,0.6),
                0 0 50px rgba(255,215,0,0.35),
                0 0 0 1px rgba(255,215,0,0.4) inset;
        }
        .champ-card[data-rank="1"] .champ-avatar {
            border-color: rgba(255,215,0,0.55);
            background:
                radial-gradient(circle at 30% 25%, rgba(255,235,150,0.4), transparent 55%),
                linear-gradient(160deg, #5a3f0e, #1f1605 70%);
        }
        .champ-card[data-rank="1"] .champ-name {
            color: #fef3c7;
        }

        .champ-card[data-rank="2"] {
            width: clamp(120px, 21vw, 175px);
            z-index: 4;
        }
        .champ-card[data-rank="3"] {
            width: clamp(120px, 21vw, 175px);
            z-index: 4;
        }

        /* Krone für #1 */
        .champ-crown {
            position: absolute;
            top: -38px;
            left: 50%;
            transform: translate(-50%, 0) translateZ(50px);
            width: clamp(46px, 9vw, 64px);
            height: auto;
            filter: drop-shadow(0 6px 14px rgba(255,215,0,0.55));
            animation: champ-crown-bob 2.6s ease-in-out infinite;
        }

        @keyframes champ-crown-bob {
            0%, 100% { transform: translate(-50%, 0) translateZ(50px); }
            50%      { transform: translate(-50%, -6px) translateZ(50px); }
        }

        /* Chaser-Karten Platz 4 + 5 */
        .champ-chasers {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            gap: clamp(10px, 2.5vw, 22px);
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .champ-chaser {
            position: relative;
            display: grid;
            grid-template-columns: 36px 1fr auto;
            align-items: center;
            gap: 10px;

        /* Sobald is-ready gesetzt wird, wird die Einflug-Animation per JS auf `none` gesetzt.

        .champ-card.is-ready {

        /* Hover-Tilt für Top-Karten */

<!-- =====================================================================
     HERO: „Live Champions Stage" – Prototyp / Test
     Steht oberhalb des bestehenden Karussells. Verwendet Demo-/Mock-Daten,
     da test.html bisher nur Spieler-Draft-Daten aus localStorage nutzt
     und keine echten Manager-/Ranglisten-Daten lädt. Diese Daten lassen
     sich später durch echte Werte ersetzen, ohne das Markup zu ändern.
     ===================================================================== -->
<section class="champ-stage" aria-label="Top Manager">
    <div class="champ-spotlight" aria-hidden="true"></div>

    <header class="champ-header">
        <h2 class="champ-title">

        </h2>
    </header>

    <div class="champ-arena">

    </div>
</section>

<section class="hero">
    <h1 class="hero-title">
        <span class="gold-text">EM 2024</span><br>
        <span class="accent">DreamTeam</span>
    </h1>

    <div class="hero-content">
        <div class="carousel" id="carousel" aria-label="Karussell der meistgedrafteten Spieler">
            <div class="track" id="track"></div>
        </div>
    </div>

<!-- data.js muss als erstes geladen werden, damit window.playersData
     für alle nachfolgenden Scripts (ChampStage + Karussell) verfügbar ist. -->
<script src="data.js"></script>

<!-- =====================================================================
     Champions-Stage Script – lädt echte Ranglisten-Daten aus Firebase,
     verwendet dieselbe Berechnungslogik wie rangliste.html.
     ===================================================================== -->
<script src="tournament-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="cache.js"></script>
<script>
(function () {
    'use strict';

    const podium  = document.getElementById('champPodium');
    const chasers = document.getElementById('champChasers');
    if (!podium || !chasers) return;

    const APP = window.APP_CONFIG;
    if (!APP) return;

    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));

    const initials = (name) => String(name || '?')
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0]?.toUpperCase() || '')
        .join('') || '?';

    const navTo = (managerName) => {
        if (!managerName) return;
        window.location.href = `teams.html?manager=${encodeURIComponent(managerName)}`;
    };

    // ── Ranking-Berechnung (identisch zu rangliste.html) ──────────────────

    function getPlayerById(playerId) {
        if (!window.playersData) return null;
        return playersData.find((pd) => String(pd['player.id']) === String(playerId)) || null;
    }

    function buildPlayerPointsMap(rawPoints) {
        const map = {};
        Object.entries(rawPoints || {}).forEach(([id, docData]) => {
            map[String(id)] = docData && typeof docData.totalPoints === 'number' ? docData.totalPoints : 0;
        });
        return map;
    }

    function extractMatchData(rawPoints) {
        const playerMatchPoints = {};
        const nationStatus = {};
        let maxNationGames = 0;
        const matchIdsSet = new Set();

        Object.entries(rawPoints || {}).forEach(([playerId, docData]) => {
            const fullP = getPlayerById(playerId);
            const nation = fullP ? fullP['Nationalteam.name'] : null;
            const perMatch = {};

            Object.entries(docData || {}).forEach(([key, val]) => {
                if (!key.startsWith('Spiel_') || !val || typeof val !== 'object') return;
                const matchId = Number(val.MatchID);
                if (!Number.isFinite(matchId)) return;
                matchIdsSet.add(matchId);
                perMatch[matchId] = typeof val.TotalPunkte === 'number' ? val.TotalPunkte : 0;

                if (nation) {
                    if (!nationStatus[nation]) {
                        nationStatus[nation] = { latestMatchId: -Infinity, outcome: 'draw', matchIds: new Set() };
                    }
                    nationStatus[nation].matchIds.add(matchId);
                    if (matchId >= nationStatus[nation].latestMatchId) {
                        let outcome = 'draw';
                        const lineup = val.Aufstellung || {};
                        if (typeof lineup.WIN === 'number' && lineup.WIN !== 0) outcome = 'win';
                        else if (typeof lineup.LOSS === 'number' && lineup.LOSS !== 0) outcome = 'loss';
                        else if (typeof lineup.DRAW === 'number' && lineup.DRAW !== 0) outcome = 'draw';
                        nationStatus[nation].latestMatchId = matchId;
                        nationStatus[nation].outcome = outcome;
                    }
                }
            });

            playerMatchPoints[String(playerId)] = perMatch;
        });

        Object.values(nationStatus).forEach((info) => {
            info.totalGames = info.matchIds.size;
            if (info.totalGames > maxNationGames) maxNationGames = info.totalGames;
        });

        return { playerMatchPoints, nationStatus, maxNationGames };
    }

    function enrichTeams(rawTeams, playerPointsMap, playerMatchPoints, nationStatus, maxNationGames) {
        return (Array.isArray(rawTeams) ? rawTeams : []).map((team) => {
            const mergedPlayers = (team.players || []).map((p, idx) => {
                let fullP = getPlayerById(p.playerId);
                if (!fullP) fullP = (window.playersData || []).find((pd) => pd.Spielername === p.name) || null;
                const playerId = fullP ? String(fullP['player.id']) : `fallback-${idx}`;
                const basePts = fullP ? (playerPointsMap[playerId] || 0) : 0;
                const finalPts = p.isCaptain ? basePts * 2 : basePts;
                const matchesMap = fullP ? (playerMatchPoints[playerId] || {}) : {};
                return {
                    id: playerId,
                    name: fullP ? fullP.Spielername : (p.name || 'Unbekannt'),
                    pts: finalPts,
                    basePts,
                    isCaptain: !!p.isCaptain,
                    photo: fullP ? (fullP.Spielerfoto || '') : '',
                    nation: fullP ? (fullP['Nationalteam.name'] || '?') : '?',
                    matchPoints: matchesMap,
                    matchCount: Object.keys(matchesMap).length
                };
            });

            mergedPlayers.sort((a, b) => b.pts - a.pts);
            const totalScore = mergedPlayers.reduce((sum, p) => sum + p.pts, 0);

            return { ...team, manager: team.manager || 'Unbekannt', mergedPlayers, totalScore };
        });
    }

    function computeRanking(teams) {
        return [...teams].sort((a, b) => {
            const diff = b.totalScore - a.totalScore;
            if (diff !== 0) return diff;
            return a.manager.localeCompare(b.manager, 'de');
        });
    }

    function buildRanking(data) {
        const rawPoints = data.points || {};
        const playerPointsMap = buildPlayerPointsMap(rawPoints);
        const { playerMatchPoints, nationStatus, maxNationGames } = extractMatchData(rawPoints);
        const enriched = enrichTeams(data.teams || [], playerPointsMap, playerMatchPoints, nationStatus, maxNationGames);
        return computeRanking(enriched);
    }

    /** Returns true if the points object contains at least one player with actual data. */
    function hasRealPoints(rawPoints) {
        return rawPoints && typeof rawPoints === 'object' && Object.keys(rawPoints).length > 0;
    }

    // ── DOM-Rendering ─────────────────────────────────────────────────────

    const CROWN_SVG = `<svg class="champ-crown" viewBox="0 0 64 48" aria-hidden="true">
        <defs>
            <linearGradient id="champCrownGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"  stop-color="#fff5b8"/>
                <stop offset="55%" stop-color="#ffd700"/>
                <stop offset="100%" stop-color="#b8860b"/>
            </linearGradient>
        </defs>
        <path d="M4 14 L16 30 L32 6 L48 30 L60 14 L56 42 L8 42 Z"
              fill="url(#champCrownGrad)"
              stroke="rgba(0,0,0,0.35)" stroke-width="1.2" stroke-linejoin="round"/>
        <circle cx="4"  cy="14" r="3.2" fill="#ff5d8f" stroke="rgba(0,0,0,0.35)" stroke-width="0.8"/>
        <circle cx="32" cy="6"  r="3.6" fill="#7dd3fc" stroke="rgba(0,0,0,0.35)" stroke-width="0.8"/>
        <circle cx="60" cy="14" r="3.2" fill="#86efac" stroke="rgba(0,0,0,0.35)" stroke-width="0.8"/>
        <rect x="8" y="38" width="48" height="4" rx="1.5"
              fill="#a16207" stroke="rgba(0,0,0,0.3)" stroke-width="0.6"/>
    </svg>`;

    function animateCount(el, target, duration, delay) {
        const start = performance.now() + delay;
        const easeOut = (t) => 1 - Math.pow(1 - t, 3);
        const step = (now) => {
            if (now < start) { requestAnimationFrame(step); return; }
            const t = Math.min(1, (now - start) / duration);
            const v = Math.round(target * easeOut(t));
            el.textContent = v.toLocaleString('de-DE');
            if (t < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
    }

    let readyTimer = null;
    let latestRankingTeams = [];

    function renderChampStage(rankedManagers) {
        latestRankingTeams = Array.isArray(rankedManagers) ? rankedManagers : [];
        window.__dtTestRankingTeams = latestRankingTeams;
        if (readyTimer !== null) {
            clearTimeout(readyTimer);
            readyTimer = null;
        }

        podium.innerHTML = '';
        chasers.innerHTML = '';

        const top3 = rankedManagers.slice(0, 3);
        const rest = rankedManagers.slice(3, 5);

        top3.forEach((m, i) => {
            const rank = i + 1;
            const card = document.createElement('button');
            card.type = 'button';
            card.className = 'champ-card';
            card.dataset.rank = String(rank);
            card.dataset.points = String(m.totalScore);
            card.setAttribute('aria-label', `Platz ${rank}: ${m.manager}, ${m.totalScore} Punkte. Zum Team.`);

            card.innerHTML = `
                ${rank === 1 ? CROWN_SVG : ''}
                <span class="champ-rank-badge">#${rank}</span>
                <div class="champ-avatar" aria-hidden="true">${escapeHtml(initials(m.manager))}</div>
                <h3 class="champ-name">${escapeHtml(m.manager)}</h3>
                <span class="champ-points">
                    <span class="champ-points-value" data-target="${m.totalScore}">0</span>
                    <small>Pkt</small>
                </span>
            `;
            card.addEventListener('click', () => navTo(m.manager));
            podium.appendChild(card);
        });

        rest.forEach((m, i) => {
            const rank = i + 4;
            const row = document.createElement('button');
            row.type = 'button';
            row.className = 'champ-chaser';
            row.dataset.rank = String(rank);
            row.setAttribute('aria-label', `Platz ${rank}: ${m.manager}, ${m.totalScore} Punkte. Zum Team.`);
            row.innerHTML = `
                <div class="champ-rank-mini">#${rank}</div>
                <div class="champ-chaser-info">
                    <span class="champ-chaser-name">${escapeHtml(m.manager)}</span>
                </div>
                <div class="champ-chaser-points">
                    <span class="champ-points-value" data-target="${m.totalScore}">0</span>
                    <small>Pkt</small>
                </div>
            `;
            row.addEventListener('click', () => navTo(m.manager));
            chasers.appendChild(row);
        });

        document.querySelectorAll('.champ-points-value').forEach((el, idx) => {
            animateCount(el, Number(el.dataset.target) || 0, 1100, 600 + idx * 120);
        });

        // After intro animations finish, switch off animation so CSS :hover transitions
        // can take over (animation-layer transforms would otherwise block hover rules).
        readyTimer = setTimeout(() => {
            readyTimer = null;
            document.querySelectorAll('.champ-card').forEach((c) => c.classList.add('is-ready'));
        }, 1500);
    }

    // ── Daten laden ───────────────────────────────────────────────────────

    async function initChampStage() {
        const db = APP.getDb();

        // allowEmptyPoints:false → loadBundle always fetches from Firestore when
        // the cached points object is empty (which would otherwise cause all-zero scores).
        const CACHE_OPTIONS = { db, year: APP.year, allowEmptyPoints: false, log: false };

        // Pre-render from cache only when we actually have points data so managers
        // don't appear with 0 Punkte before the real fetch completes.
        try {
            const cached = DreamTeamCache.getCachedBundle({ ...CACHE_OPTIONS, allowEmptyPoints: true });
            if (cached.ok
                && (cached.data.teams || []).length > 0
                && hasRealPoints(cached.data.points)) {
                renderChampStage(buildRanking(cached.data));
            }
        } catch (_) { /* ignore cache errors, fresh fetch will follow */ }

        try {
            const fresh = await DreamTeamCache.loadBundle(CACHE_OPTIONS);
            renderChampStage(buildRanking(fresh.data));
        } catch (err) {
            console.warn('[ChampStage] Fehler beim Laden der Rangliste:', err);
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initChampStage);
    } else {
        initChampStage();
    }
})();
</script>

<script>

const track = document.getElementById('track');
const carousel = document.getElementById('carousel');

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function normalizePlayer(raw) {
    return {
        id: String(raw['player.id']),
        name: raw.Spielername,
        country: raw['Nationalteam.name'] || '',
        countryFlag: raw['Nationalteam.logo'] || '',
        club: raw['Club.name'] || '',
        clubLogo: raw['Club.logo'] || '',
        img: raw.Spielerfoto || ''
    };
}

function parseTeamsFromStorage() {
    const candidates = [];
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key || !key.endsWith('_teams')) continue;
        try {
            const parsed = JSON.parse(localStorage.getItem(key));
            const teams = Array.isArray(parsed) ? parsed : (Array.isArray(parsed?.data) ? parsed.data : null);
            if (Array.isArray(teams) && teams.length) candidates.push(teams);
        } catch (_) {}
    }
    return candidates.sort((a, b) => b.length - a.length)[0] || [];
}

function getPlayerTotalPoints(player) {
    return Number(player?.totalPoints ?? player?.totalScore ?? player?.points ?? player?.punkte ?? player?.score ?? player?.['Punkte'] ?? 0) || 0;
}
function getPlayerImage(player){ return player?.photo || player?.image || player?.playerPhoto || player?.avatar || player?.Spielerfoto || ''; }
function getManagerName(team){ return team?.manager || team?.managerName || team?.name || 'Unbekannt'; }
function buildTopDraftedPlayers(limit = 15) {
    const playersById = new Map((Array.isArray(playersData) ? playersData : []).map((p) => [String(p['player.id']), p]));
    const pickCounts = new Map();
    const teams = parseTeamsFromStorage();

    teams.forEach((team) => {
        (team?.players || []).forEach((player) => {
            const id = String(player?.playerId || '');
            if (!id || !playersById.has(id)) return;
            pickCounts.set(id, (pickCounts.get(id) || 0) + 1);
        });
    });

    return Array.from(pickCounts.entries())
        .map(([id, drafts]) => ({ ...normalizePlayer(playersById.get(id)), drafts }))
        .sort((a, b) => b.drafts - a.drafts)
        .slice(0, limit);
}
function getEnrichedTeamPlayers(team, playersById) {
    return (team?.players || []).map((p) => {
        const id = String(p?.playerId || p?.id || '');
        const full = playersById.get(id);
        const points = getPlayerTotalPoints(p) || getPlayerTotalPoints(full);
        return { id, isCaptain: !!(p?.isCaptain || p?.captain), points, full: full || {} };
    });
}
function buildTopPlayersItems(limit = 15) {
    const playersById = new Map((playersData || []).map((p) => [String(p['player.id']), p]));
    return Array.from(playersById.values()).map((p) => ({...normalizePlayer(p), points:getPlayerTotalPoints(p)})).sort((a,b)=>b.points-a.points).slice(0,limit).map((p)=>({...p,bottomText:`${p.points} ${p.points===1?'Punkt':'Punkte'}`}));
}
function buildFanFavoriteItems(limit=15, withDraftInfo=true){ return buildTopDraftedPlayers(limit).map((p)=>({...p,bottomText: withDraftInfo ? `${p.drafts.toLocaleString('de-DE')}x gedraftet` : ''})); }
function buildCaptainWatchItems(limit=15){
    const teams = parseTeamsFromStorage(); const playersById = new Map((playersData || []).map((p)=>[String(p['player.id']),p])); const counts = new Map();
    teams.forEach((t)=>getEnrichedTeamPlayers(t, playersById).forEach((p)=>{ if (!p.isCaptain || !playersById.has(p.id)) return; const x = counts.get(p.id)||{count:0,points:getPlayerTotalPoints(playersById.get(p.id))}; x.count++; counts.set(p.id,x); }));
    return Array.from(counts.entries()).map(([id,v])=>({...normalizePlayer(playersById.get(id)), captainCount:v.count, points:v.points, bottomText:`${v.count}x Captain · ${v.points} ${v.points===1?'Punkt':'Punkte'}`})).sort((a,b)=>b.captainCount-a.captainCount||b.points-a.points).slice(0,limit);
}
function buildManagerRankingItems(limit=15){
    const liveRanking = Array.isArray(window.__dtTestRankingTeams) ? window.__dtTestRankingTeams : [];
    if (liveRanking.length) {
        return liveRanking.slice(0, limit).map((team, idx) => ({
            manager: getManagerName(team),
            totalPoints: Number(team?.totalScore ?? 0) || 0,
            top: Array.isArray(team?.mergedPlayers) ? team.mergedPlayers.slice(0, 5).map((p) => ({
                id: p.id,
                isCaptain: !!p.isCaptain,
                points: Number(p?.pts ?? 0) || 0,
                full: {
                    Spielername: p.name,
                    Spielerfoto: p.photo
                }
            })) : [],
            rank: idx + 1
        }));
    }

    const teams = parseTeamsFromStorage();
    const playersById = new Map((playersData || []).map((p)=>[String(p['player.id']),p]));
    const items = teams.map((t)=>{ const p=getEnrichedTeamPlayers(t,playersById).sort((a,b)=>b.points-a.points); return { manager:getManagerName(t), totalPoints:Number(t?.totalPoints ?? t?.totalScore ?? t?.points ?? t?.punkte ?? t?.score ?? p.reduce((s,x)=>s+x.points,0))||0, top:p.slice(0,5), storedRank: Number(t?.rank ?? t?.currentRank ?? 0) || null }; });
    const hasRealRank = items.some((x)=>x.storedRank && x.storedRank > 0);
    const sorted = hasRealRank ? items.sort((a,b)=>a.storedRank-b.storedRank||b.totalPoints-a.totalPoints) : items.sort((a,b)=>b.totalPoints-a.totalPoints||a.manager.localeCompare(b.manager,'de'));
    return sorted.slice(0,limit).map((t,i)=>({...t, rank: hasRealRank ? t.storedRank : i+1}));
}
let players = [];
let cards = [];
function renderPlayerCard(p) {
    const el = document.createElement('article');
    el.className = 'player-card';
    el.dataset.playerName = p.name;
    el.dataset.playerId = p.id;
    el.innerHTML = `
        <div class="player-photo-wrap">
            <img class="player-photo" loading="lazy" src="${escapeHtml(p.img)}" alt="Spielerfoto von ${escapeHtml(p.name)}">
        </div>
        <div class="player-info">
            <h3 class="player-name">${escapeHtml(p.name)}</h3>
            <div class="meta-row"><img class="meta-icon flag-icon" loading="lazy" src="${escapeHtml(p.countryFlag)}" alt="Flagge ${escapeHtml(p.country)}"><span>${escapeHtml(p.country)}</span></div>
            <div class="meta-row"><img class="meta-icon club-icon" loading="lazy" src="${escapeHtml(p.clubLogo)}" alt="Vereinslogo ${escapeHtml(p.club)}"><span>${escapeHtml(p.club)}</span></div>
            ${p.bottomText ? `<div class="drafts"><span>👥</span><strong>${escapeHtml(p.bottomText)}</strong></div>` : ''}
        </div>
    `;
    return el;
}
function renderManagerCard(item){
    const el = document.createElement('article'); el.className='player-card manager-carousel-card'; el.dataset.managerName=item.manager; el.dataset.rank=String(item.rank);
    const topPlayers = item.top.slice(0,3).map((p, idx)=>{
        const n = escapeHtml(p.full?.Spielername||'Spieler');
        const img = escapeHtml(getPlayerImage(p.full));
        const badge = p.isCaptain ? '<span class="captain-badge">C</span>' : '';
        const pts = Number(p.points||0);
        const visualRank = idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : 'rank-3';
        return `<div class="manager-card-player ${visualRank}"><div class="manager-card-player-avatar"><img loading="lazy" src="${img}" alt="${n}">${badge}</div><div class="manager-card-player-name">${n}</div><div class="manager-card-player-points">${pts} P</div></div>`;
    }).join('');
    el.innerHTML = `<div class="manager-card-rank">#${item.rank}</div><h3 class="manager-card-name">${escapeHtml(item.manager)}</h3><div class="manager-card-points">${item.totalPoints} Punkte</div><div class="manager-card-topplayers">${topPlayers}</div>`;
    return el;
}
function renderCarouselItems(items){
    track.innerHTML=''; players = items; cards = [];
    if (!items.length) { track.innerHTML = `<article class="player-card"><h3>Noch keine Draft-Daten gefunden</h3></article>`; return; }
    cards = items.map((it)=>renderPlayerCard(it)); cards.forEach((c)=>track.appendChild(c));
    state.pos = 0; state.vel = 0; fitPlayerNames(); render();
}
function initCarousel(){
    renderCarouselItems(buildFanFavoriteItems());
}

function fitPlayerNames() {
    document.querySelectorAll('.player-name').forEach((nameEl) => {
        nameEl.style.fontSize = '';
        nameEl.style.transform = '';
        nameEl.style.transformOrigin = 'left center';
        nameEl.style.whiteSpace = 'nowrap';
        nameEl.style.display = 'block';

        const computed = window.getComputedStyle(nameEl);
        let size = parseFloat(computed.fontSize);
        const minSize = 8.5;

        while (nameEl.scrollWidth > nameEl.clientWidth && size > minSize) {
            size -= 0.5;
            nameEl.style.fontSize = `${size}px`;
        }

        if (nameEl.scrollWidth > nameEl.clientWidth && nameEl.scrollWidth > 0) {
            const scale = nameEl.clientWidth / nameEl.scrollWidth;
            nameEl.style.transform = `scaleX(${scale})`;
            nameEl.style.transformOrigin = 'left center';
        }
    });
}

const state = {
    pos: 0,
    vel: 0,
    drag: false,
    moved: false,
    lastX: 0,
    lastT: 0,
    downX: 0,
    downY: 0,
    downCard: null
};
let cardGap = 168;
let raf = null;
const CLICK_MOVE_PX = 10;
const CLICK_VELOCITY_THRESHOLD = 0.012;

function resizeCarousel() {
    const w = carousel.clientWidth;
    cardGap = Math.max(64, Math.min(110, w * 0.16));
}

function mod(a, n) { return ((a % n) + n) % n; }

function render() {
    const n = cards.length;
    if (!n) return;
    for (let i = 0; i < n; i++) {
        let delta = i - state.pos;
        delta = mod(delta + n / 2, n) - n / 2;

        const abs = Math.abs(delta);
        const clamped = Math.min(abs, 4.6);
        const x = delta * cardGap;
        const scale = 1 - clamped * 0.12;
        const z = 300 - clamped * 85;
        const rotY = delta * -8;
        const y = clamped * 9;
        const op = 1 - clamped * 0.16;

        const card = cards[i];
        card.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateY(${rotY}deg) scale(${scale})`;
        card.style.opacity = String(Math.max(0, op));
        card.style.filter = `saturate(${1.1 - clamped * 0.1}) blur(${Math.max(0, clamped - 2.2) * 0.9}px)`;
        card.style.zIndex = String(Math.round(1000 - clamped * 100));
        card.style.boxShadow = abs < 0.38
            ? '0 20px 50px rgba(0,0,0,0.58), 0 0 38px rgba(255,215,0,0.2)'
            : '0 14px 36px rgba(0,0,0,0.42)';
        card.style.pointerEvents = abs < 0.5 ? 'auto' : 'none';
    }
}

function tick() {
    if (!cards.length) return;

    if (!state.drag) {
        state.pos += state.vel;
        state.vel *= 0.92;
        if (Math.abs(state.vel) < 0.0005) {
            const target = Math.round(state.pos);
            state.pos += (target - state.pos) * 0.08;
        }
    }

    if (players.length && state.pos >= players.length) state.pos -= players.length;
    if (players.length && state.pos < 0) state.pos += players.length;

    render();
    raf = requestAnimationFrame(tick);
}

function pointerDown(clientX, clientY, target) {
    state.drag = true;
    state.moved = false;
    state.lastX = clientX;
    state.lastT = performance.now();
    state.downX = clientX;
    state.downY = clientY;
    state.downCard = target?.closest?.('.player-card') || null;
}

function pointerMove(clientX, clientY) {
    if (!state.drag) return;
    const now = performance.now();
    const dx = clientX - state.lastX;
    const dt = Math.max(8, now - state.lastT);
    const units = dx / cardGap;

    state.pos -= units;
    state.vel = (state.vel * 0.7) + ((-units / dt) * 16);
    if (!state.moved) {
        const travelX = Math.abs(clientX - state.downX);
        const travelY = Math.abs(clientY - state.downY);
        if (travelX > CLICK_MOVE_PX || travelY > CLICK_MOVE_PX) state.moved = true;
    }

    state.lastX = clientX;
    state.lastT = now;
}

function pointerUp(event) {
    if (state.drag && state.downCard && !state.moved && Math.abs(state.vel) < CLICK_VELOCITY_THRESHOLD) {
        const managerName = state.downCard.dataset.managerName || '';
        if (managerName) window.location.href = `teams.html?manager=${encodeURIComponent(managerName)}`;
        const playerName = state.downCard.dataset.playerName || '';
        if (!managerName && playerName) window.location.href = `spieleranalyse.html?player=${encodeURIComponent(playerName)}`;
    }
    state.drag = false;
    state.moved = false;
    state.downCard = null;
}

carousel.addEventListener('pointerdown', (e) => {
    carousel.setPointerCapture(e.pointerId);
    pointerDown(e.clientX, e.clientY, e.target);
});
carousel.addEventListener('pointermove', (e) => pointerMove(e.clientX, e.clientY));
carousel.addEventListener('pointerup', pointerUp);
carousel.addEventListener('pointercancel', pointerUp);
carousel.addEventListener('lostpointercapture', pointerUp);

carousel.addEventListener('wheel', (e) => {
    e.preventDefault();
    const speed = (Math.abs(e.deltaY) > Math.abs(e.deltaX) ? e.deltaY : e.deltaX) * 0.0012;
    state.vel += speed;
}, {passive: false});

window.addEventListener('resize', () => {
    resizeCarousel();
    fitPlayerNames();
}, {passive: true});
resizeCarousel();
initCarousel();
if (!raf) tick();

</script>
