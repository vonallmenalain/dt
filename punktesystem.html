<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>DreamTeam - Punktesystem</title>
    <meta name="theme-color" content="#28a745">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DreamTeam">
    <link rel="manifest" href="Icons/site.webmanifest">
    <link rel="icon" type="image/x-icon" href="Icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="Icons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="Icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="Icons/favicon-48x48.png">
    <link rel="apple-touch-icon" sizes="180x180" href="Icons/apple-touch-icon.png">
    <link rel="mask-icon" href="Icons/maskable-icon-192x192.png" color="#28a745">
    <meta name="msapplication-config" content="Icons/browserconfig.xml">
    <meta name="view-transition" content="same-origin">
    <meta name="description" content="DreamTeam – Punktesystem und Regelübersicht für dein Fantasy-Team.">

    <!-- Frühe Verbindungsöffnung zu Firebase + CDN; spart auf Mobile
         häufig 100–300 ms TLS/DNS. -->
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>

    <!-- Firebase-Compat-SDK früh und parallel zum HTML-Parsing laden. -->
    <!-- Firebase-Compat-SDK SYNCHRON laden – konsistent zu den übrigen
         Seiten und robust gegen künftige Inline-`APP.getDb()`-Aufrufe. -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <link rel="stylesheet" href="styles.css">

    <style>
        /* =====================================================
           ROOT & GLOBAL – DARK DREAMTEAM THEME
           ===================================================== */
        :root {
            --gold: #ffd700;
            --gold-dark: #e5a800;
            --gold-light: #fbbf24;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.10);
            --dark-bg: #0d1117;
            --dark-surface: #161b22;
            --dark-card: #1c2333;
            --dark-card-hover: #202840;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --green-main: #22c55e;
            --green-light: #4ade80;
            --green-glow: rgba(34, 197, 94, 0.35);
            --red-main: #ef4444;
            --red-light: #f87171;
            --red-glow: rgba(239, 68, 68, 0.25);
        }

        body {
            background: var(--dark-bg);
            color: var(--text-main);
            padding-top: 0;
            padding-bottom: 0;
            overflow-x: hidden;
        }

        /* Dark navbar override */
        body > nav.navbar {
            background: rgba(22, 27, 34, 0.95) !important;
            border-bottom: 1px solid rgba(255,255,255,0.07) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
        }

        body > nav.navbar .navbar-brand,
        body > nav.navbar .nav-links a {
            color: var(--text-main) !important;
        }

        body > nav.navbar .nav-links a:hover,
        body > nav.navbar .nav-links a.active {
            background: rgba(34,197,94,0.2) !important;
            color: var(--green-light) !important;
        }

        .bottom-nav {
            background: #161b22 !important;
            border-top-color: rgba(255,255,255,0.07) !important;
        }

        .bottom-nav a { color: var(--text-muted) !important; }
        .bottom-nav a.active { color: var(--green-light) !important; }
        .bottom-nav a .icon { filter: grayscale(100%) brightness(0.7) !important; }
        .bottom-nav a.active .icon { filter: none !important; opacity: 1 !important; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* =====================================================
           PAGE WRAPPER
           ===================================================== */
        .ps-page {
            min-height: 100vh;
            position: relative;
            padding-bottom: 100px;
            box-sizing: border-box;
        }

        /* Stadium atmosphere background */
        .ps-page::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 90% 55% at 50% 100%, rgba(34,197,94,0.28) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 15% 5%, rgba(255,215,0,0.06) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 85% 5%, rgba(34,197,94,0.10) 0%, transparent 50%),
                linear-gradient(180deg, #050a0e 0%, #0d1117 30%, #0d1f10 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* =====================================================
           ANIMATIONS
           ===================================================== */
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 16px rgba(34,197,94,0.18); }
            50%       { box-shadow: 0 0 32px rgba(34,197,94,0.36); }
        }

        /* =====================================================
           HERO / PAGE HEADER
           ===================================================== */
        .ps-hero {
            max-width: 1220px;
            margin: 0 auto;
            padding: 36px 24px 28px;
            box-sizing: border-box;
            animation: fadeSlideDown 0.55s ease both;
        }

        .ps-hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(34,197,94,0.14);
            border: 1px solid rgba(34,197,94,0.35);
            color: var(--green-light);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 100px;
            margin-bottom: 14px;
        }

        .ps-hero-title {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 900;
            line-height: 1.1;
            margin: 0 0 8px;
            letter-spacing: -1px;
        }

        .ps-hero-title .accent {
            background: linear-gradient(135deg, var(--green-light), var(--green-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ps-hero-title .gold-text {
            background: linear-gradient(135deg, var(--green-light), var(--green-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ps-hero-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin: 0 0 0;
            line-height: 1.5;
        }

        .ps-hero-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 8px 0 0;
            line-height: 1.5;
            letter-spacing: 0.01em;
        }

        @media (max-width: 900px) {
            .ps-hero-meta {
                font-size: 0.8rem;
            }
        }

        /* =====================================================
           CAPTAIN NOTICE
           ===================================================== */
        .captain-notice {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 18px;
            padding: 14px 0;
            animation: fadeSlideDown 0.6s ease both;
        }

        .captain-notice .captain-badge {
            flex-shrink: 0;
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #1a1300;
            border-radius: 50%;
            font-weight: 900;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            box-shadow:
                0 0 0 2px rgba(255, 215, 0, 0.25),
                0 4px 12px rgba(255, 215, 0, 0.25);
        }

        .captain-notice .captain-text {
            flex: 1;
            font-size: 0.92rem;
            line-height: 1.45;
            color: var(--text-main);
        }

        .captain-notice .captain-text strong {
            color: var(--gold-light);
            font-weight: 700;
        }

        @media (max-width: 900px) {
            .captain-notice {
                margin-top: 14px;
                padding: 12px 0;
                gap: 12px;
            }

            .captain-notice .captain-badge {
                width: 34px;
                height: 34px;
                font-size: 0.95rem;
            }

            .captain-notice .captain-text {
                font-size: 0.86rem;
            }
        }

        /* =====================================================
           CONTENT WRAPPER
           ===================================================== */
        .ps-content {
            max-width: 1220px;
            margin: 0 auto;
            padding: 24px 24px 0;
            box-sizing: border-box;
        }

        /* =====================================================
           RULES GRID
           ===================================================== */
        .rules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        /* =====================================================
           RULE CARD – GLASSMORPHISM
           ===================================================== */
        .rule-card {
            background: var(--dark-card);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 24px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
            animation: fadeSlideUp 0.5s ease both;
            will-change: transform;
        }

        .rule-card:nth-child(1) { animation-delay: 0.05s; }
        .rule-card:nth-child(2) { animation-delay: 0.10s; }
        .rule-card:nth-child(3) { animation-delay: 0.15s; }
        .rule-card:nth-child(4) { animation-delay: 0.20s; }
        .rule-card:nth-child(5) { animation-delay: 0.25s; }
        .rule-card:nth-child(6) { animation-delay: 0.30s; }

        @media (hover: hover) and (pointer: fine) {
            .rule-card:hover {
                transform: translateY(-4px);
                border-color: rgba(74,222,128,0.22);
                box-shadow:
                    0 0 0 1px rgba(74,222,128,0.10),
                    0 12px 32px rgba(0,0,0,0.4),
                    0 0 20px rgba(34,197,94,0.08);
            }

            .rule-card::before {
                content: "";
                position: absolute;
                top: -60%;
                left: -60%;
                width: 50%;
                height: 200%;
                background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.04) 50%, transparent 80%);
                transform: skewX(-25deg);
                transition: left 0.5s ease;
                pointer-events: none;
            }

            .rule-card:hover::before { left: 150%; }
        }

        .rule-card h3 {
            margin: 0 0 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.01em;
        }

        /* Card icon badge */
        .rule-card h3 .card-icon {
            font-size: 1.25rem;
            line-height: 1;
        }

        /* =====================================================
           POINT LIST
           ===================================================== */
        .point-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .point-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: color 0.15s ease;
        }

        .point-list li:last-child {
            border-bottom: none;
        }

        .point-list li:hover {
            color: var(--text-main);
        }

        .point-label {
            flex: 1;
            line-height: 1.4;
        }

        /* =====================================================
           POINT BADGES
           ===================================================== */
        .pts-pos {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.30);
            color: var(--green-light);
            font-weight: 700;
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 100px;
            min-width: 44px;
            text-align: center;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }

        .pts-pos:hover {
            background: rgba(34,197,94,0.25);
            box-shadow: 0 0 10px rgba(34,197,94,0.25);
        }

        .pts-neg {
            background: rgba(239,68,68,0.13);
            border: 1px solid rgba(239,68,68,0.28);
            color: var(--red-light);
            font-weight: 700;
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 100px;
            min-width: 44px;
            text-align: center;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }

        .pts-neg:hover {
            background: rgba(239,68,68,0.22);
            box-shadow: 0 0 10px rgba(239,68,68,0.2);
        }

        /* =====================================================
           RESPONSIVE – MOBILE
           ===================================================== */
        @media (max-width: 900px) {
            .ps-hero {
                padding: 28px 16px 20px;
            }

            .ps-content {
                padding: 16px 16px 0;
            }

            .rules-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .rule-card {
                padding: 20px 18px;
                border-radius: 16px;
            }

            .rule-card h3 {
                font-size: 0.95rem;
            }

            .point-list li {
                font-size: 0.88rem;
                padding: 9px 0;
            }
        }

        @media (max-width: 400px) {
            .ps-hero-title {
                font-size: 1.6rem;
            }

            .point-list li {
                font-size: 0.84rem;
            }
        }
    </style>
</head>
<body>

<div class="ps-page">

    <!-- HERO -->
    <header class="ps-hero">
        <div class="ps-hero-badge">📊 Regeln &amp; Punkte</div>
        <h1 class="ps-hero-title" id="page-title">
            <span class="accent">Punkte</span><span class="gold-text">system</span>
        </h1>
        <p class="ps-hero-subtitle" id="page-intro">So sammeln deine Spieler Punkte für dein DreamTeam.</p>
        <p class="ps-hero-meta" id="page-meta">15 Spieler&nbsp;&nbsp;·&nbsp;&nbsp;1 Captain&nbsp;&nbsp;·&nbsp;&nbsp;Maximal 1 Spieler pro Nation</p>

        <div class="captain-notice" role="note" aria-label="Hinweis zum Captain">
            <span class="captain-badge" aria-hidden="true">C</span>
            <div class="captain-text">
                <div>Der <strong>Captain</strong> erhält die <strong>doppelten Punkte</strong>.</div>
                <div>Stammspieler und Ersatzspieler erhalten gleich viel Punkte</div>
            </div>
        </div>
    </header>

    <!-- RULES GRID -->
    <main class="ps-content">
        <div class="rules-grid" id="rules-grid"></div>
    </main>

</div>

<script src="tournament-config.js"></script>
<script src="nav.js"></script>
<!-- firebase-*-compat werden bereits im <head> mit defer geladen. -->
<!-- Navbar Login: Auth-Modal + Helpers (siehe auch nav.js) -->
<link rel="stylesheet" href="auth-modal.css">
<script src="admin.js"></script>
<script src="auth.js"></script>
<script src="auth-modal.js"></script>

<script>
    const APP = window.APP_CONFIG;

    if (!APP) {
        throw new Error("APP_CONFIG fehlt. Lade tournament-config.js vor punktesystem.html.");
    }

    const RULES = APP.rules || {};
    const PAGE_TITLE_PREFIX = APP.pageTitlePrefix || "DreamTeam";
    const TOURNAMENT_LABEL = APP.tournamentLabel || "";

    document.title = `${PAGE_TITLE_PREFIX} - Punktesystem`;

    const introEl = document.getElementById("page-intro");
    const gridEl = document.getElementById("rules-grid");

    if (introEl) {
        introEl.textContent = `So sammeln deine Spieler Punkte für dein DreamTeam.`;
    }

    function pointClass(value) {
        return value >= 0 ? "pts-pos" : "pts-neg";
    }

    function pointText(value) {
        return value > 0 ? `+${value}` : `${value}`;
    }

    function createRuleItem(label, value) {
        return `
            <li>
                <div class="point-label">${label}</div>
                <span class="${pointClass(value)}">${pointText(value)}</span>
            </li>
        `;
    }

    const ruleCards = [
        {
            title: "🌟 Allgemein (+ Punkte)",
            items: [
                { label: "Einsatz von Beginn weg", value: RULES.START },
                { label: "Einwechslung", value: RULES.SUBBED_IN },
                { label: "Sieg", value: RULES.WIN },
                { label: "Unentschieden", value: RULES.DRAW },
                { label: "Elfmeter herausgeholt", value: RULES.PEN_WON }
            ]
        },
        {
            title: "⚠️ Allgemein (- Punkte)",
            items: [
                { label: "Auswechslung", value: RULES.SUBBED_OUT },
                { label: "Niederlage", value: RULES.LOSS },
                { label: "Gelbe Karte", value: RULES.YELLOW_CARD },
                { label: "Rote Karte", value: RULES.RED_CARD },
                { label: "Eigentor", value: RULES.OWN_GOAL },
                { label: "Verschossener Elfmeter", value: RULES.PEN_MISSED },
                { label: "Verursachter Elfmeter", value: RULES.PEN_COMMITED }
            ]
        },
        {
            title: "🧤 Torhüter",
            items: [
                { label: "Kein Gegentor", value: RULES.DEF_BASE_PTS },
                { label: "Pro Gegentor", value: RULES.GEGENTOR_GK_DEF },
                { label: "Gehaltener Elfmeter", value: RULES.PEN_SAVED },
                { label: "Assist", value: RULES.ASSIST_GK_DEF },
                { label: "Tor", value: RULES.GOAL_GK }
            ]
        },
        {
            title: "🛡️ Verteidigung",
            items: [
                { label: "Kein Gegentor", value: RULES.DEF_BASE_PTS },
                { label: "Pro Gegentor", value: RULES.GEGENTOR_GK_DEF },
                { label: "Assist", value: RULES.ASSIST_GK_DEF },
                { label: "Tor", value: RULES.GOAL_DEF }
            ]
        },
        {
            title: "👟 Mittelfeld",
            items: [
                { label: "Assist", value: RULES.ASSIST_MID },
                { label: "Tor", value: RULES.GOAL_MID },
                { label: "Pro Tor (Mannschaft)", value: RULES.TEAM_GOAL }
            ]
        },
        {
            title: "⚽ Sturm",
            items: [
                { label: "Assist", value: RULES.ASSIST_ATT },
                { label: "Tor", value: RULES.GOAL_ATT },
                { label: "Pro Tor (Mannschaft)", value: RULES.TEAM_GOAL }
            ]
        }
    ];

    gridEl.innerHTML = ruleCards.map(card => `
        <div class="rule-card">
            <h3>${card.title}</h3>
            <ul class="point-list">
                ${card.items.map(item => createRuleItem(item.label, item.value)).join("")}
            </ul>
        </div>
    `).join("");
</script>

</body>
</html>
