                                <div class="match-total ${val.TotalPunkte < 0 ? 'neg' : ''}">${val.TotalPunkte > 0 ? '+' : ''}${val.TotalPunkte} Pkt.</div>
                                <span class="toggle-icon" aria-hidden="true">▼</span>
                            </div>
                        </div>
                        <div class="match-details-content">
                            ${matchNumber ? `<div style="font-size:0.72rem;font-weight:800;color:var(--text-muted);margin-bottom:10px;">SPIEL ${matchNumber}</div>` : ''}
                            ${detailsHTML}
                        </div>
                    `;
                    gameBox.appendChild(card);
                });
            } else {
                gameBox.innerHTML = '<div style="color:var(--text-muted);padding:10px;font-style:italic;">Noch keine Spiele absolviert.</div>';
            }
        } else {
            combinedPointsBox.innerHTML = `
                <div class="analysis-card-header" style="border-bottom:1px solid var(--glass-border);">
                    <div class="analysis-card-title">
                        <span class="act-accent" aria-hidden="true"></span>
                        📊 Punkteaufschlüsselung
                    </div>
                </div>
                <div class="taktik-header" onclick="toggleDetails(this)" aria-expanded="false">
                    <div class="taktik-grid">
                        <div class="pts-section-head">
                            <span class="pts-section-label pos">📈 Pluspunkte</span>
                            <span class="taktik-sum pos">+0</span>
                        </div>
                        <div class="minus-header-col pts-section-head">
                            <span class="pts-section-label neg">📉 Minuspunkte</span>
                            <div style="display:flex;align-items:center;gap:12px;">
                                <span class="taktik-sum neg">0</span>
                                <span class="toggle-icon" aria-hidden="true">▼</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="taktik-content">
                    <div class="empty-cat">Keine Daten vorhanden.</div>
                </div>
            `;
            gameBox.innerHTML = '<div style="color:var(--text-muted);padding:10px;font-style:italic;">Noch keine Spiele absolviert.</div>';
        }

        document.querySelectorAll('.list-item').forEach(el => {
            const nameEl = el.querySelector('.list-name');
            el.classList.toggle('active', !!nameEl && nameEl.textContent === player.Spielername);
        });

        syncSidebarHeight();
    }

    /* =========================================================
       MATCH HELPERS
       ========================================================= */
    function getMatchNumberByRawId(rawId) {
        const num = Number(rawId);
        const found = matchCatalog.find(m => Number(m.rawMatchId) === num);
        return found ? found.number : null;
    }

    /* =========================================================
       GAMES VIEW
       ========================================================= */
    function getSelectedGamesCountryStats() {
        if (currentGameNationFilter === 'ALL') return null;
        return gamesCountryStatsMap.get(currentGameNationFilter) || null;
    }

    function getSortedGamesCountryStats() {
        const items = [...gamesCountryStats];
        if (currentGamesSort === 'name') {
            items.sort((a, b) => a.nation.localeCompare(b.nation, 'de'));
        } else {
            items.sort((a, b) => {
                if (b.totalPoints !== a.totalPoints) return b.totalPoints - a.totalPoints;
                return a.nation.localeCompare(b.nation, 'de');
            });
        }
        return items;
    }

    function getGamesScoreClass(match) {
        if (currentGameNationFilter === 'ALL') return 'draw';
        const outcome = match.outcomeByNation?.[currentGameNationFilter];
        if (outcome === 'win') return 'win';
        if (outcome === 'loss') return 'loss';
        if (outcome === 'draw') return 'draw';
        const parsed = parseResultString(match.resultText || '');
        if (!parsed) return 'draw';
        if (currentGameNationFilter === parsed.homeName) {
            if (parsed.homeGoals > parsed.awayGoals) return 'win';
            if (parsed.homeGoals < parsed.awayGoals) return 'loss';
            return 'draw';
        }
        if (currentGameNationFilter === parsed.awayName) {
            if (parsed.awayGoals > parsed.homeGoals) return 'win';
            if (parsed.awayGoals < parsed.homeGoals) return 'loss';
            return 'draw';
        }
        return 'draw';
    }

    function restoreGamesCountryListScroll(targetScrollTop = gamesCountryListScrollTop) {
        const list = document.getElementById('games-country-list');
        if (!list) return;
        const desiredScrollTop = Math.max(0, Number(targetScrollTop) || 0);
        const maxScrollTop = Math.max(0, list.scrollHeight - list.clientHeight);
        list.scrollTop = Math.min(desiredScrollTop, maxScrollTop);
        gamesCountryListScrollTop = list.scrollTop;
    }

    function renderGamesCountryList(preserveScroll = true) {
        const list = document.getElementById('games-country-list');
        const countries = getSortedGamesCountryStats();
        const preservedScrollTop = preserveScroll ? gamesCountryListScrollTop : 0;

        if (!countries.length) {
            gamesCountryListScrollTop = 0;
            list.innerHTML = '<div class="sidebar-empty">Keine Länder gefunden.</div>';
            return;
        }

        list.innerHTML = countries.map(entry => {
            const nationEncoded = encodeURIComponent(entry.nation);
            const flagHtml = entry.flag
                ? `<img src="${entry.flag}" class="games-country-flag-small" alt="${escapeHtml(entry.nation)}" loading="lazy">`
                : `<span class="games-country-flag-small" style="display:inline-flex;align-items:center;justify-content:center;font-size:11px;">🏳️</span>`;
            return `
                <div class="games-country-item ${currentGameNationFilter === entry.nation ? 'active' : ''}"
                     role="listitem"
                     onclick="selectGamesNation(decodeURIComponent('${nationEncoded}'))"
                     aria-label="${escapeHtml(entry.nation)}, ${formatPoints(entry.totalPoints)} Punkte">
                    <div class="games-country-left">
                        ${flagHtml}
                        <div class="games-country-name-small">${escapeHtml(entry.nation)}</div>
                    </div>
                    <div class="games-country-total-small ${entry.totalPoints < 0 ? 'neg' : ''}">${formatPoints(entry.totalPoints)}</div>
                </div>
            `;
        }).join('');

        requestAnimationFrame(() => restoreGamesCountryListScroll(preservedScrollTop));
    }

    function renderGamesTopCard() {
        const card = document.getElementById('games-top-card');
        const stats = getSelectedGamesCountryStats();

        if (!stats) {
            card.innerHTML = `
                <div class="games-country-summary">
                    <div class="games-country-main">
                        <div class="games-country-placeholder">🌍</div>
                        <div class="games-country-text">
                            <div class="games-country-label">Land</div>
                            <h2 class="games-country-name">Kein Land ausgewählt</h2>
                            <p class="games-country-subtitle">Links ein Land wählen oder alle Spiele des Turniers durchsuchen.</p>
                        </div>
                    </div>
                </div>
            `;
            return;
        }

        const flagHtml = stats.flag
            ? `<img src="${stats.flag}" class="games-country-flag-large" alt="${escapeHtml(stats.nation)}">`
            : `<div class="games-country-placeholder">🏳️</div>`;

        card.innerHTML = `
            <div class="games-country-summary">
                <div class="games-country-main">
                    ${flagHtml}
                    <div class="games-country-text">
                        <div class="games-country-label">Land</div>
                        <h2 class="games-country-name">${escapeHtml(stats.nation)}</h2>
                        <p class="games-country-subtitle">Alle Spiele und Spieler dieses Landes im Überblick.</p>
                    </div>
                </div>
                <div class="games-country-points-box">
                    <div class="games-country-points-label">Total Punkte</div>
                    <div class="games-country-points-value ${stats.totalPoints < 0 ? 'neg' : ''}">${formatPoints(stats.totalPoints)}</div>
                </div>
            </div>
        `;
    }

    function buildFilteredGames() {
        return matchCatalog.filter(match => {
            if (currentGameNationFilter === 'ALL') return true;
            return match.teamA === currentGameNationFilter || match.teamB === currentGameNationFilter;
        });
    }

    function renderGamesView() {
        const list = document.getElementById('games-list');
        let games = buildFilteredGames();

        if (currentOpenGameNumber && !games.some(match => String(match.number) === String(currentOpenGameNumber))) {
            currentOpenGameNumber = null;
        }

        renderGamesCountryList();
        renderGamesTopCard();

        if (!games.length) {
            list.innerHTML = '<div class="games-empty">Keine Spiele für dieses Land gefunden.</div>';
            syncSidebarHeight();
            return;
        }

        list.innerHTML = games.map(match => {
            const visual = getNeutralMatchVisual(match.resultText, match.teamA, match.teamB);
            const scoreClass = getGamesScoreClass(match);

            const leftFlagHtml = visual.leftFlag
                ? `<img src="${visual.leftFlag}" class="match-flag" alt="${escapeHtml(visual.leftName)}" loading="lazy">`
                : `<span class="match-flag" style="display:inline-flex;align-items:center;justify-content:center;font-size:11px;">🏳️</span>`;
            const rightFlagHtml = visual.rightFlag
                ? `<img src="${visual.rightFlag}" class="match-flag" alt="${escapeHtml(visual.rightName)}" loading="lazy">`
                : `<span class="match-flag" style="display:inline-flex;align-items:center;justify-content:center;font-size:11px;">🏳️</span>`;

            const bodyA = renderGamesTeamPlayers(match.teamA, match.playersByNation[match.teamA] || []);
            const bodyB = renderGamesTeamPlayers(match.teamB, match.playersByNation[match.teamB] || []);

            return `
                <div class="games-match-card">
                    <div class="games-match-header" onclick="openGameCard('${match.number}')" aria-expanded="${String(currentOpenGameNumber) === String(match.number)}">
                        <div class="games-match-number">Spiel ${match.number}</div>
                        <div class="games-match-duel">
                            <div class="games-team">
                                ${leftFlagHtml}
                                <span class="games-team-name">${escapeHtml(visual.leftName)}</span>
                            </div>
                            <div class="games-score ${scoreClass}">${visual.leftGoals} : ${visual.rightGoals}</div>
                            <div class="games-team right">
                                <span class="games-team-name">${escapeHtml(visual.rightName)}</span>
                                ${rightFlagHtml}
                            </div>
                        </div>
                        <div class="games-match-toggle" aria-hidden="true">${String(currentOpenGameNumber) === String(match.number) ? '▲' : '▼'}</div>
                    </div>
                    <div class="games-match-body" style="display:${String(currentOpenGameNumber) === String(match.number) ? 'block' : 'none'};">
                        <div class="games-teams-grid">
                            <div class="games-team-card">
                                <div class="games-team-card-header">${leftFlagHtml}<span>${escapeHtml(match.teamA)}</span></div>
                                <div class="games-player-list">${bodyA}</div>
                            </div>
                            <div class="games-team-card">
                                <div class="games-team-card-header">${rightFlagHtml}<span>${escapeHtml(match.teamB)}</span></div>
                                <div class="games-player-list">${bodyB}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        syncSidebarHeight();
    }

    function renderGamesTeamPlayers(teamName, players) {
        if (!players.length) return '<div class="games-empty">Keine Spieler-Daten vorhanden.</div>';
        return players.map(player => {
            const playerEncoded = encodeURIComponent(player.name);
            return `
                <button type="button" class="games-player-row ${player.drafted ? 'drafted' : ''}"
                        onclick="openPlayerFromGames(decodeURIComponent('${playerEncoded}'))"
                        aria-label="${escapeHtml(player.name)}, ${formatPoints(player.totalPoints)} Punkte">
                    <div class="games-player-left">
                        <div class="games-player-name">${escapeHtml(player.name)}</div>
                        <div class="games-player-meta">${escapeHtml(player.position)} • ${escapeHtml(player.club)}</div>
                    </div>
                    <div class="games-player-right">
                        ${player.drafted ? `<span class="games-picked-badge" aria-label="Wurde gedraftet">Gewählt</span>` : ''}
                        <span class="games-player-points ${player.totalPoints < 0 ? 'neg' : ''}">${formatPoints(player.totalPoints)}</span>
                    </div>
                </button>
            `;
        }).join('');
    }

    /* =========================================================
       GLOBAL FUNCTIONS (called from inline HTML)
       ========================================================= */
    function openGameCard(gameNumber, push = false) {
        if (String(currentOpenGameNumber) === String(gameNumber)) {
            currentOpenGameNumber = null;
        } else {
            currentOpenGameNumber = String(gameNumber);
        }
        renderGamesView();
        if (currentView !== 'games') setView('games', false);
        updateUrl(push);
    }
    window.openGameCard = openGameCard;

    function selectGamesNation(nation, push = true) {
        const countryList = document.getElementById('games-country-list');
        if (countryList) gamesCountryListScrollTop = countryList.scrollTop;
        currentGameNationFilter = nation || 'ALL';
        currentOpenGameNumber = null;
        renderGamesView();
        if (currentView !== 'games') setView('games', false);
        updateUrl(push);
    }
    window.selectGamesNation = selectGamesNation;

    function openPlayerFromGames(playerName) {
        const player = playersData.find(p => p.Spielername === playerName);
        if (!player) return;
        currentPlayerName = playerName;
        setView('players', false);
        triggerHeroSwitch(() => showPlayerDetails(player));
        updateUrl(true);
        scrollToHeroOnMobile();
    }
    window.openPlayerFromGames = openPlayerFromGames;

    function openGamesViewWithNation(nation, matchNumber = null) {
        const countryList = document.getElementById('games-country-list');
        if (countryList) gamesCountryListScrollTop = countryList.scrollTop;
        currentGameNationFilter = nation || 'ALL';
        currentOpenGameNumber = matchNumber || null;
        setView('games', false);
        renderGamesView();
        updateUrl(true);
    }
    window.openGamesViewWithNation = openGamesViewWithNation;

    window.toggleDetails = function(headerEl) {
        const content = headerEl.nextElementSibling;
        const icon = headerEl.querySelector('.toggle-icon');
        const isOpen = content.style.display === 'block';
        content.style.display = isOpen ? 'none' : 'block';
        if (icon) icon.textContent = isOpen ? '▼' : '▲';
        headerEl.setAttribute('aria-expanded', String(!isOpen));
        syncSidebarHeight();
    };

    /* =========================================================
       MAIN DATASET APPLICATION
       ========================================================= */
    function applyDataset(data, options = {}) {
        const preserveCurrentPlayer = !!options.preserveCurrentPlayer;

        pointsData = data.points || {};
        allTeams = Array.isArray(data.teams) ? data.teams : [];

        buildPlayerSelectedMap();
        calculatePerfectTeamIds();
        initStaticFilters();
        buildGamesCountryStats();
        buildMatchCatalog();

        const state = getStateFromUrl();

        currentView = state.view;
        currentGameNationFilter = state.gameNation || 'ALL';
        currentOpenGameNumber = state.openGame || null;
        currentGamesSort = state.gameSort || 'pts';

        if (currentGameNationFilter !== 'ALL' && !gamesCountryStatsMap.has(currentGameNationFilter)) {
            currentGameNationFilter = 'ALL';
        }

        if (!preserveCurrentPlayer) {
            currentPlayerName = state.player || null;
        } else if (state.player) {
            currentPlayerName = state.player;
        }

        const clubFilterEl = document.getElementById('club-filter');
        if (state.club && Array.from(clubFilterEl.options).some(o => o.value === state.club)) {
            clubFilterEl.value = state.club;
        }

        document.getElementById('games-sort-name').classList.toggle('active', currentGamesSort === 'name');
        document.getElementById('games-sort-pts').classList.toggle('active', currentGamesSort === 'pts');

        const filteredData = applyFilters();
        renderGamesView();

        let targetPlayer = null;
        if (currentPlayerName) {
            targetPlayer = playersData.find(p => p.Spielername === currentPlayerName);
        }
        if (!targetPlayer && filteredData.length > 0) {
            targetPlayer = filteredData[0];
            currentPlayerName = targetPlayer.Spielername;
        }

        if (targetPlayer) {
            showPlayerDetails(targetPlayer);
        } else {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('empty-state').style.display = 'block';
            document.getElementById('empty-state').textContent = 'Keine Spieler für diese Filter gefunden.';
        }

        setView(currentView, false);
        hasRenderedOnce = true;
    }

    /* =========================================================
       EVENT LISTENERS
       ========================================================= */
    document.getElementById('btn-view-players').addEventListener('click', () => setView('players', true));
    document.getElementById('btn-view-games').addEventListener('click', () => setView('games', true));

    document.getElementById('tile-nation').addEventListener('click', () => {
        const nat = document.getElementById('detail-nation-name').textContent;
        if (nat && nat !== '–' && nat !== '-') {
            document.getElementById('search-input').value = '';
            document.getElementById('pos-filter').value = 'ALL';
            document.getElementById('club-filter').value = 'ALL';
            document.getElementById('nation-filter').value = nat;
            applyFilters();
            jumpToFiltersOnMobile();
            updateUrl(false);
        }
    });

    document.getElementById('tile-nation').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); document.getElementById('tile-nation').click(); }
    });

    document.getElementById('tile-club').addEventListener('click', () => {
        const club = document.getElementById('detail-club-name').textContent;
        if (club && club !== 'Vereinslos' && club !== '–' && club !== '-') {
            document.getElementById('search-input').value = '';
            document.getElementById('pos-filter').value = 'ALL';
            document.getElementById('nation-filter').value = 'ALL';
            document.getElementById('club-filter').value = club;
            applyFilters();
            jumpToFiltersOnMobile();
            updateUrl(false);
        }
    });

    document.getElementById('tile-club').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); document.getElementById('tile-club').click(); }
    });

    document.getElementById('search-input').addEventListener('input', () => { applyFilters(); updateUrl(false); });
    document.getElementById('pos-filter').addEventListener('change', () => { applyFilters(); updateUrl(false); });
    document.getElementById('nation-filter').addEventListener('change', () => { applyFilters(); updateUrl(false); });
    document.getElementById('club-filter').addEventListener('change', () => { applyFilters(); updateUrl(false); });

    document.getElementById('reset-filters').addEventListener('click', () => {
        document.getElementById('search-input').value = '';
        document.getElementById('pos-filter').value = 'ALL';
        document.getElementById('nation-filter').value = 'ALL';
        document.getElementById('club-filter').value = 'ALL';
        applyFilters(); updateUrl(false);
    });

    document.getElementById('sort-name').addEventListener('click', () => {
        currentSort = 'name';
        document.getElementById('sort-name').classList.add('active');
        document.getElementById('sort-pts').classList.remove('active');
        applyFilters(); updateUrl(false);
    });

    document.getElementById('sort-pts').addEventListener('click', () => {
        currentSort = 'pts';
        document.getElementById('sort-pts').classList.add('active');
        document.getElementById('sort-name').classList.remove('active');
        applyFilters(); updateUrl(false);
    });

    document.getElementById('games-sort-name').addEventListener('click', () => {
        currentGamesSort = 'name';
        document.getElementById('games-sort-name').classList.add('active');
        document.getElementById('games-sort-pts').classList.remove('active');
        renderGamesView(); updateUrl(false);
    });

    document.getElementById('games-sort-pts').addEventListener('click', () => {
        currentGamesSort = 'pts';
        document.getElementById('games-sort-pts').classList.add('active');
        document.getElementById('games-sort-name').classList.remove('active');
        renderGamesView(); updateUrl(false);
    });

    document.getElementById('games-reset-filters').addEventListener('click', () => {
        const countryList = document.getElementById('games-country-list');
        if (countryList) gamesCountryListScrollTop = countryList.scrollTop;
        currentGameNationFilter = 'ALL';
        currentOpenGameNumber = null;
        renderGamesView(); updateUrl(true);
    });

    document.getElementById('player-list').addEventListener('scroll', () => {
        const list = document.getElementById('player-list');
        playerListScrollTop = list.scrollTop;
        if (list.scrollTop + list.clientHeight >= list.scrollHeight - 80) appendNextPlayerBatch();
    });

    document.getElementById('games-country-list').addEventListener('scroll', () => {
        gamesCountryListScrollTop = document.getElementById('games-country-list').scrollTop;
    });

    window.addEventListener('resize', syncSidebarHeight);

    window.addEventListener('popstate', () => {
        if (!hasRenderedOnce) return;
        applyDataset({ points: pointsData, teams: allTeams }, { preserveCurrentPlayer: false });
    });

    /* =========================================================
       META REFRESH
       ========================================================= */
    async function refreshFromMeta(remoteMeta) {
        if (isMetaRefreshRunning) return;
        isMetaRefreshRunning = true;
        try {
            const updated = await DreamTeamCache.loadBundle({ ...CACHE_OPTIONS, remoteMetaOverride: remoteMeta });
            applyDataset(updated.data, { preserveCurrentPlayer: true });
        } catch (err) {
            console.error('Meta-Refresh fehlgeschlagen:', err);
        } finally {
            isMetaRefreshRunning = false;
        }
    }

    /* =========================================================
       INIT
       ========================================================= */
    async function init() {
        try {
            const cached = DreamTeamCache.getCachedBundle(CACHE_OPTIONS);
            if (cached.ok) applyDataset(cached.data, { preserveCurrentPlayer: false });

            const fresh = await DreamTeamCache.loadBundle(CACHE_OPTIONS);
            applyDataset(fresh.data, { preserveCurrentPlayer: true });

            if (!metaUnsubscribe) {
                metaUnsubscribe = DreamTeamCache.subscribeToMeta({
                    ...CACHE_OPTIONS,
                    onChange: async ({ remoteMeta }) => {
                        await refreshFromMeta(remoteMeta);
                    },
                    onError: (err) => {
                        console.error('Meta-Listener Fehler:', err);
                    }
                });
            }
        } catch (e) {
            console.error(e);
            if (!hasRenderedOnce) {
                document.getElementById('player-list').innerHTML = '<div class="list-empty" style="color:var(--red-soft);">Fehler beim Laden.</div>';
                document.getElementById('games-country-list').innerHTML = '<div class="sidebar-empty" style="color:var(--red-soft);">Fehler beim Laden.</div>';
                document.getElementById('games-list').innerHTML = '<div class="games-empty" style="color:var(--red-soft);">Fehler beim Laden.</div>';
            }
        }
    }

    window.addEventListener('DOMContentLoaded', init);

    window.addEventListener('beforeunload', () => {
        if (typeof metaUnsubscribe === 'function') metaUnsubscribe();
    });
</script>
