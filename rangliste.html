<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- FOUC-Schutz: aktives Turnier früh bestimmen und – nur für die CL –
         Blau (Hintergrund + Grün/Gold→Blau-Variablen) noch vor dem ersten
         Paint anwenden. Spiegelt die Auflösung aus tournament-config.js; die
         volle Logik (theme-cl.css) folgt direkt danach. WM: es wird nur
         data-tournament gesetzt – das Aussehen bleibt unverändert. -->
    <script>
    (function(){try{
      var h=(location.hostname||"").toLowerCase();
      var q=new URLSearchParams(location.search);
      function L(n){try{return localStorage.getItem(n);}catch(e){return null;}}
      // Gleiche Reihenfolge wie resolveTournamentKey() in tournament-config.js:
      // Preview > URL(?tournament) > Dev-Override > Domain > Fallback.
      var k=q.get("preview")||L("dreamteam_preview_"+h)||q.get("tournament")||L("dreamteam_dev_override_"+h)||({"dt.alae.app":"wm2026"})[h]||"wm2026";
      k=String(k).trim().toLowerCase();
      var d=document.documentElement;
      d.setAttribute("data-tournament",k);
      if(/^cl/.test(k)){
        d.style.background="#0a1633";
        var s=document.createElement("style");
        s.id="cl-critical-theme";
        s.textContent=':root[data-tournament^="cl"]{--green-light:#7db4ff;--green-main:#3d8bff;--green-deep:#3d8bff;--green-accent:#3d8bff;--green-glow:rgba(61,139,255,.35);--gold:#7db4ff;--gold-light:#a9cbff;--gold-dark:#3d8bff;--gold-amber:#3d8bff;--gold-amber2:#2f6fd0;--rgb-green-1:61,139,255;--rgb-green-2:61,139,255;--rgb-green-3:125,180,255;--rgb-gold:125,180,255;--rgb-amber:61,139,255;--primary:#3d8bff;--cl-primary:#3d8bff;--cl-accent:#7db4ff;--cl-background:#0a1633;--cl-surface:#132347;--cl-surface-alt:#0f1c3d;--cl-text:#dce8ff;--cl-text-muted:#9db6e8;--green-bg-1:#0a1633;--green-bg-2:#081029;--green-bg-3:#0a1633;}html[data-tournament^="cl"] body{background-color:#0a1633;color:#dce8ff;}[data-tournament^="cl"] .hero::before,[data-tournament^="cl"] #indexHomePostStart,[data-tournament^="cl"] #indexHomePreStart{background:#0a1633;}';
        (document.head||d).appendChild(s);
      }
      // Kaderdatei-Preload: data.js laedt sie spaeter synchron via
      // document.write – der Preload startet den Download schon jetzt,
      // parallel zum HTML-Parsing. Spiegel der dataReady-Turniere aus
      // tournament-config.js (dort nachziehen, wenn ein Turnier dazukommt);
      // bei Abweichung kostet es nur einen unnoetigen Request.
      var df=(k==="cl2526")?"data-cl2526.js":"data-wm2026.js";
      var pl=document.createElement("link");
      pl.rel="preload";pl.as="script";pl.href=df;
      (document.head||d).appendChild(pl);
    }catch(e){}})();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>DreamTeam - Rangliste</title>
    <meta name="theme-color" content="#28a745">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DreamTeam">
<link rel="manifest" href="Icons/site.webmanifest?v=2026-07-23-phase2-8">
    <link rel="icon" type="image/x-icon" href="Icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="Icons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="Icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="Icons/favicon-48x48.png">
    <link rel="apple-touch-icon" sizes="180x180" href="Icons/apple-touch-icon.png">
    <link rel="mask-icon" href="Icons/maskable-icon-192x192.png" color="#28a745">
    <meta name="msapplication-config" content="Icons/browserconfig.xml">
    <meta name="view-transition" content="same-origin">
    <meta name="description" content="DreamTeam – Rangliste und Managerpunkte auf einen Blick.">

    <!-- Frühe Verbindungsöffnung zu Firebase + CDN; spart auf Mobile
         häufig 100–300 ms TLS/DNS. -->
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <!-- Firebase-Compat-SDK: Download startet dank preload sofort und
         parallel zum HTML-Parsing; die eigentlichen <script>-Tags stehen
         am Body-Ende direkt VOR tournament-config.js. So blockiert das
         SDK nicht mehr den First Paint, aber die Ausführungs-Reihenfolge
         (firebase → APP_CONFIG → App-Skripte) bleibt exakt wie bisher –
         inklusive der Inline-Body-Skripte, die `APP.getDb()` auf
         Top-Level aufrufen. Bewusst KEIN `defer`: das hat frueher zu
         einer "Firebase SDK noch nicht geladen"-Regression gefuehrt. -->
    <link rel="preload" as="script" href="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js">
    <link rel="preload" as="script" href="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js">
    <link rel="preload" as="script" href="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js">

<link rel="stylesheet" href="styles.css?v=2026-07-23-phase2-8">

    <link rel="stylesheet" href="rangliste.css?v=2026-07-23-phase2-8">
</head>
<body>

<div class="rl-page">

    <!-- =====================================================
         HERO / PAGE HEADER
         ===================================================== -->
    <div class="rl-hero">
        <div class="rl-hero-badge">🏆 DreamTeam</div>
        <h1 id="ranking-title" class="rl-hero-title">
            <span class="gold-text">Rangliste</span>
        </h1>

        <!-- Last-Update Info, oben rechts -->
        <div class="rl-hero-update" id="rl-hero-update" style="display:none;" aria-live="polite">
            <div class="rl-hero-update-label" id="rl-hero-update-label">Zuletzt aktualisiert</div>
            <div class="rl-hero-update-time" id="rl-hero-update-time">—</div>
            <div class="rl-hero-update-game" id="rl-hero-update-game"></div>
        </div>

        <!-- Runden-Filter -->
        <div class="rl-round-filter" aria-label="Runden-Filter">
            <label class="rl-round-filter-label" for="round-filter-toggle">Runden</label>
            <div id="round-filter-multi" class="multi-select rl-round-filter-select">
                <button type="button" id="round-filter-toggle" class="multi-select-toggle">
                    <span id="round-filter-label">Alle Runden</span>
                    <span class="arrow">▼</span>
                </button>
                <div id="round-filter-menu" class="multi-select-menu">
                    <div class="round-filter-toggle-all-wrap">
                        <button type="button" id="round-filter-toggle-all" class="round-filter-toggle-all">Alle abwählen</button>
                    </div>
                    <div id="round-filter-options"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- =====================================================
         TOGGLE
         ===================================================== -->
    <div class="rl-toggle-wrap">
        <div class="toggle-container">
            <button id="btn-ranking" class="toggle-btn active" aria-pressed="true">Aktuelle Rangliste</button>
            <button id="btn-history" class="toggle-btn" aria-pressed="false">Manager</button>
        </div>
    </div>

    <div class="page-shell">

        <!-- Pre-Start Hinweisbanner: bleibt nur sichtbar, solange das
             Turnier noch nicht angefangen hat (DREAMTEAM_START). Sobald
             der Anpfiff erreicht ist, blendet ihn body.teams-locked aus. -->
        <div id="rl-prestart-banner" class="rl-prestart-banner" role="status" aria-live="polite">
            <span class="rl-prestart-icon" aria-hidden="true">🔒</span>
            <div class="rl-prestart-text">
                <strong>Kader noch versteckt</strong>
                <span>Die Spieler der Teilnehmer werden mit dem Anpfiff automatisch enthüllt.</span>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" role="status" aria-live="polite">Berechne Rangliste... ⏳</div>

        <!-- Ranking View -->
        <div id="view-ranking" class="view-section active">
            <div id="podium" class="podium-container" style="display:none;" aria-label="Top 3 Podium"></div>
            <div id="rank-list" class="rank-list" style="display:none;" aria-label="Rangliste ab Platz 4"></div>
        </div>

        <!-- History View -->
        <div id="view-history" class="view-section">
            <div class="history-layout">
                <div class="history-top">
                    <div class="history-card history-controls-card">
                        <div class="control-block">
                            <label for="history-main-manager">Manager</label>
                            <select id="history-main-manager" class="history-select"></select>
                        </div>

                        <div class="control-block">
                            <label>Vergleich mit...</label>
                            <div id="compare-multi-select" class="multi-select">
                                <button type="button" id="compare-toggle" class="multi-select-toggle">
                                    <span id="compare-toggle-label">Keine weiteren Manager gewählt</span>
                                    <span class="arrow">▼</span>
                                </button>
                                <div id="compare-menu" class="multi-select-menu"></div>
                            </div>
                        </div>
                    </div>

                    <div class="history-card history-summary-card">
                        <div class="summary-header">
                            <h2 id="summary-manager-name" class="summary-manager-name">-</h2>
                            <div id="summary-total-points" class="summary-total-points">0 Pkt.</div>
                        </div>
                        <div id="history-summary-grid" class="summary-grid"></div>
                    </div>
                </div>

                <div class="history-card history-chart-card">
                    <div class="history-chart-header">
                        <h3 class="history-chart-title">Rangentwicklung</h3>

                        <div class="chart-mode-toggle">
                            <button id="chart-mode-rank" class="chart-mode-btn active" type="button">Rang</button>
                            <button id="chart-mode-points" class="chart-mode-btn" type="button">Punkte</button>
                        </div>
                    </div>

                    <div class="chart-wrap">
                        <canvas id="history-chart"></canvas>
                    </div>
                    <div id="history-empty" class="history-empty" style="display:none;">Noch keine Historie verfügbar.</div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Firebase-Compat-SDK: per preload im <head> bereits heruntergeladen,
     hier nur noch ausgefuehrt – VOR tournament-config.js, damit
     APP.getDb() und alle nachfolgenden Skripte firebase sicher sehen. -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script src="nav.js?v=2026-07-23-phase2-8"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="data.js?v=2026-07-23-phase2-8"></script>
<script src="points-utils.js?v=2026-07-23-phase2-8"></script>
<script src="transfer-utils.js?v=2026-07-23-phase2-8"></script>
<script src="cache.js?v=2026-07-23-phase2-8"></script>

<link rel="stylesheet" href="auth-modal.css?v=2026-07-23-phase2-8">
<script src="admin.js"></script>
<script src="auth.js"></script>
<script src="auth-modal.js"></script>

<script src="rangliste.js?v=2026-07-23-phase2-8"></script>
</body>
</html>
